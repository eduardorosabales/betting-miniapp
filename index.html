<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Betting Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #06080F;
  --surface:    #0A0E1C;
  --card:       #0D1220;
  --card2:      #111826;
  --border:     rgba(255,255,255,0.06);
  --border-hi:  rgba(0,205,150,0.25);
  --accent:     #00CD96;
  --accent-dim: rgba(0,205,150,0.12);
  --accent-glow:rgba(0,205,150,0.08);
  --win:        #00CD96;
  --win-bg:     rgba(0,205,150,0.1);
  --loss:       #FF3D5A;
  --loss-bg:    rgba(255,61,90,0.1);
  --pend:       #F5A623;
  --pend-bg:    rgba(245,166,35,0.1);
  --text:       #E2E8F4;
  --text-2:     #8896A8;
  --text-3:     #3D4A5C;
  --radius-sm:  8px;
  --radius-md:  12px;
  --radius-lg:  16px;
  --radius-xl:  20px;
  --font-head:  'Syne', sans-serif;
  --font-num:   'Space Mono', monospace;
  --font-body:  'DM Sans', sans-serif;
  --nav-h:      72px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { height: 100%; }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: calc(var(--nav-h) + 16px);
  overflow-x: hidden;
}

/* ── Noise overlay ───────────────────────────────────────────────────────── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* ── Ambient glow ────────────────────────────────────────────────────────── */
body::after {
  content: '';
  position: fixed;
  top: -200px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse, rgba(0,205,150,0.07) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
}

/* ── Header ──────────────────────────────────────────────────────────────── */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(6,8,15,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid var(--border);
  padding: 14px 16px;
}
.header-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.logo-icon {
  width: 32px;
  height: 32px;
  background: linear-gradient(135deg, var(--accent), #00A880);
  border-radius: 9px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  flex-shrink: 0;
}
.logo-text {
  font-family: var(--font-head);
  font-size: 17px;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.logo-text span { color: var(--accent); }
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.status-dot {
  width: 7px;
  height: 7px;
  background: var(--accent);
  border-radius: 50%;
  animation: pulse-dot 2s ease-in-out infinite;
}
@keyframes pulse-dot {
  0%,100% { opacity: 1; transform: scale(1); }
  50%      { opacity: 0.4; transform: scale(0.8); }
}
.refresh-btn {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text-2);
  padding: 6px 14px;
  border-radius: var(--radius-sm);
  font-family: var(--font-body);
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  letter-spacing: 0.2px;
}
.refresh-btn:active { transform: scale(0.96); }
.refresh-btn:disabled { opacity: 0.4; cursor: default; }

/* ── Content ─────────────────────────────────────────────────────────────── */
.content {
  padding: 16px;
  position: relative;
  z-index: 1;
}
.section { display: none; }
.section.active {
  display: block;
  animation: fadein 0.25s ease;
}
@keyframes fadein {
  from { opacity: 0; transform: translateY(6px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Bottom navigation ───────────────────────────────────────────────────── */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: var(--nav-h);
  background: rgba(10,14,28,0.92);
  backdrop-filter: blur(24px) saturate(200%);
  -webkit-backdrop-filter: blur(24px) saturate(200%);
  border-top: 1px solid var(--border);
  display: flex;
  align-items: stretch;
  z-index: 200;
  padding: 0 4px;
  padding-bottom: env(safe-area-inset-bottom, 0px);
}
.nav-item {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: var(--text-3);
  padding: 8px 4px;
  transition: color 0.2s;
  position: relative;
  -webkit-tap-highlight-color: transparent;
}
.nav-item.active { color: var(--accent); }
.nav-item.active::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 32px;
  height: 2px;
  background: var(--accent);
  border-radius: 0 0 4px 4px;
}
.nav-icon { font-size: 20px; line-height: 1; }
.nav-label { font-size: 10px; font-weight: 600; letter-spacing: 0.3px; }

/* ── Cards ───────────────────────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 16px;
  margin-bottom: 10px;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(255,255,255,0.02), transparent 60%);
  pointer-events: none;
}
.card-title {
  font-size: 11px;
  font-weight: 600;
  color: var(--text-3);
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 14px;
}

/* ── Stat grid ───────────────────────────────────────────────────────────── */
.stats-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 10px;
}
.stat-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px 10px;
  text-align: center;
  position: relative;
  overflow: hidden;
}
.stat-card::after {
  content: '';
  position: absolute;
  bottom: 0; left: 0; right: 0;
  height: 2px;
  opacity: 0;
  transition: opacity 0.2s;
}
.stat-card.win-card::after  { background: var(--win);  opacity: 1; }
.stat-card.loss-card::after { background: var(--loss); opacity: 1; }
.stat-card.pend-card::after { background: var(--pend); opacity: 1; }
.stat-value {
  font-family: var(--font-num);
  font-size: 26px;
  font-weight: 700;
  line-height: 1;
  margin-bottom: 5px;
}
.stat-label {
  font-size: 10px;
  color: var(--text-2);
  font-weight: 600;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

/* ── KPI ─────────────────────────────────────────────────────────────────── */
.kpi-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
  margin-bottom: 10px;
}
.kpi {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 14px;
}
.kpi-label {
  font-size: 10px;
  color: var(--text-2);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  margin-bottom: 6px;
}
.kpi-value {
  font-family: var(--font-num);
  font-size: 21px;
  font-weight: 700;
  letter-spacing: -0.5px;
}

/* ── Colors ──────────────────────────────────────────────────────────────── */
.green  { color: var(--win); }
.red    { color: var(--loss); }
.yellow { color: var(--pend); }
.accent { color: var(--accent); }
.muted  { color: var(--text-2); }

/* ── Racha badge ──────────────────────────────────────────────────────────── */
.racha-badge {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  border-radius: var(--radius-md);
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 10px;
  letter-spacing: 0.2px;
}
.racha-win  { background: var(--win-bg);  color: var(--win);  border: 1px solid rgba(0,205,150,0.2); }
.racha-loss { background: var(--loss-bg); color: var(--loss); border: 1px solid rgba(255,61,90,0.2); }
.racha-icon { font-size: 18px; }

/* ── Progress ─────────────────────────────────────────────────────────────── */
.progress-wrap { margin-bottom: 4px; }
.progress-labels {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  font-weight: 700;
  margin-bottom: 8px;
}
.progress-track {
  height: 6px;
  background: rgba(255,255,255,0.06);
  border-radius: 3px;
  overflow: hidden;
}
.progress-fill {
  height: 100%;
  border-radius: 3px;
  background: linear-gradient(90deg, var(--win), var(--accent));
  transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
}

/* ── Chart ────────────────────────────────────────────────────────────────── */
.chart-wrap {
  position: relative;
  height: 180px;
  margin-bottom: 4px;
}

/* ── Sport items ──────────────────────────────────────────────────────────── */
.sport-item {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.sport-item:last-child { border-bottom: none; }
.sport-name { font-size: 14px; font-weight: 600; }
.sport-sub  { font-size: 11px; color: var(--text-2); margin-top: 2px; }
.sport-roi  { font-family: var(--font-num); font-size: 16px; font-weight: 700; }

/* ── Capital ──────────────────────────────────────────────────────────────── */
.capital-hero {
  text-align: center;
  padding: 24px 0 16px;
}
.capital-label {
  font-size: 10px;
  font-weight: 700;
  color: var(--text-2);
  text-transform: uppercase;
  letter-spacing: 1.5px;
  margin-bottom: 10px;
}
.capital-amount {
  font-family: var(--font-head);
  font-size: 42px;
  font-weight: 800;
  color: var(--accent);
  line-height: 1;
  letter-spacing: -1px;
}
.capital-sub {
  font-size: 12px;
  color: var(--text-2);
  margin-top: 8px;
  font-weight: 500;
}
.cap-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  margin-top: 16px;
}
.cap-stat {
  background: var(--card2);
  border-radius: var(--radius-md);
  padding: 14px 12px;
  text-align: center;
  border: 1px solid var(--border);
}
.cap-stat-val {
  font-family: var(--font-num);
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 4px;
}
.cap-stat-lbl {
  font-size: 10px;
  color: var(--text-2);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

/* ── Bet items ────────────────────────────────────────────────────────────── */
.bet-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
}
.bet-item:last-child { border-bottom: none; }
.bet-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.bet-dot.win  { background: var(--win);  box-shadow: 0 0 6px rgba(0,205,150,0.5); }
.bet-dot.loss { background: var(--loss); box-shadow: 0 0 6px rgba(255,61,90,0.5); }
.bet-dot.pend { background: var(--pend); box-shadow: 0 0 6px rgba(245,166,35,0.5); }
.bet-info { flex: 1; min-width: 0; }
.bet-teams {
  font-size: 13px;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  margin-bottom: 2px;
}
.bet-meta {
  font-size: 11px;
  color: var(--text-2);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.bet-right { text-align: right; flex-shrink: 0; }
.bet-monto {
  font-family: var(--font-num);
  font-size: 13px;
  font-weight: 700;
}
.bet-result {
  font-family: var(--font-num);
  font-size: 11px;
  margin-top: 1px;
}

/* ── Filters ──────────────────────────────────────────────────────────────── */
.filter-row {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  margin-bottom: 12px;
  scrollbar-width: none;
  padding-bottom: 2px;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-chip {
  padding: 6px 14px;
  border-radius: 99px;
  font-size: 12px;
  font-weight: 700;
  border: 1px solid var(--border);
  background: var(--card);
  color: var(--text-2);
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.15s;
  letter-spacing: 0.2px;
}
.filter-chip.active {
  background: var(--accent-dim);
  border-color: var(--border-hi);
  color: var(--accent);
}

/* ── Search ───────────────────────────────────────────────────────────────── */
.search-wrap {
  position: relative;
  margin-bottom: 10px;
}
.search-icon {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 14px;
  pointer-events: none;
  color: var(--text-2);
}
.search-input {
  width: 100%;
  padding: 10px 14px 10px 36px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: rgba(0,205,150,0.35); }
.search-input::placeholder { color: var(--text-3); }

/* ── Mes selector ─────────────────────────────────────────────────────────── */
.mes-selector {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 12px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: var(--radius-md);
  padding: 10px 14px;
}
.mes-nav {
  background: var(--card2);
  border: 1px solid var(--border);
  color: var(--text-2);
  width: 32px;
  height: 32px;
  border-radius: var(--radius-sm);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
}
.mes-nav:active { transform: scale(0.92); }
.mes-label {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
}

/* ── Loader ───────────────────────────────────────────────────────────────── */
.loader {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 70vh;
  gap: 20px;
}
.loader-logo {
  font-family: var(--font-head);
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.5px;
  animation: loader-pulse 1.5s ease-in-out infinite;
}
.loader-logo span { color: var(--accent); }
@keyframes loader-pulse {
  0%,100% { opacity: 1; }
  50%      { opacity: 0.4; }
}
.loader-bar {
  width: 80px;
  height: 2px;
  background: var(--card2);
  border-radius: 1px;
  overflow: hidden;
}
.loader-bar-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 1px;
  animation: loader-slide 1.5s ease-in-out infinite;
}
@keyframes loader-slide {
  0%   { width: 0%;   margin-left: 0; }
  50%  { width: 60%;  margin-left: 20%; }
  100% { width: 0%;   margin-left: 100%; }
}
.loader p { font-size: 13px; color: var(--text-2); font-weight: 500; }

/* ── Error ────────────────────────────────────────────────────────────────── */
.error-box {
  background: var(--loss-bg);
  border: 1px solid rgba(255,61,90,0.25);
  border-radius: var(--radius-lg);
  padding: 24px 20px;
  text-align: center;
  margin: 20px 0;
}
.error-box p { color: var(--loss); font-size: 14px; font-weight: 600; }
.error-box small { color: var(--text-2); font-size: 12px; }
.retry-btn {
  margin-top: 14px;
  padding: 9px 22px;
  background: var(--accent);
  color: #000;
  border: none;
  border-radius: var(--radius-md);
  font-family: var(--font-body);
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  letter-spacing: 0.2px;
}

/* ── Empty ────────────────────────────────────────────────────────────────── */
.empty {
  text-align: center;
  padding: 30px 20px;
  color: var(--text-2);
  font-size: 13px;
}

/* ── Divider ──────────────────────────────────────────────────────────────── */
.divider {
  border: none;
  border-top: 1px solid var(--border);
  margin: 4px 0 12px;
}

/* ── Section header ───────────────────────────────────────────────────────── */
.section-header {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 800;
  letter-spacing: -0.3px;
  margin-bottom: 14px;
  color: var(--text);
}
.section-header span { color: var(--accent); }

/* ── Explainer text ───────────────────────────────────────────────────────── */
.explainer {
  font-size: 12px;
  color: var(--text-2);
  line-height: 1.6;
  padding: 12px 14px;
  background: var(--card2);
  border-radius: var(--radius-md);
  border-left: 2px solid var(--accent);
  margin-top: 8px;
}
.explainer strong { color: var(--text); font-weight: 600; }
</style>
</head>
<body>

<div id="app">
  <div class="loader">
    <div class="loader-logo">Bet<span>Stats</span></div>
    <div class="loader-bar"><div class="loader-bar-fill"></div></div>
    <p>Cargando datos...</p>
  </div>
</div>

<!-- Bottom nav rendered after data loads -->
<nav class="bottom-nav" id="bottomNav" style="display:none"></nav>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const API_URL = "https://betting-stats-bot-production.up.railway.app";
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let DATA             = null;
let filtroDeporte    = "Todos";
let filtroEquipo     = "";
let mesActual        = null;
let mesesDisponibles = [];
let charts           = {};
let tabActual        = "resumen";
let cargando         = false;

const NAV_ITEMS = [
  { id:"resumen",  icon:"📊", label:"Resumen" },
  { id:"semana",   icon:"📅", label:"7 días"  },
  { id:"mes",      icon:"🗓", label:"Mes"     },
  { id:"deportes", icon:"🏆", label:"Deportes"},
  { id:"capital",  icon:"💼", label:"Capital" },
  { id:"apuestas", icon:"📋", label:"Bets"    },
];

function esc(s) {
  if (s == null) return "";
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;");
}

const fmt  = n => n == null ? "—" : `$${Number(n).toLocaleString("es-MX",{maximumFractionDigits:0})}`;
const fmtp = n => n == null ? "—" : `${Number(n).toFixed(1)}%`;
const fmts = n => n == null ? "—" : Number(n)>=0 ? `+${fmt(n)}` : fmt(n);
const fmtM = n => n == null ? "—" : `$${Math.abs(Number(n))>=1000 ? (Number(n)/1000).toFixed(1)+"k" : Number(n).toFixed(0)}`;
const signColor = n => Number(n) >= 0 ? "green" : "red";

function mesLabel(m) {
  if (!m) return "—";
  const [y,mo] = m.split("-");
  return ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][parseInt(mo,10)-1]+" "+y;
}

/* ── Fetch ─────────────────────────────────────────────────────────────── */
let _ctrl = null;
async function cargarDatos() {
  if (_ctrl) _ctrl.abort();
  _ctrl = new AbortController();
  const timeout = setTimeout(()=>_ctrl.abort(), 12000);
  try {
    const hdrs = {};
    if (tg?.initData) hdrs["X-Telegram-Init-Data"] = tg.initData;
    const res = await fetch(`${API_URL}/api/stats`, { headers:hdrs, signal:_ctrl.signal });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const json = await res.json();
    if (!json.resumen || !Array.isArray(json.apuestas)) throw new Error("Datos inesperados");
    DATA = json;
    mesesDisponibles = DATA.grafica_meses.map(m=>m.mes);
    mesActual = mesesDisponibles[mesesDisponibles.length-1] || null;
    renderApp();
  } catch(e) {
    if (e.name==="AbortError") return;
    document.getElementById("app").innerHTML = `
      <div style="padding:20px">
        <div class="error-box">
          <p>Sin conexión</p>
          <br><small>${esc(e.message)}</small>
          <br><button class="retry-btn" data-action="recargar">↻ Reintentar</button>
        </div>
      </div>`;
  } finally { clearTimeout(timeout); }
}

function renderApuestasSemana() {
  const hace7 = Date.now() - 7*24*3600*1000;
  const ap7 = DATA.apuestas.filter(a => {
    if (!a.fecha) return false;
    return new Date(a.fecha.replace(" ","T")+"Z").getTime() >= hace7;
  });
  if (!ap7.length) return '<div class="empty">Sin apuestas esta semana</div>';
  return [...ap7].reverse().map(renderBetItem).join("");
}

/* ── Tab: Mes ───────────────────────────────────────────────────────────── */
function renderMes() {
  const idx = mesesDisponibles.indexOf(mesActual);
  return `
    <div class="mes-selector">
      <button class="mes-nav" data-mes-dir="-1" ${idx<=0?"disabled style='opacity:0.3;cursor:default'":""}>‹</button>
      <span class="mes-label" id="mesLabel">${mesLabel(mesActual)}</span>
      <button class="mes-nav" data-mes-dir="1" ${idx>=mesesDisponibles.length-1?"disabled style='opacity:0.3;cursor:default'":""}>›</button>
    </div>
    <div id="mesContent">${renderMesContent()}</div>`;
}

function renderMesContent() {
  if (!mesActual) return '<div class="empty">No hay datos este mes</div>';
  const ap = DATA.apuestas.filter(a => a.fecha?.startsWith(mesActual));
  let w=0,l=0,p=0,apo=0,gan=0;
  ap.forEach(a=>{
    if(a.status==="win"){w++;apo+=a.monto;gan+=a.ganancia??a.monto;}
    else if(a.status==="loss"){l++;apo+=a.monto;}
    else p++;
  });
  const neto=gan-apo, roi=apo>0?neto/apo*100:0;
  const wr=(w+l)>0?(w/(w+l)*100).toFixed(1):"N/A";
  return `
    <div class="stats-grid">
      <div class="stat-card win-card"><div class="stat-value green">${w}</div><div class="stat-label">Ganadas</div></div>
      <div class="stat-card loss-card"><div class="stat-value red">${l}</div><div class="stat-label">Perdidas</div></div>
      <div class="stat-card pend-card"><div class="stat-value yellow">${p}</div><div class="stat-label">Pendientes</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Neto</div><div class="kpi-value ${signColor(neto)}">${fmts(neto)}</div></div>
      <div class="kpi"><div class="kpi-label">ROI</div><div class="kpi-value ${signColor(roi)}">${roi>=0?"+":""}${fmtp(roi)}</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Apostado</div><div class="kpi-value accent">${fmt(apo)}</div></div>
      <div class="kpi"><div class="kpi-label">Win rate</div><div class="kpi-value">${wr}%</div></div>
    </div>
    <div class="card">
      <div class="card-title">Apuestas del mes (${ap.length})</div>
      ${ap.length===0?'<div class="empty">Sin apuestas este mes</div>':ap.slice(-12).reverse().map(renderBetItem).join("")}
    </div>`;
}

function cambiarMes(dir) {
  const idx = mesesDisponibles.indexOf(mesActual);
  const nuevo = idx+dir;
  if (nuevo<0||nuevo>=mesesDisponibles.length) return;
  mesActual = mesesDisponibles[nuevo];
  document.getElementById("mesLabel").textContent = mesLabel(mesActual);
  document.getElementById("mesContent").innerHTML = renderMesContent();
  const ni = mesesDisponibles.indexOf(mesActual);
  document.querySelectorAll("[data-mes-dir]").forEach(btn=>{
    const d=parseInt(btn.dataset.mesDir,10);
    const dis=(d===-1&&ni<=0)||(d===1&&ni>=mesesDisponibles.length-1);
    btn.disabled=dis; btn.style.opacity=dis?"0.3":""; btn.style.cursor=dis?"default":"";
  });
}

const LIMITE = 50;
function renderApuestas() {
  const deportesUnicos = ["Todos",...new Set(DATA.apuestas.map(a=>a.deporte).filter(Boolean))];
  return `
    <div class="section-header">Historial de <span>bets</span></div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input class="search-input" placeholder="Buscar por equipo..." data-search-equipo value="${esc(filtroEquipo)}">
    </div>
    <div class="filter-row">
      ${deportesUnicos.map(d=>`<button class="filter-chip ${d===filtroDeporte?"active":""}" data-filtro-deporte="${esc(d)}">${esc(d)}</button>`).join("")}
    </div>
    <div id="apuestasLista">${renderApuestasList()}</div>`;
}

function renderApuestasList() {
  const term = filtroEquipo.toLowerCase().trim();
  const filt = DATA.apuestas
    .filter(a=>filtroDeporte==="Todos"||a.deporte===filtroDeporte)
    .filter(a=>!term||(a.equipo1||"").toLowerCase().includes(term)||(a.equipo2||"").toLowerCase().includes(term));
  const total=filt.length, mostrar=[...filt].reverse().slice(0,LIMITE);
  return `
    <div class="card">
      <div class="card-title">${total} apuesta${total!==1?"s":""}${filtroDeporte!=="Todos"?` · ${esc(filtroDeporte)}`:""}${term?` · "${esc(term)}"`:""}</div>
      ${mostrar.length===0?'<div class="empty">Sin resultados</div>':mostrar.map(renderBetItem).join("")}
    </div>`;
}

function renderBetItem(a) {
  const icon = a.status==="win"?"win":a.status==="loss"?"loss":"pend";
  const res  = a.status==="win"?`+${fmt(a.ganancia)}`:a.status==="loss"?`-${fmt(a.monto)}`:`⏳ ${fmt(a.potencial)}`;
  const rc   = a.status==="win"?"green":a.status==="loss"?"red":"yellow";
  return `
    <div class="bet-item">
      <div class="bet-dot ${icon}"></div>
      <div class="bet-info">
        <div class="bet-teams">${esc(a.equipo1||"?")} vs ${esc(a.equipo2||"?")}</div>
        <div class="bet-meta">${esc(a.deporte)} · ${esc(a.tipo)} @ ${esc(a.cuota)} · ${a.fecha?.slice(0,10)||""}</div>
      </div>
      <div class="bet-right">
        <div class="bet-monto">${fmt(a.monto)}</div>
        <div class="bet-result ${rc}">${res}</div>
      </div>
    </div>`;
}

/* ── Event delegation ───────────────────────────────────────────────────── */
document.addEventListener("click", e=>{
  const chip = e.target.closest("[data-filtro-deporte]");
  if (chip) { setFiltroDeporte(chip.dataset.filtroDeporte); return; }
  const tabBtn = e.target.closest("[data-tab]");
  if (tabBtn) { showTab(tabBtn.dataset.tab, tabBtn); return; }
  const mesBtn = e.target.closest("[data-mes-dir]");
  if (mesBtn) { cambiarMes(parseInt(mesBtn.dataset.mesDir,10)); return; }
  const action = e.target.closest("[data-action]");
  if (action?.dataset.action==="recargar") { recargar(); return; }
});
document.addEventListener("input", e=>{
  const el = e.target.closest("[data-search-equipo]");
  if (el) {
    filtroEquipo = el.value;
    const lista = document.getElementById("apuestasLista");
    if (lista) lista.innerHTML = renderApuestasList();
  }
});

/* ── Filtro ─────────────────────────────────────────────────────────────── */
function setFiltroDeporte(dep) {
  filtroDeporte = dep;
  document.querySelectorAll("[data-filtro-deporte]").forEach(c=>{
    c.classList.toggle("active", c.dataset.filtroDeporte===filtroDeporte);
  });
  const lista = document.getElementById("apuestasLista");
  if (lista) lista.innerHTML = renderApuestasList();
}

/* ── Charts ─────────────────────────────────────────────────────────────── */
function axisM(v) {
  const a=Math.abs(v);
  return a>=1000?`$${(v/1000).toFixed(1)}k`:`$${v}`;
}

function destroyChart(key) {
  if (charts[key]) { charts[key].destroy(); delete charts[key]; }
}

function makeChartNeto() {
  if (typeof Chart==="undefined") return;
  const c = document.getElementById("chartNeto");
  if (!c||!DATA.grafica_meses.length) return;
  destroyChart("neto");
  let acum=0;
  const labels=DATA.grafica_meses.map(m=>mesLabel(m.mes));
  const vals=DATA.grafica_meses.map(m=>{acum+=m.neto;return acum;});
  charts.neto = new Chart(c,{
    type:"bar",
    data:{ labels, datasets:[{
      label:"Neto acumulado", data:vals,
      backgroundColor:vals.map(v=>v>=0?"rgba(0,205,150,0.75)":"rgba(255,61,90,0.75)"),
      borderRadius:5, borderSkipped:false,
    }]},
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{font:{size:10,family:"Space Mono"},color:"#4A5568"}},
        y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{callback:axisM,font:{size:10,family:"Space Mono"},color:"#4A5568"}}
      }
    }
  });
}

function makeChartMeses() {
  if (typeof Chart==="undefined") return;
  const c = document.getElementById("chartMeses");
  if (!c||!DATA.grafica_meses.length) return;
  destroyChart("meses");
  charts.meses = new Chart(c,{
    type:"bar",
    data:{
      labels:DATA.grafica_meses.map(m=>mesLabel(m.mes)),
      datasets:[
        {label:"Apostado",data:DATA.grafica_meses.map(m=>m.apostado),backgroundColor:"rgba(108,99,255,0.6)",borderRadius:4,borderSkipped:false},
        {label:"Ganado",  data:DATA.grafica_meses.map(m=>m.ganado),  backgroundColor:"rgba(0,205,150,0.6)",borderRadius:4,borderSkipped:false},
      ]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:true,labels:{font:{size:11,family:"DM Sans"},boxWidth:10,padding:10,color:"#8896A8"}}},
      scales:{
        x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{font:{size:10,family:"Space Mono"},color:"#4A5568"}},
        y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{callback:axisM,font:{size:10,family:"Space Mono"},color:"#4A5568"}}
      }
    }
  });
}

function makeChartDep() {
  if (typeof Chart==="undefined") return;
  const c = document.getElementById("chartDep");
  if (!c||!DATA.deportes.length) return;
  destroyChart("dep");
  const deps=[...DATA.deportes].sort((a,b)=>b.roi-a.roi);
  charts.dep = new Chart(c,{
    type:"bar",
    data:{
      labels:deps.map(d=>d.nombre),
      datasets:[{
        label:"ROI %", data:deps.map(d=>parseFloat(d.roi.toFixed(1))),
        backgroundColor:deps.map(d=>d.roi>=0?"rgba(0,205,150,0.75)":"rgba(255,61,90,0.75)"),
        borderRadius:5, borderSkipped:false,
      }]
    },
    options:{
      responsive:true, maintainAspectRatio:false,
      plugins:{legend:{display:false}},
      scales:{
        x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{font:{size:10,family:"Space Mono"},color:"#4A5568"}},
        y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{callback:v=>`${v}%`,font:{size:10,family:"Space Mono"},color:"#4A5568"}}
      }
    }
  });
}

function initCharts() {
  if (!DATA) return;
  Chart.defaults.color="#8896A8";
  Chart.defaults.borderColor="rgba(255,255,255,0.04)";
  if (tabActual==="resumen")  { makeChartNeto(); makeChartMeses(); }
  if (tabActual==="deportes") { makeChartDep(); }
}

/* ── Tab switching ──────────────────────────────────────────────────────── */
function showTab(id, btn) {
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(t=>t.classList.remove("active"));
  const sec = document.getElementById(id);
  if (sec) sec.classList.add("active");
  if (btn) btn.classList.add("active");
  else {
    const nb = document.querySelector(`.nav-item[data-tab="${id}"]`);
    if (nb) nb.classList.add("active");
  }
  tabActual = id;
  setTimeout(initCharts, 80);
}

/* ── Reload ─────────────────────────────────────────────────────────────── */
async function recargar() {
  if (cargando) return;
  cargando = true;
  document.getElementById("app").innerHTML = `
    <div class="loader">
      <div class="loader-logo">Bet<span>Stats</span></div>
      <div class="loader-bar"><div class="loader-bar-fill"></div></div>
      <p>Actualizando...</p>
    </div>`;
  const nav = document.getElementById("bottomNav");
  if (nav) nav.style.display="none";
  try { await cargarDatos(); }
  finally { cargando=false; }
}

cargarDatos();
</script>
</body>
</html>
