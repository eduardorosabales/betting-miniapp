<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="api-url" content="https://betting-stats-bot-production.up.railway.app">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdnjs.cloudflare.com https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://*.up.railway.app; img-src 'self' data: blob:; object-src 'none'; base-uri 'self';">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon-180.png">
  <title>Betting Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #06080F;
      --surface: #0A0E1C;
      --card: #0D1220;
      --card2: #111826;
      --border: rgba(255, 255, 255, 0.06);
      --border-hi: rgba(0, 205, 150, 0.25);
      --accent: #00CD96;
      --accent-dim: rgba(0, 205, 150, 0.12);
      --win: #00CD96;
      --win-bg: rgba(0, 205, 150, 0.1);
      --loss: #FF3D5A;
      --loss-bg: rgba(255, 61, 90, 0.1);
      --pend: #F5A623;
      --pend-bg: rgba(245, 166, 35, 0.1);
      --text: #E2E8F4;
      --text-2: #8896A8;
      --text-3: #3D4A5C;
      --chart-grid: rgba(255, 255, 255, 0.04);
      --chart-tick: #4A5568;
      --header-bg: rgba(6, 8, 15, 0.85);
      --nav-bg: rgba(10, 14, 28, 0.92);
      --nav-bg-solid: rgba(10, 14, 28, 0.97);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --font-head: 'Syne', sans-serif;
      --font-num: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
      --nav-h: 72px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --sidebar-w: 220px;
      --content-max: 960px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      height: 100%
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      min-height: 100vh;
      padding-bottom: calc(var(--nav-h) + 20px);
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(0, 205, 150, 0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0
    }

    /* ── Sidebar logo: oculto en mobile, visible en desktop vía @media ── */
    .sidebar-logo {
      display: none
    }


    /* ── Performance overrides (Telegram Desktop / Linux) ── */
    .no-blur .header {
      backdrop-filter: none !important;
      background: var(--header-bg) !important
    }

    .no-blur .bottom-nav {
      backdrop-filter: none !important;
      background: var(--nav-bg-solid) !important
    }

    .no-blur body::before {
      display: none !important
    }

    .no-blur body::after {
      display: none !important
    }

    .no-blur .status-dot {
      animation: none !important
    }

    .no-blur .section.active {
      animation: none !important
    }

    .no-blur body::after {
      display: none !important
    }

    .no-blur .progress-fill,
    .no-blur .tipo-bar-fill,
    .no-blur .kelly-fill,
    .no-blur .dia-bar-fill {
      transition: none !important
    }

    .no-blur .loader-logo,
    .no-blur .loader-bar-fill {
      animation: none !important;
      opacity: 1
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      left: 0;
      right: 0
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(140deg, #2BE9B0 0%, var(--accent) 45%, #009E74 100%);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 14px -3px rgba(0, 205, 150, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.25)
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      display: block
    }

    .logo-text {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.4px
    }

    .logo-text span {
      background: linear-gradient(120deg, var(--accent) 0%, #5BE8C0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: var(--accent)
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: 0.4;
        transform: scale(0.8)
      }
    }

    .refresh-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-2);
      min-width: 44px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.2px
    }

    .refresh-btn:active {
      transform: scale(0.96)
    }

    .refresh-btn:disabled {
      opacity: 0.4;
      cursor: default
    }

    /* ── Header: saludo + avatar (móvil) ── */
    .user-block {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      background: linear-gradient(140deg, #2BE9B0, #009E74);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 18px;
      color: #04130d;
      flex-shrink: 0;
      box-shadow: 0 4px 14px -3px rgba(0, 205, 150, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.25)
    }

    .greet {
      display: flex;
      flex-direction: column;
      line-height: 1.18;
      min-width: 0
    }

    .greet .hi {
      font-size: 12px;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 62vw
    }

    .greet .nm {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.3px
    }

    .greet .nm span {
      background: linear-gradient(120deg, var(--accent) 0%, #5BE8C0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: var(--accent)
    }

    .refresh-btn.refresh-round {
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      font-size: 17px
    }

    /* ── Content ── */
    .content {
      padding: 16px;
      position: relative;
      z-index: 1
    }

    .section {
      display: none
    }

    .section.active {
      display: block;
      animation: fadein 0.25s ease
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      background: var(--nav-bg);
      backdrop-filter: blur(24px) saturate(200%);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 200;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: env(safe-area-inset-bottom, 0px)
    }

    .bottom-nav::-webkit-scrollbar {
      display: none
    }

    .nav-item {
      min-width: 64px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-3);
      padding: 8px 4px;
      transition: color 0.2s;
      position: relative;
      -webkit-tap-highlight-color: transparent
    }

    .nav-item.active {
      color: var(--accent)
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 2px;
      background: var(--accent);
      border-radius: 0 0 4px 4px
    }

    .nav-icon {
      font-size: 20px;
      line-height: 1
    }

    /* ── Sub-navegación (segmented control) por grupo ── */
    .sub-nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      margin: 0 0 14px;
      padding-bottom: 2px
    }

    .sub-nav::-webkit-scrollbar {
      display: none
    }

    .sub-chip {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s, background .15s, border-color .15s
    }

    .sub-chip.active {
      color: var(--accent);
      background: var(--accent-dim);
      border-color: var(--border-hi)
    }

    .sub-chip:active {
      transform: scale(0.97)
    }

    .sub-chip.sub-more,
    .sub-chip.sub-back {
      color: var(--text);
      font-weight: 700
    }

    /* ── Resumen ejecutivo (hero) ── */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px
    }

    .hero-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 14px
    }

    .hero-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 8px
    }

    .hero-value {
      font-family: var(--font-num);
      font-size: 26px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1.05
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent 60%);
      pointer-events: none
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 10px;
      text-align: center;
      position: relative;
      overflow: hidden
    }

    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.2s
    }

    .stat-card.win-card::after {
      background: var(--win);
      opacity: 1
    }

    .stat-card.loss-card::after {
      background: var(--loss);
      opacity: 1
    }

    .stat-card.pend-card::after {
      background: var(--pend);
      opacity: 1
    }

    .stat-value {
      font-family: var(--font-num);
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 5px
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-2);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase
    }

    /* ── KPI ── */
    .kpi-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px
    }

    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px
    }

    .kpi-label {
      font-size: 10px;
      color: var(--text-2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px
    }

    .kpi-value {
      font-family: var(--font-num);
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.5px
    }

    /* ── Colors ── */
    .green {
      color: var(--win)
    }

    .red {
      color: var(--loss)
    }

    .yellow {
      color: var(--pend)
    }

    .accent {
      color: var(--accent)
    }

    .muted {
      color: var(--text-2)
    }

    /* ── Progress ── */
    .progress-wrap {
      margin-bottom: 4px
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px
    }

    .progress-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--win), var(--accent));
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1)
    }

    /* ── Chart ── */
    .chart-wrap {
      position: relative;
      height: 230px;
      margin-bottom: 4px
    }

    /* ── Selector de rango de gráficas ── */
    .range-sel {
      display: flex;
      gap: 6px;
      margin-bottom: 10px
    }

    .range-chip {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s, background .15s, border-color .15s
    }

    .range-chip.active {
      color: var(--accent);
      background: var(--accent-dim);
      border-color: var(--border-hi)
    }

    .range-chip:active {
      transform: scale(0.96)
    }

    .chart-wrap-tall {
      position: relative;
      height: 220px;
      margin-bottom: 4px
    }

    /* ── Sport items ── */
    .sport-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border)
    }

    .sport-item:last-child {
      border-bottom: none
    }

    .sport-name {
      font-size: 14px;
      font-weight: 600
    }

    .sport-sub {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px
    }

    .sport-roi {
      font-family: var(--font-num);
      font-size: 16px;
      font-weight: 700
    }

    /* ── Capital ── */
    .capital-hero {
      text-align: center;
      padding: 24px 0 16px
    }

    .capital-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px
    }

    .capital-amount {
      font-family: var(--font-head);
      font-size: 42px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px
    }

    .capital-sub {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 8px;
      font-weight: 500
    }

    .cap-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 16px
    }

    .cap-stat {
      background: var(--card2);
      border-radius: var(--radius-md);
      padding: 14px 12px;
      text-align: center;
      border: 1px solid var(--border)
    }

    .cap-stat-val {
      font-family: var(--font-num);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .cap-stat-lbl {
      font-size: 10px;
      color: var(--text-2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px
    }

    /* ── Bet items ── */
    .bet-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border)
    }

    .bet-item:last-child {
      border-bottom: none
    }

    .bet-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .bet-dot.win {
      background: var(--win);
      box-shadow: 0 0 6px rgba(0, 205, 150, 0.5)
    }

    .bet-dot.loss {
      background: var(--loss);
      box-shadow: 0 0 6px rgba(255, 61, 90, 0.5)
    }

    .bet-dot.pend {
      background: var(--pend);
      box-shadow: 0 0 6px rgba(245, 166, 35, 0.5)
    }

    .bet-info {
      flex: 1;
      min-width: 0
    }

    .bet-teams {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px
    }

    .bet-meta {
      font-size: 11px;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .bet-right {
      text-align: right;
      flex-shrink: 0
    }

    .bet-monto {
      font-family: var(--font-num);
      font-size: 13px;
      font-weight: 700
    }

    .bet-result {
      font-family: var(--font-num);
      font-size: 11px;
      margin-top: 1px
    }

    .bet-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
      margin-bottom: 4px
    }

    .bet-badge-win {
      color: var(--win);
      background: var(--win-bg)
    }

    .bet-badge-loss {
      color: var(--loss);
      background: var(--loss-bg)
    }

    .bet-badge-pend {
      color: var(--pend);
      background: var(--pend-bg)
    }

    .bet-badge-void {
      color: var(--text-2);
      background: var(--accent-dim)
    }

    /* Cifras alineadas (tabulares) en todos los valores numéricos. */
    .stat-value,
    .kpi-value,
    .sport-roi,
    .capital-amount,
    .cap-stat-val,
    .bet-monto,
    .bet-result,
    .rolling-kpi-val,
    .kelly-card-pct,
    .hero-value {
      font-variant-numeric: tabular-nums
    }

    /* ── Skeleton loaders (carga en frío, nunca pantalla en blanco) ── */
    .skeleton {
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background-color: var(--card2);
      background-image: linear-gradient(90deg, transparent 25%, rgba(128, 128, 128, 0.20) 50%, transparent 75%);
      background-size: 200% 100%;
      animation: sk-shimmer 1.3s ease-in-out infinite;
      margin-bottom: 12px
    }

    .hero-grid .skeleton {
      margin-bottom: 0
    }

    @keyframes sk-shimmer {
      0% { background-position: 200% 0 }
      100% { background-position: -200% 0 }
    }

    .no-blur .skeleton {
      animation: none
    }

    /* ── Banner de datos en caché (fetch falló pero hay datos guardados) ── */
    .stale-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--pend-bg);
      color: var(--pend);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      margin-bottom: 12px
    }

    .stale-banner button {
      margin-left: auto;
      flex-shrink: 0;
      background: var(--pend);
      color: #000;
      border: none;
      border-radius: 999px;
      padding: 0 16px;
      min-height: 40px;
      font-family: var(--font-body);
      font-weight: 700;
      cursor: pointer
    }

    /* ── Filters ── */
    .filter-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      margin-bottom: 12px;
      scrollbar-width: none;
      padding-bottom: 2px
    }

    .filter-row::-webkit-scrollbar {
      display: none
    }

    .filter-chip {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-2);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      letter-spacing: 0.2px
    }

    .filter-chip.active {
      background: var(--accent-dim);
      border-color: var(--border-hi);
      color: var(--accent)
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 10px
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
      color: var(--text-2)
    }

    .search-input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s
    }

    .search-input:focus {
      border-color: rgba(0, 205, 150, 0.35)
    }

    .search-input::placeholder {
      color: var(--text-3)
    }

    /* ── Mes selector ── */
    .mes-selector {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px
    }

    .mes-nav {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-2);
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s
    }

    .mes-nav:active {
      transform: scale(0.92)
    }

    .mes-label {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700
    }

    /* ── Racha badge ── */
    .racha-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.2px
    }

    .racha-win {
      background: var(--win-bg);
      color: var(--win);
      border: 1px solid rgba(0, 205, 150, 0.2)
    }

    .racha-loss {
      background: var(--loss-bg);
      color: var(--loss);
      border: 1px solid rgba(255, 61, 90, 0.2)
    }

    .racha-icon {
      font-size: 18px
    }

    /* ── Loader ── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 70vh;
      gap: 20px
    }

    .loader-logo {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      animation: loader-pulse 1.5s ease-in-out infinite
    }

    .loader-logo span {
      background: linear-gradient(120deg, var(--accent) 0%, #5BE8C0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: var(--accent)
    }

    @keyframes loader-pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    .loader-bar {
      width: 80px;
      height: 2px;
      background: var(--card2);
      border-radius: 1px;
      overflow: hidden
    }

    .loader-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      animation: loader-slide 1.5s ease-in-out infinite
    }

    @keyframes loader-slide {
      0% {
        width: 0%;
        margin-left: 0
      }

      50% {
        width: 60%;
        margin-left: 20%
      }

      100% {
        width: 0%;
        margin-left: 100%
      }
    }

    .loader p {
      font-size: 13px;
      color: var(--text-2);
      font-weight: 500
    }

    /* ── Error ── */
    .error-box {
      background: var(--loss-bg);
      border: 1px solid rgba(255, 61, 90, 0.25);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      text-align: center;
      margin: 20px 0
    }

    .error-box p {
      color: var(--loss);
      font-size: 14px;
      font-weight: 600
    }

    .error-box small {
      color: var(--text-2);
      font-size: 12px
    }

    .retry-btn {
      margin-top: 14px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 9px 22px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px
    }

    /* ── Empty / Explainer ── */
    .empty {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-2);
      font-size: 13px
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0 12px
    }

    .section-header {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 14px;
      color: var(--text)
    }

    .section-header span {
      color: var(--accent)
    }

    .explainer {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.6;
      padding: 12px 14px;
      background: var(--card2);
      border-radius: var(--radius-md);
      border-left: 2px solid var(--accent);
      margin-top: 8px
    }

    .explainer strong {
      color: var(--text);
      font-weight: 600
    }

    /* ── Tipo row ── */
    .tipo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border)
    }

    .tipo-item:last-child {
      border-bottom: none
    }

    .tipo-bar-wrap {
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
      width: 100%
    }

    .tipo-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1)
    }

    /* ── Rolling chart ── */
    .rolling-kpi {
      display: flex;
      gap: 8px;
      margin-bottom: 10px
    }

    .rolling-kpi-item {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      text-align: center
    }

    .rolling-kpi-val {
      font-family: var(--font-num);
      font-size: 20px;
      font-weight: 700
    }

    .rolling-kpi-lbl {
      font-size: 10px;
      color: var(--text-2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px
    }

    /* ── Kelly meter ── */
    .kelly-meter {
      height: 12px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      overflow: hidden;
      margin: 10px 0
    }

    .kelly-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--win), #F5A623);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1)
    }

    .kelly-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px
    }

    .kelly-card {
      background: var(--card2);
      border-radius: var(--radius-md);
      padding: 14px;
      text-align: center;
      border: 1px solid var(--border)
    }

    .kelly-card-pct {
      font-family: var(--font-num);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent)
    }

    .kelly-card-lbl {
      font-size: 10px;
      color: var(--text-2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px
    }

    .kelly-card-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 3px
    }

    /* ── Temporal ── */
    .dia-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border)
    }

    .dia-row:last-child {
      border-bottom: none
    }

    .dia-label {
      font-size: 12px;
      font-weight: 700;
      width: 36px;
      flex-shrink: 0;
      color: var(--text-2)
    }

    .dia-bar-wrap {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden
    }

    .dia-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1)
    }

    .dia-roi {
      font-family: var(--font-num);
      font-size: 11px;
      font-weight: 700;
      width: 52px;
      text-align: right;
      flex-shrink: 0
    }

    .dia-wl {
      font-size: 10px;
      color: var(--text-2);
      width: 56px;
      text-align: right;
      flex-shrink: 0
    }

    /* ── Gestión CRUD ── */
    .g-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px
    }

    .btn-add {
      -webkit-appearance: none;
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background-color: #00CD96;
      color: #000;
      border: none;
      border-radius: var(--radius-md);
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      min-height: 40px;
      box-shadow: 0 0 14px rgba(0, 205, 150, 0.35)
    }

    .btn-add:active {
      opacity: .75;
      transform: scale(0.97)
    }

    .g-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 8px
    }

    .g-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px
    }

    .g-teams {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35
    }

    .g-meta {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 3px;
      line-height: 1.4
    }

    .g-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0
    }

    .btn-edit {
      background: rgba(255, 255, 255, 0.07);
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 9px;
      font-size: 13px;
      cursor: pointer
    }

    .btn-del {
      background: rgba(255, 61, 90, 0.12);
      color: var(--loss);
      border: 1px solid rgba(255, 61, 90, 0.2);
      border-radius: var(--radius-sm);
      padding: 6px 9px;
      font-size: 13px;
      cursor: pointer
    }

    /* Modal */
    .m-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.72);
      z-index: 9999;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: var(--nav-h)
    }

    /* Modal — estructura flexbox con footer sticky */
    .m-sheet {
      background: var(--surface);
      border-radius: 20px 20px 16px 16px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.6)
    }

    .m-handle {
      width: 36px;
      height: 4px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0
    }

    .m-head {
      padding: 12px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border)
    }

    .m-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 16px 8px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain
    }

    .m-foot {
      flex-shrink: 0;
      padding: 12px 16px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      background: var(--surface);
      border-top: 1px solid var(--border)
    }

    .m-title {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .m-close {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-2);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .m-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 5px
    }

    .m-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      box-sizing: border-box;
      transition: border-color .2s
    }

    .m-input:focus {
      border-color: rgba(0, 205, 150, .4)
    }

    .m-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px
    }

    .m-group {
      margin-bottom: 11px
    }

    .m-date-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px
    }

    .m-now-btn {
      flex-shrink: 0;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap
    }

    .m-submit {
      display: block;
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius-md);
      padding: 14px;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: .2px;
      transition: opacity .15s
    }

    .m-submit:active,
    .m-submit:disabled {
      opacity: .6
    }

    .m-submit:disabled {
      cursor: not-allowed
    }

    .m-err {
      font-size: 12px;
      color: var(--loss);
      margin-bottom: 8px;
      display: none;
      padding: 8px 10px;
      background: rgba(255, 80, 80, .08);
      border-radius: 6px;
      border: 1px solid rgba(255, 80, 80, .2)
    }

    /* Upload zone */
    .u-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 12px;
      transition: border-color .2s
    }

    .u-zone:hover,
    .u-zone.drag {
      border-color: var(--accent)
    }

    .u-icon {
      font-size: 30px;
      margin-bottom: 6px
    }

    .u-text {
      font-size: 13px;
      color: var(--text-2)
    }

    .u-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 3px
    }

    .u-analyzing {
      background: rgba(245, 166, 35, .1);
      border: 1px solid rgba(245, 166, 35, .25);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 12px;
      color: var(--pend);
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px
    }

    /* Secret banner */
    .secret-banner {
      background: rgba(245, 166, 35, .08);
      border: 1px solid rgba(245, 166, 35, .2);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.5
    }

    .secret-banner strong {
      color: var(--pend)
    }

    .secret-input {
      margin-top: 10px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      padding: 9px 12px;
      box-sizing: border-box;
      outline: none
    }

    .secret-save {
      margin-top: 8px;
      background: var(--pend);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer
    }

    /* ── Patrones IA: render enriquecido ── */
    .pat-wrap { display:flex; flex-direction:column; gap:12px; }

    .pat-hero {
      display:flex; align-items:center; gap:10px;
      font-family: var(--font-head); font-size:16px; font-weight:800; letter-spacing:-.2px;
      color: var(--text); padding:13px 15px; border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent-dim), rgba(0,205,150,.02));
      border:1px solid var(--border-hi);
    }
    .pat-hero .pat-ico { font-size:21px; line-height:1; flex-shrink:0; }

    .pat-sec {
      display:flex; align-items:center; gap:9px; margin-top:6px;
      padding:9px 13px; border-radius: var(--radius-md);
      font-family: var(--font-head); font-weight:800; font-size:12px;
      text-transform:uppercase; letter-spacing:.7px;
      background: var(--card2); border-left:3px solid var(--text-3);
    }
    .pat-sec .pat-ico { font-size:17px; line-height:1; flex-shrink:0; }
    .pat-sec--good { border-left-color: var(--win);  color:#d6fff2; background: rgba(0,205,150,.07); }
    .pat-sec--bad  { border-left-color: var(--loss); color:#ffd9df; background: rgba(255,61,90,.07); }
    .pat-sec--info { border-left-color: var(--accent); color: var(--text); }
    .pat-sec--plan { border-left-color: var(--pend); color:#ffe9c2; background: rgba(245,166,35,.08); }

    .pat-card {
      display:flex; flex-direction:column; gap:8px;
      background: var(--card); border:1px solid var(--border);
      border-left:3px solid var(--text-3); border-radius: var(--radius-md); padding:12px 14px;
    }
    .pat-card--good { border-left-color: var(--win); }
    .pat-card--bad  { border-left-color: var(--loss); }
    .pat-card--info { border-left-color: var(--accent); }
    .pat-card--plan { border-left-color: var(--pend); }
    .pat-card-title { font-size:13.5px; font-weight:700; color: var(--text); line-height:1.35; }

    .pat-metrics { display:flex; flex-wrap:wrap; gap:6px; }
    .pat-metric {
      display:inline-flex; flex-direction:column; align-items:flex-start;
      padding:5px 9px; border-radius: var(--radius-sm);
      background: var(--card2); border:1px solid var(--border);
    }
    .pat-metric-k { font-size:8.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color: var(--text-3); }
    .pat-metric-v { font-family: var(--font-num); font-size:13px; font-weight:700; color: var(--text); line-height:1.25; }
    .pat-metric--roi-pos,.pat-metric--money-pos { border-color: rgba(0,205,150,.3); background: var(--win-bg); }
    .pat-metric--roi-pos .pat-metric-v,.pat-metric--money-pos .pat-metric-v { color: var(--win); }
    .pat-metric--roi-neg,.pat-metric--money-neg { border-color: rgba(255,61,90,.3); background: var(--loss-bg); }
    .pat-metric--roi-neg .pat-metric-v,.pat-metric--money-neg .pat-metric-v { color: var(--loss); }
    .pat-metric--wr .pat-metric-v { color: var(--accent); }
    .pat-metric--sample .pat-metric-v { color: var(--text-2); font-size:12px; }

    .pat-tip,.pat-warn,.pat-note {

    function applyTelegramTheme() {

    async function safeJson(resp) {
      let j = null;
      try { j = await resp.json(); } catch (_) { j = null; }
      if (!resp.ok || j === null) {
        const byStatus = {
          413: "Imagen demasiado grande. Reduce tamaño o resolución.",

          await new Promise(r => setTimeout(r, 600 * (i + 1)));

        return res;

    function _showStaleBanner() {
      const cont = document.querySelector(".content");
      if (!cont || document.getElementById("staleBanner")) return;
      const b = document.createElement("div");
      b.id = "staleBanner";
      b.className = "stale-banner";
      b.innerHTML = `<span>⚠️ Mostrando datos guardados (sin conexión).</span><button data-action="recargar">Reintentar</button>`;
      cont.insertBefore(b, cont.firstChild);

    async function cargarDatos() {
      if (!tg?.initData) {
        renderApp();
        setTimeout(() => {
          showTab("gestion");
        }, 0);
        return;
      }
      // 1) Pintado instantáneo desde caché de sesión (o skeleton si es carga en frío).
      const cached = _loadStatsCache();
      const paintedFromCache = !!(cached && cached.resumen && Array.isArray(cached.apuestas));
      if (paintedFromCache) _applyStats(cached);
      else _renderSkeleton();
      // 2) Refresco fresco desde la API en segundo plano.
      if (_ctrl) _ctrl.abort();
      _ctrl = new AbortController();
      const timeout = setTimeout(() => _ctrl.abort(), 12000);
      try {
        const res = await fetchRetry503(`${API_URL}/api/stats`, { headers: apiHeaders(), signal: _ctrl.signal });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const json = await res.json();
        if (!json.resumen || !Array.isArray(json.apuestas)) throw new Error("Datos inesperados");
        _saveStatsCache(json);
        // Evita re-render (parpadeo/reset de scroll) si nada cambió respecto a la caché.
        if (!paintedFromCache || JSON.stringify(json) !== JSON.stringify(cached)) _applyStats(json);
      } catch (e) {
        const msg = e.name === "AbortError"
          ? "Tiempo de espera agotado (12s). Verifica tu conexión o que el backend esté disponible."
          : e.message;
        if (paintedFromCache) {
          _showStaleBanner();   // ya hay datos en pantalla: avisar sin romper la vista
        } else {
          document.getElementById("app").innerHTML = `<div style="padding:20px"><div class="error-box"><p>Sin conexión</p><br><small>${esc(msg)}</small><br><button class="retry-btn" data-action="recargar">↻ Reintentar</button></div></div>`;
        }
      } finally { clearTimeout(timeout); }
    }

    /* ── Analytics helpers (client-side) ── */
    function normalizaTipo(raw) {
      const t = (raw || "").toLowerCase().trim();
      if (!t) return "Otro";
      // Parlay — primero: puede contener "winner", "over", etc. en sus picks
      if (/parlay|combo|acumulad|multi.?bet|\bsgp\b|same.?game/.test(t)) return "Parlay";
      // Futuro / Outright
      if (/\boutright\b|futures?|to win the|championship|tournament winner|season (wins?|points?|goals?)|award|mvp|heisman|ballon/.test(t)) return "Futuro";
      // Moneyline / Ganador — DNB, to qualify, W1/W2, fight/race winner, MMA
      if (/moneyline|\b1x2\b|\bml\b|ganador|team wins?|\bw[12]\b|\bwinner\b|to win\b|match result|draw no bet|\bdnb\b|to qualify|fight winner|race winner|series winner|method of victory|\bko\b|\btko\b|decision win|round betting|will win/.test(t)) return "Moneyline";
      // Handicap — puck line (NHL), run line (MLB), point spread, AH
      if (/handicap|hcp|\bspread\b|\basian\b|puck line|run line|point spread|european handicap|\beh\b|alt(ernate)? spread/.test(t)) return "Handicap";
      // BTTS
      if (/ambos|btts|both teams to score|\bgg\b|no goal/.test(t)) return "BTTS";
      // Marcador exacto
      if (/correct score|marcador exacto|resultado exacto|exact score/.test(t)) return "Marcador exacto";
      // Props — va ANTES de Total O/U: "Player Points Over 25.5" debe ser Prop, no Total O/U
      if (/\bplayer\b|\bprop\b|anytime (scorer|td|goal|basket|touchd)|first (goal|scorer|td|basket|pitch|serve|touchd)|last (goal|scorer|td|touchd)|to score\b|rushing yards|receiving yards|passing yards|\bassists?\b|\brebounds?\b|strikeouts?\b|home run|top (batsman|bowler|scorer)|fall of wicket|wickets?\b|century\b/.test(t)) return "Props";
      // Total O/U — \b evita "overtime", "overview", etc.
      if (/\bover\b|\bunder\b|\btotal\b|\bo\/u\b|más de|menos de|alt(ernate)? total|\bgames? o\/?u\b|\bsets? o\/?u\b|\bruns? o\/?u\b|half total|1st half total|q[1-4] total/.test(t)) return "Total O/U"; return "Otro";
    }

    function calcRoiPorTipo() {
      const bucket = {};
      DATA.apuestas.filter(a => a.status === "win" || a.status === "loss").forEach(a => {
        const t = normalizaTipo(a.tipo);
        if (!bucket[t]) bucket[t] = { w: 0, l: 0, apo: 0, gan: 0, cuotas: [] };
        const b = bucket[t];
        b.apo += a.monto || 0;
        if (parseFloat(a.cuota) > 1.01) b.cuotas.push(parseFloat(a.cuota));
        if (a.status === "win") { b.w++; b.gan += a.ganancia || a.monto || 0; }
        else b.l++;
      });
      return Object.entries(bucket)
        .filter(([, b]) => b.w + b.l >= 1)
        .map(([tipo, b]) => {
          const total = b.w + b.l, neto = b.gan - b.apo;
          return { tipo, wins: b.w, losses: b.l, apo: b.apo, neto, roi: b.apo > 0 ? neto / b.apo * 100 : 0, wr: total > 0 ? b.w / total * 100 : 0, cuotaMedia: b.cuotas.length > 0 ? b.cuotas.reduce((a, c) => a + c, 0) / b.cuotas.length : 0 };
        })
        .sort((a, b) => b.roi - a.roi);
    }

    /* ── Helper: convierte un Date UTC a sus componentes en hora CDMX ── */
    const _mxFmt = (() => { try { return new Intl.DateTimeFormat("en-US", { timeZone: "America/Mexico_City", weekday: "short", hour: "numeric", hour12: false }); } catch (e) { return null; } })();
    function toMXParts(dt) {
      try {
        const parts = (_mxFmt || new Intl.DateTimeFormat("en-US", {
          timeZone: "America/Mexico_City",
          weekday: "short",       // "Mon", "Tue"…
          hour: "numeric",
          hour12: false
        })).formatToParts(dt);
        const get = t => parts.find(p => p.type === t)?.value ?? "0";
        const WEEK_SHORT = ["Sun", "Mon", "Tue", "Wed", "Thu", "Fri", "Sat"];
        return {
          dow: WEEK_SHORT.indexOf(get("weekday")),   // 0=Dom … 6=Sáb
          hour: parseInt(get("hour"), 10)              // 0-23
        };
      } catch (e) {
        // Fallback: UTC-6 fijo (funciona sin soporte de Intl avanzado)
        const local = new Date(dt.getTime() - 6 * 3600000);
        return { dow: local.getUTCDay(), hour: local.getUTCHours() };
      }
    }

    function calcTemporal() {
      const DIAS = ["Lun", "Mar", "Mié", "Jue", "Vie", "Sáb", "Dom"];
      const FRANJAS = ["00-06", "06-10", "10-14", "14-18", "18-22", "22-00"];
      const db = {}, hb = {};
      DIAS.forEach(d => { db[d] = { w: 0, l: 0, apo: 0, gan: 0 } });
      FRANJAS.forEach(f => { hb[f] = { w: 0, l: 0, apo: 0, gan: 0 } });

      DATA.apuestas.filter(a => (a.status === "win" || a.status === "loss") && (a.fecha_partido || a.fecha)).forEach(a => {

        // ── DÍA DE SEMANA: usa fecha del EVENTO (no de registro) ──
        const fechaEvento = a.fecha_partido
          ? new Date(a.fecha_partido + "T12:00:00")   // mediodía local, sin desplazamiento UTC
          : new Date(a.fecha.replace(" ", "T") + "Z");
        if (isNaN(fechaEvento)) return;

        const dowEvento = fechaEvento.getDay();         // 0=Dom … 6=Sáb
        const diaIdx = dowEvento === 0 ? 6 : dowEvento - 1;
        const dia = DIAS[diaIdx];

        db[dia].apo += a.monto || 0;
        if (a.status === "win") { db[dia].w++; db[dia].gan += a.ganancia || a.monto || 0; }
        else db[dia].l++;

        // ── FRANJA HORARIA: usa fecha/hora de REGISTRO ──
        if (a.fecha) {
          const dtReg = new Date(a.fecha.replace(" ", "T") + "Z");
          if (!isNaN(dtReg)) {
            const { hour } = toMXParts(dtReg);
            const franja = hour < 6 ? "00-06" : hour < 10 ? "06-10" : hour < 14 ? "10-14" :
              hour < 18 ? "14-18" : hour < 22 ? "18-22" : "22-00";
            hb[franja].apo += a.monto || 0;
            if (a.status === "win") { hb[franja].w++; hb[franja].gan += a.ganancia || a.monto || 0; }
            else hb[franja].l++;
          }
        }
      });

      const toStats = (label, b) => {
        const total = b.w + b.l, neto = b.gan - b.apo;
        return {
          label, wins: b.w, losses: b.l, neto, roi: b.apo > 0 ? neto / b.apo * 100 : 0,
          wr: total > 0 ? b.w / total * 100 : 0, total
        };
      };
      return {
        porDia: DIAS.map(d => toStats(d, db[d])).filter(x => x.total > 0),
        porHora: FRANJAS.map(f => toStats(f, hb[f])).filter(x => x.total > 0)
      };
    }

    function calcRolling(ventana = 20) {
      const res = DATA.apuestas.filter(a => a.status === "win" || a.status === "loss");
      if (res.length < ventana) return [];
      const points = [];
      let netoAcum = 0;
      for (let i = 0; i < res.length; i++) {
        const a = res[i];
        if (a.status === "win") netoAcum += (a.ganancia || a.monto || 0) - (a.monto || 0);
        else netoAcum -= a.monto || 0;
        if (i < ventana - 1) continue;
        const win = res.slice(i - ventana + 1, i + 1);
        const w = win.filter(x => x.status === "win").length;
        const apo = win.reduce((s, x) => s + (x.monto || 0), 0);
        const gan = win.reduce((s, x) => x.status === "win" ? s + (x.ganancia || x.monto || 0) : s, 0);
        const roi = apo > 0 ? (gan - apo) / apo * 100 : 0;
        points.push({ i, roi, wr: w / ventana * 100, netoAcum });
      }
      return points;
    }

    function calcKelly() {
      const res = DATA.apuestas.filter(a => a.status === "win" || a.status === "loss");
      if (res.length < 10) return null;
      const p = res.filter(a => a.status === "win").length / res.length;
      const cuotas = res.map(a => parseFloat(a.cuota)).filter(c => c > 1.01);  // solo bets resueltas
      if (!cuotas.length) return null;
      const b = cuotas.reduce((s, c) => s + c, 0) / cuotas.length - 1;
      if (b <= 0) return null;
      const f = Math.max(0, Math.min((p * (b + 1) - 1) / b, 0.25));
      const ev = p * b - (1 - p);
      return { f, fMedio: f / 2, fCuarto: f / 4, p: p * 100, cuotaMedia: b + 1, ev };
    }

    /* ── Patrones IA: conversión de Markdown de Claude a render enriquecido ──
       El texto que devuelve Claude cambia en cada análisis, así que el parser
       trabaja sobre patrones estables (encabezados ##, líneas de métricas
       ROI/WR, confianza, recomendaciones 💡, avisos ⚠️). Todo lo que no encaje
       cae con gracia a un párrafo: nunca se pierde contenido. */
    function _patInline(s) {
      // Resalta porcentajes y montos con signo (+verde / −rojo)
      s = s.replace(/([+\-−]\s?\d+(?:[.,]\d+)?\s?%)/g, m => `<span class="pat-num ${/[-−]/.test(m) ? "neg" : "pos"}">${m}</span>`);
      s = s.replace(/([+\-−]\s?\d[\d.,]*\s?€)/g, m => `<span class="pat-num ${/[-−]/.test(m) ? "neg" : "pos"}">${m}</span>`);
      s = s.replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>");
      s = s.replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
      s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
      return s;
    }
    function _patSplitIcon(txt) {
      const sp = txt.indexOf(" ");
      if (sp > 0) {
        const first = txt.slice(0, sp);
        if (!/[A-Za-z0-9À-ÿ]/.test(first)) return { ico: first, rest: txt.slice(sp + 1).trim() };
      }
      return { ico: "", rest: txt };
    }
    function _patIsStat(line) {
      const t = line.trim();
      if (/^(📈|📉)/.test(t)) return true;
      return /\bROI\b/i.test(t) && /\bWR\b/i.test(t) && /%/.test(t);
    }
    function _patKind(line) {
      const t = line.trim();
      if (_patIsStat(line)) return "stat";
      if (/confianza/i.test(t)) return "conf";
      if (t.startsWith("💡")) return "tip";
      if (t.startsWith("⚠")) return "warn";
      if (t.startsWith("✅")) return "note";
      if (/^[-–—•]\s+/.test(t)) return "bullet";
      if (/^\d+[.)]\s+/.test(t)) return "num";
      return "text";
    }
    function _patTheme(txt) {
      const t = txt.toLowerCase();
      if (/plan de acci|plan\b/.test(t)) return "plan";
      if (/anti.?patr|evitar|fuga|❌|🚫|✕/.test(t)) return "bad";
      if (/fuerte|\+ev|favorab|✅|ganador/.test(t)) return "good";
      return "info";
    }
    function _patChip(k, v, cls) {
      return `<span class="pat-metric pat-metric--${cls}"><span class="pat-metric-k">${esc(k)}</span><span class="pat-metric-v">${esc(v)}</span></span>`;
    }
    function _patMetrics(line) {
      const chips = [];
      const roi = line.match(/ROI\s*([+\-−]?\s*\d+(?:[.,]\d+)?)\s*%/i);
      if (roi) { const v = roi[1].replace(/\s/g, "").replace("−", "-"); chips.push(_patChip("ROI", v + "%", v.startsWith("-") ? "roi-neg" : "roi-pos")); }
      const wr = line.match(/\bWR\s*[: ]?\s*(\d+(?:[.,]\d+)?)\s*%/i) || line.match(/winrate\s*[: ]?\s*(\d+(?:[.,]\d+)?)\s*%/i);
      if (wr) chips.push(_patChip("WR", wr[1] + "%", "wr"));
      const smp = line.match(/(\d+)\s*W\s*[-–—]\s*(\d+)\s*L/i);
      if (smp) chips.push(_patChip("Muestra", smp[1] + "W-" + smp[2] + "L", "sample"));
      const mon = line.match(/([+\-−]?\s*\d[\d.,]*\s*€)/);
      if (mon) { const v = mon[1].replace(/\s/g, "").replace("−", "-"); chips.push(_patChip("Neto", v, v.startsWith("-") ? "money-neg" : "money-pos")); }
      if (!chips.length) return `<div class="pat-p">${_patInline(line.trim())}</div>`;
      return `<div class="pat-metrics">${chips.join("")}</div>`;
    }
    function _patConf(line) {
      const m = line.match(/confianza\s*:?\s*(.+)$/i);
      const lbl = (m ? m[1] : line).replace(/[*_`🛡️]/g, "").trim();
      const low = lbl.toLowerCase();
      const cls = /baja/.test(low) ? "baja" : /alta/.test(low) ? "alta" : /media/.test(low) ? "media" : "baja";
      return `<div class="pat-conf pat-conf--${cls}"><span class="pat-conf-dot"></span>Confianza <strong>${_patInline(lbl)}</strong></div>`;
    }
    function _patCallLine(line, cls) {
      const { ico, rest } = _patSplitIcon(line.trim());
      const fb = cls === "warn" ? "⚠️" : cls === "note" ? "✅" : "💡";
      return `<div class="pat-${cls}"><span class="pat-ico">${ico || fb}</span><span>${_patInline(rest)}</span></div>`;
    }
    function _patSteps(block) {
      const rows = block.map((l, i) => {
        const m = l.trim().match(/^\d+[.)]\s+(.*)$/);
        return `<div class="pat-step"><span class="pat-step-n">${i + 1}</span><span class="pat-step-t">${_patInline((m ? m[1] : l).trim())}</span></div>`;
      });
      return `<div class="pat-steps">${rows.join("")}</div>`;
    }
    function _patBullets(block) {
      const items = block.map(l => `<li>${_patInline(l.trim().replace(/^[-–—•]\s+/, ""))}</li>`);
      return `<ul class="pat-list">${items.join("")}</ul>`;
    }
    function _patCard(block, theme) {
      let inner = "", titled = false;
      for (const line of block) {
        const k = _patKind(line);
        if (k === "stat") inner += _patMetrics(line);
        else if (k === "conf") inner += _patConf(line);
        else if (k === "tip" || k === "warn" || k === "note") inner += _patCallLine(line, k);
        else if (k === "bullet") inner += `<div class="pat-li">${_patInline(line.trim().replace(/^[-–—•]\s+/, ""))}</div>`;
        else if (!titled) { inner += `<div class="pat-card-title">${_patInline(line.trim())}</div>`; titled = true; }
        else inner += `<div class="pat-p">${_patInline(line.trim())}</div>`;
      }
      return `<div class="pat-card pat-card--${theme}">${inner}</div>`;
    }
    function _patCallout(block) {
      let out = "";
      for (const line of block) {
        const k = _patKind(line);
        if (k === "tip" || k === "warn" || k === "note") out += _patCallLine(line, k);
        else if (k === "conf") out += _patConf(line);
        else if (k === "bullet") out += `<div class="pat-li">${_patInline(line.trim().replace(/^[-–—•]\s+/, ""))}</div>`;
        else out += `<div class="pat-p">${_patInline(line.trim())}</div>`;
      }
      return out;
    }
    function _patBlock(block, theme) {
      if (block.every(l => /^\d+[.)]\s+/.test(l.trim()))) return _patSteps(block);
      if (block.every(l => /^[-–—•]\s+/.test(l.trim()))) return _patBullets(block);
      if (block.some(_patIsStat) || block.some(l => /confianza/i.test(l))) return _patCard(block, theme);
      return _patCallout(block);
    }
    function _patHeader(txt, lvl, theme) {
      const { ico, rest } = _patSplitIcon(txt);
      if (lvl === 1) return `<div class="pat-hero"><span class="pat-ico">${ico || "📊"}</span><span>${_patInline(rest)}</span></div>`;
      return `<div class="pat-sec pat-sec--${theme}"><span class="pat-ico">${ico || "•"}</span><span>${_patInline(rest)}</span></div>`;
    }
    function renderPatronesMarkdown(raw) {
      const lines = esc(raw || "").replace(/\r/g, "").split("\n");
      let html = "", block = [], theme = "info";
      const flush = () => { if (block.length) { html += _patBlock(block, theme); block = []; } };
      for (const ln of lines) {
        const line = ln.replace(/\s+$/, "");
        if (!line.trim()) { flush(); continue; }
        const h = line.match(/^(#{1,3})\s+(.*)$/);
        if (h) { flush(); theme = _patTheme(h[2]); html += _patHeader(h[2].trim(), h[1].length, theme); continue; }
        if (/^\s*([-–—_*=]\s*){3,}$/.test(line)) { flush(); continue; } // separador ---
        block.push(line);
      }
      flush();
      return `<div class="pat-wrap">${html}</div>`;
    }

    /* ── Motor de Neto Mensual (ANM): render de tarjetas/chips ──
       Consume el campo aditivo neto_mensual de /api/patterns. Presentación pura
       (esc() + sin eventos inline). Tolera ausencia/error del campo. */
    function renderNetoMensual(nm) {
      if (!nm || nm.error || !Array.isArray(nm.por_mes) || !nm.por_mes.length) return "";
      const money = v => (v >= 0 ? "+" : "") + Math.round(v).toLocaleString("es-MX");
      const dom = nm.patron_dominante;
      const mejor = nm.mejor_mes;
      // Pico neto del mejor mes, con fallback a neto final (datos cacheados sin neto_max).
      const _mejorPico = mm => (typeof mm.neto_max === "number") ? mm.neto_max : mm.neto;

      const resumen = `
        <div class="nm-resumen">
          <div class="nm-stat">
            <span class="nm-stat-k">Motor dominante</span>
            <span class="nm-stat-v">${dom ? esc(dom.patron) : "—"}</span>
            <small>${dom ? `top en ${dom.meses_top} ${dom.meses_top === 1 ? "mes" : "meses"} · neto ${money(dom.neto_acumulado)}` : ""}</small>
          </div>
          <div class="nm-stat">
            <span class="nm-stat-k">Mejor mes</span>
            <span class="nm-stat-v ${mejor && _mejorPico(mejor) >= 0 ? "pos" : ""}">${mejor ? esc(mejor.mes) : "—"}</span>
            <small>${mejor ? `pico ${money(_mejorPico(mejor))} · ${esc(mejor.driver.patron)}` : ""}</small>
          </div>
          <div class="nm-stat">
            <span class="nm-stat-k">Estabilidad</span>
            <span class="nm-stat-v ${nm.estabilidad === "sistematico" ? "pos" : "neg"}">${nm.estabilidad === "sistematico" ? "Sistemática" : "Variable"}</span>
            <small>${nm.estabilidad === "sistematico" ? "patrón recurrente" : "depende del azar"}</small>
          </div>
        </div>`;

      const tarjetas = nm.por_mes.slice().reverse().map(m => {
        const d = m.driver;
        // Pico neto intra-mes (neto máximo alcanzado). Fallback a neto final si el
        // backend aún no envía neto_max (análisis cacheado previo).
        const pico = (typeof m.neto_max === "number") ? m.neto_max : m.neto;
        const conc = Math.min(100, Math.max(0, m.concentracion_pct || 0));
        const lowBadge = d.muestra_baja ? `<span class="nm-badge low">muestra baja</span>` : "";
        const dims = ["deporte", "tipo", "dia", "cuota"].map(k => {
          const dd = m.por_dimension && m.por_dimension[k];
          return dd ? `<span class="nm-dim"><b>${esc(dd.valor)}</b> ${money(dd.neto)}</span>` : "";
        }).join("");
        return `
          <div class="nm-card">
            <div class="nm-card-head">
              <span class="nm-mes">${esc(m.mes)}</span>
              <span class="nm-neto ${pico >= 0 ? "pos" : "neg"}">${money(pico)}<small class="nm-neto-tag">pico</small></span>
            </div>
            <div class="nm-driver">
              <span class="nm-chip">${esc(d.patron)}</span>${lowBadge}
              <small>${d.wins}W-${d.losses}L · ROI ${Math.round(d.roi)}%</small>
            </div>
            <div class="nm-bar" title="Concentración del neto en el driver">
              <div class="nm-bar-fill" style="width:${conc.toFixed(0)}%"></div>
              <span class="nm-bar-lbl">${conc.toFixed(0)}% del neto</span>
            </div>
            <div class="nm-dims">${dims}</div>
          </div>`;
      }).join("");

      return `
        <div class="nm-wrap">
          <div class="pat-sec pat-sec--info"><span class="pat-ico">⚙️</span><span>Motor de Neto Mensual</span></div>
          ${resumen}
          <div class="nm-grid">${tarjetas}</div>
        </div>`;
    }

    async function fetchPatrones(force = false) {
      if (_patronesCargando) return;
      _patronesCargando = true;
      const el = document.getElementById("patrones");
      if (el) {
        el.innerHTML = `<div class="section-header">Patrones <span>IA</span></div>

            <small style="color:var(--text-3)">(Este proceso puede tardar unos 10-20 segundos)</small>
          </div>`;
      }
      try {
        const url = `${API_URL}/api/patterns` + (force ? "?force=true" : "");
        const res = await fetchRetry503(url, { headers: apiHeaders() });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        _patronesData = await res.json();
        if (!_patronesData.error) _guardarPatrones(_patronesData);

        _patronesData = { error: e.message };

        _patronesCargando = false;
        renderPatrones();

    function renderApuestas() {

    function renderApuestasList() {
      const term = filtroEquipo.toLowerCase().trim();
      const filt = DATA.apuestas.filter(a => filtroDeporte === "Todos" || a.deporte === filtroDeporte).filter(a => !term || (a.equipo1 || "").toLowerCase().includes(term) || (a.equipo2 || "").toLowerCase().includes(term));
      const mostrar = [...filt].reverse().slice(0, 50);
      const truncated = filt.length > 50; return `<div class="card"><div class="card-title">${filt.length} apuesta${filt.length !== 1 ? "s" : ""}${truncated ? " <span style='color:var(--text-2);font-weight:400;font-size:10px'>(mostrando últimas 50)</span>" : ""}</div>${mostrar.length === 0 ? '<div class="empty">Sin resultados</div>' : mostrar.map(renderBetItem).join("")}</div>`;
    }
    const _RE_SUFIJO_HOME_AWAY = /^((?:Asian\s+Handicap|Handicap|Moneyline|1X2)(?:\s+[+\-]?\d+(?:\.\d+)?)?)\s*-\s*(Home|Away|Draw|Empate|Local|Visitante)\s*$/i;

    function formatTipoApuesta(a) {
      let t = (a?.tipo || "").trim();
      if (!t) return "";

      // 1) Unificar 1X2 → Moneyline.
      t = t.replace(/^1X2\b/i, "Moneyline");

      // 2) Traducir Home/Away/Draw → equipo concreto.
      const m = t.match(_RE_SUFIJO_HOME_AWAY);
      if (!m) return t;

      const base = m[1].trim();
      const sel = m[2].trim().toLowerCase();
      const eq1 = (a.equipo1 || "").trim();
      const eq2 = (a.equipo2 || "").trim();

      if (sel === "home" || sel === "local") return eq1 ? `${base} - ${eq1}` : t;
      if (sel === "away" || sel === "visitante") return eq2 ? `${base} - ${eq2}` : t;
      if ((sel === "draw" || sel === "empate") && /^moneyline/i.test(base))
        return `${base} - Empate`;
      return t;
    }

    function renderBetItem(a) {
      const icon = a.status === "win" ? "win" : a.status === "loss" ? "loss" : a.status === "void" ? "pend" : "pend";
      const res = a.status === "win" ? `+${fmt(a.ganancia)}` : a.status === "loss" ? `-${fmt(a.monto)}` : a.status === "void" ? `🔄 Nula` : ` ⏳ ${fmt(a.potencial)}`;
      const rc = a.status === "win" ? "green" : a.status === "loss" ? "red" : a.status === "void" ? "accent" : "yellow";
      const _stMap = { win: ["Ganada", "win"], loss: ["Perdida", "loss"], void: ["Nula", "void"] };
      const [statusLabel, badgeKey] = _stMap[a.status] || ["Pendiente", "pend"];
      const esParlay = (a.equipo2 || "").startsWith("PARLAY");
      const teamsLabel = esParlay ? `🎯 Parlay · ${esc(a.equipo2 || "")}` : `${esc(a.equipo1 || "?")} vs ${esc(a.equipo2 || "?")}`;
      const metaLabel = esParlay ? `${esc(a.deporte)} · Acumulador @ ${esc(a.cuota)} · ${(a.fecha_partido || a.fecha)?.slice(0, 10) || ""}` : `${esc(a.deporte)} · ${esc(formatTipoApuesta(a))} @ ${esc(a.cuota)} · ${(a.fecha_partido || a.fecha)?.slice(0, 10) || ""}`;
      return `<div class="bet-item"><div class="bet-dot ${icon}"></div><div class="bet-info"><div class="bet-teams">${teamsLabel}</div><div class="bet-meta">${metaLabel}</div></div><div class="bet-right"><div class="bet-badge bet-badge-${badgeKey}">${statusLabel}</div><div class="bet-monto">${fmt(a.monto)}</div><div class="bet-result ${rc}">${res}</div></div></div>`;
    }

      if (!all.length) return;
      const points = rollingShow >= 9999 ? all : all.slice(-rollingShow);
      charts.rolling = new Chart(c, { type: "line", data: { labels: points.map(p => `#${p.i + 1}`), datasets: [{ label: "ROI rodante", data: points.map(p => parseFloat(p.roi.toFixed(2))), borderColor: "#00CD96", backgroundColor: "rgba(0,205,150,0.08)", borderWidth: 2, pointRadius: 0, fill: true, tension: 0.3 }] }, options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => `${ctx.parsed.y >= 0 ? "+" : ""}${ctx.parsed.y.toFixed(1)}%` } } }, scales: { x: { grid: { color: cssVar("--chart-grid") }, ticks: { display: false } }, y: { grid: { color: cssVar("--chart-grid") }, ticks: { callback: v => `${v >= 0 ? "+" : ""}${v}%`, font: { size: 10, family: "Space Mono" }, color: cssVar("--chart-tick") }, afterDataLimits: scale => { const pad = Math.abs(scale.max - scale.min) * 0.15; scale.max += pad; scale.min -= pad; } } } } });
    }

      Chart.defaults.borderColor = cssVar("--chart-grid");
      // Tooltips táctiles temáticos (se activan al tocar la gráfica en móvil).
      Chart.defaults.plugins.tooltip.backgroundColor = cssVar("--card2");
      Chart.defaults.plugins.tooltip.titleColor = cssVar("--text");
      Chart.defaults.plugins.tooltip.bodyColor = cssVar("--text");
      Chart.defaults.plugins.tooltip.borderColor = cssVar("--border");
      Chart.defaults.plugins.tooltip.borderWidth = 1;
      Chart.defaults.plugins.tooltip.padding = 10;
      Chart.defaults.interaction = { mode: "index", intersect: false };
      if (tabActual === "resumen") { makeChartNeto(); makeChartMeses(); }
      if (tabActual === "deportes") { makeChartDep(); }
      if (tabActual === "tipos") { makeChartTipo(); }
      if (tabActual === "rolling") { makeChartRolling(); }

      const rs = e.target.closest("[data-rolling-show]");
      if (rs) { rollingShow = parseInt(rs.dataset.rollingShow, 10); haptic("select"); document.querySelectorAll("[data-rolling-show]").forEach(b => b.classList.toggle("active", b === rs)); destroyChart("rolling"); makeChartRolling(); return; }
      const grp = e.target.closest("[data-group]");

      const sub = e.target.closest("[data-section]");
      if (sub) { haptic("select"); showTab(sub.dataset.section); return; }
      const advOpen = e.target.closest("[data-advanced]");

      if (advClose) { closeAdvanced(); return; }
      const mes = e.target.closest("[data-mes-dir]");
      if (mes) { cambiarMes(parseInt(mes.dataset.mesDir, 10)); return; }
      
      const actEl = e.target.closest("[data-action]");
      const act = actEl?.dataset.action;
      
      if (e.target.id === "mOverlay") { closeModal(); return; }
      
      if (act) {
        if (act === "recargar") { recargar(); return; }
        if (act === "new-bet") { openModal(null, null); return; }
        if (act === "edit-bet") { openModal(parseInt(actEl.dataset.rowid, 10), parseInt(actEl.dataset.idx, 10)); return; }
        if (act === "delete-bet") { confirmDel(parseInt(actEl.dataset.rowid, 10), actEl.dataset.label); return; }
        if (act === "close-modal") { closeModal(); return; }
        if (act === "trigger-upload") { document.getElementById("uInput").click(); return; }
        if (act === "add-parlay-pick") { addParlayPick(); return; }
        if (act === "calc-cuota") { calcCuotaAuto(); return; }
        if (act === "set-fecha-now") { setFechaNow(); return; }
        if (act === "submit-bet") { submitBet(); return; }
        if (act === "remove-parlay-pick") { removeParlayPick(parseInt(actEl.dataset.idx, 10)); return; }
        if (act === "load-lazy-chart") { loadLazyChart(actEl.dataset.canvasId, actEl.dataset.makeKey); return; }

    function showTab(id) {
      // Liberar canvases del tab anterior antes de cambiar
      if (tabActual === "resumen") { destroyChart("neto"); destroyChart("meses"); }
      if (tabActual === "deportes") { destroyChart("dep"); }
      if (tabActual === "tipos") { destroyChart("tipo"); }
      if (tabActual === "rolling") { destroyChart("rolling"); }
      // Sincronizar grupo / sub-vista avanzada según la sección destino
      if (ADVANCED.includes(id)) {
        if (!_inAdvanced) { _inAdvanced = true; try { tg?.BackButton?.show(); } catch (_) {} }
      } else {
        const g = groupOf(id);
        if (g) currentGroup = g.id;
        if (_inAdvanced) { _inAdvanced = false; try { tg?.BackButton?.hide(); } catch (_) {} }
      }
      document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
      const sec = document.getElementById(id);
      if (sec) {
        if (_RENDER_FNS[id] && (!_renderedSections.has(id) || _ALWAYS_RERENDER.has(id))) {
          sec.innerHTML = _RENDER_FNS[id]();
          _renderedSections.add(id);
        }
        sec.classList.add("active");
      }
      tabActual = id;
      // Estado activo de la nav inferior (ningún grupo activo dentro de "Más")
      document.querySelectorAll(".nav-item").forEach(t =>
        t.classList.toggle("active", !_inAdvanced && t.dataset.group === currentGroup));
