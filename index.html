<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Betting Dashboard</title>
<style>
  :root {
    --bg:       #0f1117;
    --card:     #1a1d27;
    --card2:    #22263a;
    --accent:   #6c63ff;
    --green:    #22c55e;
    --red:      #ef4444;
    --yellow:   #eab308;
    --text:     #f1f5f9;
    --muted:    #64748b;
    --border:   #2d3148;
    --radius:   14px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── Header ── */
  .header {
    background: var(--card);
    border-bottom: 1px solid var(--border);
    padding: 16px 16px 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .header h1 { font-size: 18px; font-weight: 700; }
  .header h1 span { color: var(--accent); }
  .refresh-btn {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  .refresh-btn:active { opacity: 0.7; }
  .refresh-btn:disabled { opacity: 0.4; cursor: default; }

  /* ── Tabs ── */
  .tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    padding-bottom: 0;
    scrollbar-width: none;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab {
    padding: 8px 16px;
    border-radius: 8px 8px 0 0;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
    border: none;
    background: transparent;
    border-bottom: 2px solid transparent;
    transition: all 0.2s;
  }
  .tab.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
    background: rgba(108,99,255,0.08);
  }

  /* ── Content ── */
  .content { padding: 16px; }
  .section { display: none; }
  .section.active { display: block; }

  /* ── Cards ── */
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }

  /* ── Stats Grid ── */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 12px;
    text-align: center;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }
  .stat-label {
    font-size: 11px;
    color: var(--muted);
    font-weight: 500;
  }
  .green { color: var(--green); }
  .red   { color: var(--red);   }
  .yellow{ color: var(--yellow);}
  .purple{ color: var(--accent);}

  /* ── KPI Row ── */
  .kpi-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 12px;
  }
  .kpi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px;
  }
  .kpi-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
  .kpi-value { font-size: 20px; font-weight: 800; }

  /* ── Racha badge ── */
  .racha-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 14px;
    border-radius: 20px;
    font-size: 14px;
    font-weight: 700;
    margin-bottom: 12px;
  }
  .racha-win  { background: rgba(34,197,94,0.15);  color: var(--green); border: 1px solid rgba(34,197,94,0.3);  }
  .racha-loss { background: rgba(239,68,68,0.15);  color: var(--red);   border: 1px solid rgba(239,68,68,0.3);  }

  /* ── Progress bar ── */
  .progress-wrap { margin-bottom: 16px; }
  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-bottom: 6px;
  }
  .progress-bar {
    height: 8px;
    background: var(--card2);
    border-radius: 4px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    border-radius: 4px;
    transition: width 0.5s ease;
  }

  /* ── Chart container ── */
  .chart-wrap {
    position: relative;
    height: 200px;
    margin-bottom: 8px;
  }

  /* ── Sport cards ── */
  .sport-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .sport-item:last-child { border-bottom: none; }
  .sport-name { font-size: 14px; font-weight: 600; }
  .sport-sub  { font-size: 12px; color: var(--muted); }
  .sport-roi  { font-size: 16px; font-weight: 800; }

  /* ── Capital ── */
  .capital-main {
    text-align: center;
    padding: 20px 0;
  }
  .capital-amount {
    font-size: 36px;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }
  .capital-sub { font-size: 13px; color: var(--muted); margin-top: 6px; }
  .capital-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 16px;
  }
  .capital-stat {
    background: var(--card2);
    border-radius: 10px;
    padding: 12px;
    text-align: center;
  }
  .capital-stat-val { font-size: 18px; font-weight: 800; }
  .capital-stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }

  /* ── Apuestas table ── */
  .bet-item {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .bet-item:last-child { border-bottom: none; }
  .bet-icon {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    flex-shrink: 0;
  }
  .bet-icon.win  { background: rgba(34,197,94,0.15);  }
  .bet-icon.loss { background: rgba(239,68,68,0.15);  }
  .bet-icon.pend { background: rgba(234,179,8,0.15);  }
  .bet-info { flex: 1; min-width: 0; }
  .bet-teams { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bet-meta  { font-size: 11px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bet-amount { text-align: right; flex-shrink: 0; }
  .bet-monto  { font-size: 13px; font-weight: 700; }
  .bet-result { font-size: 11px; color: var(--muted); }

  /* ── Filtros ── */
  .filter-row {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    margin-bottom: 12px;
    scrollbar-width: none;
    padding-bottom: 4px;
  }
  .filter-row::-webkit-scrollbar { display: none; }
  .filter-chip {
    padding: 6px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .filter-chip.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ── Search input ── */
  .search-input {
    width: 100%;
    padding: 10px 14px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 14px;
    margin-bottom: 10px;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  /* ── Loader ── */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 60vh;
    gap: 16px;
  }
  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loader p { color: var(--muted); font-size: 14px; }

  /* ── Error ── */
  .error-box {
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    margin: 20px 0;
  }
  .error-box p { color: var(--red); font-size: 14px; }

  /* ── Empty ── */
  .empty { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 14px; }

  /* ── Mes selector ── */
  .mes-selector {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }
  .mes-nav {
    background: var(--card2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 8px;
    font-size: 16px;
    cursor: pointer;
  }
  .mes-label { font-size: 15px; font-weight: 700; }

  /* ── Divider ── */
  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0 16px;
  }
</style>
</head>
<body>

<div id="app">
  <div class="loader">
    <div class="spinner"></div>
    <p>Cargando dashboard...</p>
  </div>
</div>

<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<script>
const API_URL = "https://betting-stats-bot-production.up.railway.app";
const tg = window.Telegram?.WebApp;
if (tg) { tg.ready(); tg.expand(); }

let DATA             = null;
let filtroDeporte    = "Todos";
let filtroEquipo     = "";
let mesActual        = null;
let mesesDisponibles = [];
let chartNeto        = null;
let chartMeses       = null;
let chartDep         = null;
let tabActual        = "resumen";
let cargando         = false;

// ── Seguridad: escapa cualquier string que venga de la API antes de inyectarlo en HTML
function esc(str) {
  if (str === null || str === undefined) return "";
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

// ── Event delegation ──────────────────────────────────────────────────────────
document.addEventListener("click", function(e) {
  const chip = e.target.closest("[data-filtro-deporte]");
  if (chip) { setFiltroDeporte(chip.dataset.filtroDeporte); return; }

  const tabBtn = e.target.closest("[data-tab]");
  if (tabBtn) { showTab(tabBtn.dataset.tab, tabBtn); return; }

  const mesBtn = e.target.closest("[data-mes-dir]");
  if (mesBtn) { cambiarMes(parseInt(mesBtn.dataset.mesDir, 10)); return; }

  const actionBtn = e.target.closest("[data-action]");
  if (actionBtn?.dataset.action === "recargar") { recargar(); return; }
});

document.addEventListener("input", function(e) {
  const el = e.target.closest("[data-search-equipo]");
  if (el) {
    filtroEquipo = el.value;
    const lista = document.getElementById("apuestasLista");
    if (lista) lista.innerHTML = renderApuestasList();
  }
});

// ── Fetch datos ───────────────────────────────────────────────────────────────
let _fetchController = null;

async function cargarDatos() {
  if (_fetchController) _fetchController.abort();
  _fetchController = new AbortController();
  const timeout = setTimeout(() => _fetchController.abort(), 10000);
  try {
    const headers = {};
    if (tg?.initData) headers["X-Telegram-Init-Data"] = tg.initData;
    const res = await fetch(`${API_URL}/api/stats`, { headers, signal: _fetchController.signal });
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    let json;
    try { json = await res.json(); } catch { throw new Error("Respuesta inválida del servidor"); }
    if (!json.resumen || !Array.isArray(json.apuestas) || !Array.isArray(json.grafica_meses) || !Array.isArray(json.deportes)) {
      throw new Error("Estructura de datos inesperada");
    }
    DATA = json;
    mesesDisponibles = DATA.grafica_meses.map(m => m.mes);
    mesActual = mesesDisponibles[mesesDisponibles.length - 1] || null;
    renderApp();
  } catch(e) {
    if (e.name === "AbortError") return;
    document.getElementById("app").innerHTML = `
      <div style="padding:16px">
        <div class="error-box">
          <p>❌ Error cargando datos</p>
          <p style="margin-top:8px;font-size:12px;color:#94a3b8">${esc(e.message)}</p>
          <button data-action="recargar" style="margin-top:12px;padding:8px 20px;background:#6c63ff;color:white;border:none;border-radius:8px;cursor:pointer">
            Reintentar
          </button>
        </div>
      </div>`;
  } finally {
    clearTimeout(timeout);
  }
}

// ── Formatear ─────────────────────────────────────────────────────────────────
const fmt  = n => (n === undefined || n === null) ? "—" : `$${Number(n).toLocaleString("es-MX", {maximumFractionDigits: 0})}`;
const fmtp = n => (n === undefined || n === null) ? "—" : `${Number(n).toFixed(1)}%`;
const fmts = n => (n === undefined || n === null) ? "—" : Number(n) >= 0 ? `+${fmt(n)}` : fmt(n);

function mesLabel(mes) {
  if (!mes) return "—";
  const [y, m] = mes.split("-");
  const meses = ["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"];
  return `${meses[parseInt(m, 10) - 1]} ${y}`;
}

// ── Render principal ──────────────────────────────────────────────────────────
function renderApp() {
  document.getElementById("app").innerHTML = `
    <div class="header">
      <div class="header-top">
        <h1>Betting <span>Stats</span></h1>
        <button class="refresh-btn" data-action="recargar">↻ Actualizar</button>
      </div>
      <div class="tabs">
        <button class="tab" data-tab="resumen">📊 Resumen</button>
        <button class="tab" data-tab="semana">📅 7 días</button>
        <button class="tab" data-tab="mes">📅 Por mes</button>
        <button class="tab" data-tab="deportes">🏆 Deportes</button>
        <button class="tab" data-tab="capital">💼 Capital</button>
        <button class="tab" data-tab="apuestas">📋 Apuestas</button>
      </div>
    </div>
    <div class="content">
      <div id="resumen"  class="section">${renderResumen()}</div>
      <div id="semana"   class="section">${renderSemana()}</div>
      <div id="mes"      class="section">${renderMes()}</div>
      <div id="deportes" class="section">${renderDeportes()}</div>
      <div id="capital"  class="section">${renderCapital()}</div>
      <div id="apuestas" class="section">${renderApuestas()}</div>
    </div>`;

  const saved = tabActual;
  setTimeout(() => {
    const btn = document.querySelector(`[data-tab="${saved}"]`);
    showTab(saved, btn);
  }, 0);
}

// ── Tab Resumen ───────────────────────────────────────────────────────────────
function renderResumen() {
  const r  = DATA.resumen;
  const wr = (r.winrate ?? 0).toFixed(1);

  const rachaHtml = r.racha >= 2
    ? `<div class="racha-badge ${r.tipo_racha === "win" ? "racha-win" : "racha-loss"}">
        ${r.tipo_racha === "win" ? "🔥" : "🧊"} Racha: ${r.racha} ${r.tipo_racha === "win" ? "ganadas" : "perdidas"} seguidas
       </div>` : "";

  return `
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-value green">${r.wins}</div>
        <div class="stat-label">✅ Ganadas</div>
      </div>
      <div class="stat-card">
        <div class="stat-value red">${r.losses}</div>
        <div class="stat-label">❌ Perdidas</div>
      </div>
      <div class="stat-card">
        <div class="stat-value yellow">${r.pending}</div>
        <div class="stat-label">⏳ Pendientes</div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Neto total</div>
        <div class="kpi-value ${(r.neto ?? 0) >= 0 ? "green" : "red"}">${fmts(r.neto)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">ROI</div>
        <div class="kpi-value ${(r.roi ?? 0) >= 0 ? "green" : "red"}">${(r.roi ?? 0) >= 0 ? "+" : ""}${fmtp(r.roi)}</div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Total apostado</div>
        <div class="kpi-value purple">${fmt(r.apostado)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Total cobrado</div>
        <div class="kpi-value">${fmt(r.ganado)}</div>
      </div>
    </div>

    ${rachaHtml}

    <div class="card">
      <div class="card-title">Win Rate — ${wr}%</div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span class="green">${r.wins}W</span>
          <span class="red">${r.losses}L</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${wr}%;background:linear-gradient(90deg,#22c55e,#6c63ff)"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Neto acumulado por mes</div>
      <div class="chart-wrap">
        <canvas id="chartNeto"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Apostado vs Ganado por mes</div>
      <div class="chart-wrap">
        <canvas id="chartMeses"></canvas>
      </div>
    </div>`;
}

// ── Tab 7 días ────────────────────────────────────────────────────────────────
function renderSemana() {
  const s = DATA.stats_semana;
  if (!s) return '<div class="empty">Sin datos de los últimos 7 días</div>';
  const wr = (s.winrate ?? 0).toFixed(1);

  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value green">${s.wins}</div><div class="stat-label">✅ Ganadas</div></div>
      <div class="stat-card"><div class="stat-value red">${s.losses}</div><div class="stat-label">❌ Perdidas</div></div>
      <div class="stat-card"><div class="stat-value yellow">${s.pending}</div><div class="stat-label">⏳ Pendientes</div></div>
    </div>

    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Neto 7 días</div>
        <div class="kpi-value ${(s.neto ?? 0) >= 0 ? "green" : "red"}">${fmts(s.neto)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">ROI</div>
        <div class="kpi-value ${(s.roi ?? 0) >= 0 ? "green" : "red"}">${(s.roi ?? 0) >= 0 ? "+" : ""}${fmtp(s.roi)}</div>
      </div>
    </div>

    <div class="kpi-row">
      <div class="kpi">
        <div class="kpi-label">Total apostado</div>
        <div class="kpi-value purple">${fmt(s.apostado)}</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">Win rate</div>
        <div class="kpi-value">${wr}%</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Win Rate — ${wr}%</div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span class="green">${s.wins}W</span>
          <span class="red">${s.losses}L</span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" style="width:${wr}%;background:linear-gradient(90deg,#22c55e,#6c63ff)"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Apuestas — últimos 7 días (${s.wins + s.losses + s.pending})</div>
      ${renderApuestasSemana()}
    </div>`;
}

function renderApuestasSemana() {
  const hace7 = Date.now() - 7 * 24 * 60 * 60 * 1000;
  const ap7 = DATA.apuestas.filter(a => {
    if (!a.fecha) return false;
    const ts = new Date(a.fecha.replace(" ", "T") + "Z").getTime();
    return ts >= hace7;
  });
  if (!ap7.length) return '<div class="empty">Sin apuestas esta semana</div>';
  return [...ap7].reverse().map(renderBetItem).join("");
}

// ── Tab Por Mes ───────────────────────────────────────────────────────────────
function renderMes() {
  const idx = mesesDisponibles.indexOf(mesActual);
  return `
    <div class="mes-selector">
      <button class="mes-nav" data-mes-dir="-1"${idx <= 0 ? ' disabled style="opacity:0.3;cursor:default"' : ''}>‹</button>
      <span class="mes-label" id="mesLabel">${mesLabel(mesActual)}</span>
      <button class="mes-nav" data-mes-dir="1"${idx >= mesesDisponibles.length - 1 ? ' disabled style="opacity:0.3;cursor:default"' : ''}>›</button>
    </div>
    <div id="mesContent">${renderMesContent()}</div>`;
}

function renderMesContent() {
  if (!mesActual) return '<div class="empty">No hay datos este mes</div>';
  const apuestasMes = DATA.apuestas.filter(a => a.fecha && a.fecha.startsWith(mesActual));
  let wins = 0, losses = 0, pend = 0, apostado = 0, ganado = 0;
  apuestasMes.forEach(a => {
    if (a.status === "win")       { wins++;   apostado += a.monto; ganado += a.ganancia ?? a.monto; }
    else if (a.status === "loss") { losses++; apostado += a.monto; }
    else                          { pend++; }
  });
  const neto = ganado - apostado;
  const roi  = apostado > 0 ? (neto / apostado * 100) : 0;
  const wr   = (wins + losses) > 0 ? (wins / (wins + losses) * 100).toFixed(1) : "N/A";

  return `
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-value green">${wins}</div><div class="stat-label">✅ Ganadas</div></div>
      <div class="stat-card"><div class="stat-value red">${losses}</div><div class="stat-label">❌ Perdidas</div></div>
      <div class="stat-card"><div class="stat-value yellow">${pend}</div><div class="stat-label">⏳ Pendientes</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Neto</div><div class="kpi-value ${neto >= 0 ? "green" : "red"}">${fmts(neto)}</div></div>
      <div class="kpi"><div class="kpi-label">ROI</div><div class="kpi-value ${roi >= 0 ? "green" : "red"}">${roi >= 0 ? "+" : ""}${fmtp(roi)}</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Apostado</div><div class="kpi-value purple">${fmt(apostado)}</div></div>
      <div class="kpi"><div class="kpi-label">Win rate</div><div class="kpi-value">${wr}%</div></div>
    </div>
    <div class="card">
      <div class="card-title">Apuestas del mes (${apuestasMes.length})</div>
      ${apuestasMes.length === 0
        ? '<div class="empty">Sin apuestas este mes</div>'
        : apuestasMes.slice(-10).reverse().map(renderBetItem).join("")}
    </div>`;
}

function cambiarMes(dir) {
  const idx = mesesDisponibles.indexOf(mesActual);
  const nuevo = idx + dir;
  if (nuevo < 0 || nuevo >= mesesDisponibles.length) return;
  mesActual = mesesDisponibles[nuevo];
  document.getElementById("mesLabel").textContent = mesLabel(mesActual);
  document.getElementById("mesContent").innerHTML = renderMesContent();
  const newIdx = mesesDisponibles.indexOf(mesActual);
  document.querySelectorAll("[data-mes-dir]").forEach(btn => {
    const d = parseInt(btn.dataset.mesDir, 10);
    const dis = (d === -1 && newIdx <= 0) || (d === 1 && newIdx >= mesesDisponibles.length - 1);
    btn.disabled = dis;
    btn.style.opacity = dis ? "0.3" : "";
    btn.style.cursor = dis ? "default" : "";
  });
}

// ── Tab Deportes ──────────────────────────────────────────────────────────────
function renderDeportes() {
  const deps = [...DATA.deportes].sort((a, b) => b.roi - a.roi);
  if (!deps.length) return '<div class="empty">Sin datos de deportes</div>';

  const mejor = deps[0];
  const peor  = deps[deps.length - 1];

  return `
    <div class="kpi-row" style="margin-bottom:12px">
      <div class="kpi">
        <div class="kpi-label">🟢 Mejor deporte</div>
        <div class="kpi-value green" style="font-size:15px">${esc(mejor.nombre)}</div>
        <div style="font-size:12px;color:#22c55e;margin-top:2px">${mejor.roi >= 0 ? "+" : ""}${fmtp(mejor.roi)} ROI</div>
      </div>
      <div class="kpi">
        <div class="kpi-label">🔴 Peor deporte</div>
        <div class="kpi-value red" style="font-size:15px">${esc(peor.nombre)}</div>
        <div style="font-size:12px;color:#ef4444;margin-top:2px">${fmtp(peor.roi)} ROI</div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">ROI por deporte</div>
      <div class="chart-wrap">
        <canvas id="chartDep"></canvas>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Detalle por deporte</div>
      ${deps.map(d => {
        const total = d.wins + d.losses;
        const wr = total > 0 ? (d.wins / total * 100).toFixed(0) : 0;
        return `
          <div class="sport-item">
            <div>
              <div class="sport-name">${esc(d.nombre)}</div>
              <div class="sport-sub">${d.wins}W - ${d.losses}L (${wr}% WR) · ${fmt(d.apostado)}</div>
            </div>
            <div class="sport-roi ${d.roi >= 0 ? "green" : "red"}">${d.roi >= 0 ? "+" : ""}${fmtp(d.roi)}</div>
          </div>`;
      }).join("")}
    </div>`;
}

// ── Tab Capital ───────────────────────────────────────────────────────────────

    <div class="card">
      <div class="card-title">Capital — Este mes</div>
      <div class="capital-main" style="padding:12px 0">
        <div style="font-size:12px;color:var(--muted);margin-bottom:8px">CAPITAL CÓMODO ESTE MES</div>
        <div class="capital-amount" style="font-size:28px">${fmt(cm.capital_comodo)}</div>
        <div class="capital-sub">Exposición del mes actual</div>
      </div>
      <div class="capital-grid">
        <div class="capital-stat">
          <div class="capital-stat-val yellow">${fmt(cm.capital_minimo)}</div>

          <div class="capital-stat-lbl">Peor racha perdedora</div>
        </div>
        <div class="capital-stat">
          <div class="capital-stat-val">${fmt(cm.monto_promedio)}</div>

    <div class="card">
      <div class="capital-main">

        <div class="capital-amount">${fmt(c.capital_comodo)}</div>
        <div class="capital-sub">Para seguir este tipster sin riesgo</div>
      </div>
      <div class="capital-grid">
        <div class="capital-stat">
          <div class="capital-stat-val yellow">${fmt(c.capital_minimo)}</div>
          <div class="capital-stat-lbl">Capital mínimo</div>
        </div>
        <div class="capital-stat">
          <div class="capital-stat-val purple">${c.max_simultaneas}</div>
          <div class="capital-stat-lbl">Apuestas simultáneas máx</div>
        </div>
        <div class="capital-stat">
          <div class="capital-stat-val">${(c.promedio_dia ?? 0).toFixed(1)}</div>
          <div class="capital-stat-lbl">Apuestas por día</div>
        </div>
        <div class="capital-stat">
          <div class="capital-stat-val red">${c.peor_racha}</div>
          <div class="capital-stat-lbl">Peor racha perdedora</div>
        </div>
        <div class="capital-stat">
          <div class="capital-stat-val">${fmt(c.monto_promedio)}</div>

      <div class="card-title">¿Cómo se calcula?</div>
      <p style="font-size:13px;color:var(--muted);line-height:1.6">
        El <strong style="color:var(--text)">capital mínimo</strong> es la máxima cantidad

// ── Tab Apuestas ──────────────────────────────────────────────────────────────
const LIMITE_APUESTAS = 50;

function renderApuestas() {
  const deportesUnicos = ["Todos", ...new Set(DATA.apuestas.map(a => a.deporte).filter(Boolean))];
  return `
    <input
      class="search-input"
      placeholder="🔍 Buscar por equipo..."
      data-search-equipo
      value="${esc(filtroEquipo)}"
    >
    <div class="filter-row">
      ${deportesUnicos.map(d =>
        `<button class="filter-chip ${d === filtroDeporte ? "active" : ""}" data-filtro-deporte="${esc(d)}">${esc(d)}</button>`
      ).join("")}
    </div>
    <div id="apuestasLista">${renderApuestasList()}</div>`;
}

function renderApuestasList() {
  const term = filtroEquipo.toLowerCase().trim();
  const apuestasFiltradas = DATA.apuestas
    .filter(a => filtroDeporte === "Todos" || a.deporte === filtroDeporte)
    .filter(a => !term ||
      (a.equipo1 || "").toLowerCase().includes(term) ||
      (a.equipo2 || "").toLowerCase().includes(term));

  const total   = apuestasFiltradas.length;
  const mostrar = [...apuestasFiltradas].reverse().slice(0, LIMITE_APUESTAS);
  const hayMas  = total > LIMITE_APUESTAS;

  return `
    <div class="card">
      <div class="card-title">
        ${total} apuesta${total !== 1 ? "s" : ""}${filtroDeporte !== "Todos" ? ` · ${esc(filtroDeporte)}` : ""}${term ? ` · "${esc(term)}"` : ""}
        ${hayMas ? `<span style="font-weight:400;color:var(--muted)"> — últimas ${LIMITE_APUESTAS}</span>` : ""}
      </div>
      ${mostrar.length === 0
        ? '<div class="empty">Sin apuestas</div>'
        : mostrar.map(renderBetItem).join("")}
    </div>`;
}

function renderBetItem(a) {
  const iconMap   = { win: "✅", loss: "❌", pending: "⏳" };
  const colMap    = { win: "win", loss: "loss", pending: "pend" };
  const resultText = a.status === "win"
    ? `+${fmt(a.ganancia)}`
    : a.status === "loss"
      ? `-${fmt(a.monto)}`
      : `⏳ Pot: ${fmt(a.potencial)}`;
  const resultColor = a.status === "win" ? "green" : a.status === "loss" ? "red" : "yellow";
  const ligaPrefix  = a.liga ? `${esc(a.liga)} · ` : "";
  return `
    <div class="bet-item">
      <div class="bet-icon ${colMap[a.status] || "pend"}">${iconMap[a.status] || "⏳"}</div>
      <div class="bet-info">
        <div class="bet-teams">${esc(a.equipo1 || "?")} vs ${esc(a.equipo2 || "?")}</div>
        <div class="bet-meta">${ligaPrefix}${esc(a.deporte)} · ${esc(a.tipo)} @ ${esc(a.cuota)} · ${a.fecha?.slice(0, 10) || ""}</div>
      </div>
      <div class="bet-amount">
        <div class="bet-monto">${fmt(a.monto)}</div>
        <div class="bet-result ${resultColor}">${resultText}</div>
      </div>
    </div>`;
}

// ── Filtro deporte ────────────────────────────────────────────────────────────
function setFiltroDeporte(dep) {
  filtroDeporte = dep;
  document.querySelectorAll("[data-filtro-deporte]").forEach(c => {
    c.classList.toggle("active", c.dataset.filtroDeporte === filtroDeporte);
  });
  const lista = document.getElementById("apuestasLista");
  if (lista) lista.innerHTML = renderApuestasList();
}

// ── Charts ────────────────────────────────────────────────────────────────────
function fmtAxisMoney(v) {
  const abs = Math.abs(v);
  if (abs >= 1000) return `$${(v / 1000).toFixed(1)}k`;
  return `$${v}`;
}

function initChartNeto() {
  if (typeof Chart === 'undefined') return;
  const canvas = document.getElementById("chartNeto");
  if (!canvas || !DATA.grafica_meses.length) return;
  if (chartNeto) { chartNeto.destroy(); chartNeto = null; }

  const labels = DATA.grafica_meses.map(m => mesLabel(m.mes));
  let acum = 0;
  const netoAcum = DATA.grafica_meses.map(m => { acum += m.neto; return acum; });

  chartNeto = new Chart(canvas, {
    type: "bar",
    data: {
      labels,
      datasets: [{
        label: "Neto acumulado",
        data: netoAcum,
        backgroundColor: netoAcum.map(v => v >= 0 ? "rgba(34,197,94,0.8)" : "rgba(239,68,68,0.8)"),
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: "#2d3148" }, ticks: { font: { size: 10 } } },
        y: { grid: { color: "#2d3148" }, ticks: { callback: fmtAxisMoney, font: { size: 10 } } }
      }
    }
  });
}

function initChartMeses() {
  if (typeof Chart === 'undefined') return;
  const canvas = document.getElementById("chartMeses");
  if (!canvas || !DATA.grafica_meses.length) return;
  if (chartMeses) { chartMeses.destroy(); chartMeses = null; }

  const labels = DATA.grafica_meses.map(m => mesLabel(m.mes));
  chartMeses = new Chart(canvas, {
    type: "bar",
    data: {
      labels,
      datasets: [
        {
          label: "Apostado",
          data: DATA.grafica_meses.map(m => m.apostado),
          backgroundColor: "rgba(108,99,255,0.75)",
          borderRadius: 4,
          borderSkipped: false,
        },
        {
          label: "Ganado",
          data: DATA.grafica_meses.map(m => m.ganado),
          backgroundColor: "rgba(34,197,94,0.75)",
          borderRadius: 4,
          borderSkipped: false,
        }
      ]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: {
          display: true,
          labels: { font: { size: 11 }, boxWidth: 12, padding: 10, color: "#64748b" }
        }
      },
      scales: {
        x: { grid: { color: "#2d3148" }, ticks: { font: { size: 10 } } },
        y: { grid: { color: "#2d3148" }, ticks: { callback: fmtAxisMoney, font: { size: 10 } } }
      }
    }
  });
}

function initChartDep() {
  if (typeof Chart === 'undefined') return;
  const canvas = document.getElementById("chartDep");
  if (!canvas || !DATA.deportes.length) return;
  if (chartDep) { chartDep.destroy(); chartDep = null; }

  const deps = [...DATA.deportes].sort((a, b) => b.roi - a.roi);
  chartDep = new Chart(canvas, {
    type: "bar",
    data: {
      labels: deps.map(d => d.nombre),
      datasets: [{
        label: "ROI %",
        data: deps.map(d => parseFloat(d.roi.toFixed(1))),
        backgroundColor: deps.map(d => d.roi >= 0 ? "rgba(34,197,94,0.8)" : "rgba(239,68,68,0.8)"),
        borderRadius: 6,
        borderSkipped: false,
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        x: { grid: { color: "#2d3148" }, ticks: { font: { size: 10 } } },
        y: { grid: { color: "#2d3148" }, ticks: { callback: v => `${v}%`, font: { size: 10 } } }
      }
    }
  });
}

function initCharts() {
  if (!DATA) return;
  Chart.defaults.color = "#64748b";
  Chart.defaults.borderColor = "#2d3148";
  if (tabActual === "resumen")  { initChartNeto(); initChartMeses(); }
  if (tabActual === "deportes") { initChartDep(); }
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
function showTab(id, btn) {
  document.querySelectorAll(".section").forEach(s => s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
  const section = document.getElementById(id);
  if (section) section.classList.add("active");
  if (btn) btn.classList.add("active");
  tabActual = id;
  setTimeout(() => initCharts(), 100);
}

// ── Reload con debounce ───────────────────────────────────────────────────────
async function recargar() {
  if (cargando) return;
  cargando = true;

  const btn = document.querySelector("[data-action='recargar']");
  if (btn) { btn.textContent = "↻ Cargando…"; btn.disabled = true; }

  document.getElementById("app").innerHTML = `
    <div class="loader"><div class="spinner"></div><p>Actualizando...</p></div>`;

  try {
    await cargarDatos();
  } finally {
    cargando = false;
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
cargarDatos();
</script>

</html>
