<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Betting Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:         #06080F;
  --surface:    #0A0E1C;
  --card:       #0D1220;
  --card2:      #111826;
  --border:     rgba(255,255,255,0.06);
  --border-hi:  rgba(0,205,150,0.25);
  --accent:     #00CD96;
  --accent-dim: rgba(0,205,150,0.12);
  --win:        #00CD96;
  --win-bg:     rgba(0,205,150,0.1);
  --loss:       #FF3D5A;
  --loss-bg:    rgba(255,61,90,0.1);
  --pend:       #F5A623;
  --pend-bg:    rgba(245,166,35,0.1);
  --text:       #E2E8F4;
  --text-2:     #8896A8;
  --text-3:     #3D4A5C;
  --radius-sm:  8px;
  --radius-md:  12px;
  --radius-lg:  16px;
  --font-head:  'Syne', sans-serif;
  --font-num:   'Space Mono', monospace;
  --font-body:  'DM Sans', sans-serif;
  --nav-h:      72px;
  --safe-b:     env(safe-area-inset-bottom, 0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100svh;min-height:100vh;padding-bottom:calc(var(--nav-h) + 20px);overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");pointer-events:none;z-index:0;opacity:0.4}
body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:400px;background:radial-gradient(ellipse,rgba(0,205,150,0.07) 0%,transparent 70%);pointer-events:none;z-index:0}

/* ── Header ── */
.header{position:sticky;top:0;z-index:100;background:rgba(6,8,15,0.85);backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border);padding:14px 16px}
.header-inner{display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:10px}
.logo-icon{width:32px;height:32px;background:linear-gradient(135deg,var(--accent),#00A880);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.logo-text{font-family:var(--font-head);font-size:17px;font-weight:800;letter-spacing:-0.3px}
.logo-text span{color:var(--accent)}
.header-right{display:flex;align-items:center;gap:8px}
.status-dot{width:7px;height:7px;background:var(--accent);border-radius:50%;animation:pulse-dot 2s ease-in-out infinite}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.4;transform:scale(0.8)}}
.refresh-btn{background:var(--card2);border:1px solid var(--border);color:var(--text-2);padding:6px 14px;border-radius:var(--radius-sm);font-family:var(--font-body);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.2s;letter-spacing:0.2px}
.refresh-btn:active{transform:scale(0.96)}
.refresh-btn:disabled{opacity:0.4;cursor:default}

/* ── Content ── */
.content{padding:16px;position:relative;z-index:1}
.section{display:none}
.section.active{display:block;animation:fadein 0.25s ease}
@keyframes fadein{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}

/* ── Bottom nav ── */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);background:rgba(10,14,28,0.92);backdrop-filter:blur(24px) saturate(200%);border-top:1px solid var(--border);display:flex;align-items:stretch;z-index:200;overflow-x:auto;scrollbar-width:none;padding-bottom:env(safe-area-inset-bottom,0px)}
.bottom-nav::-webkit-scrollbar{display:none}
.nav-item{min-width:64px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;border:none;background:transparent;color:var(--text-3);padding:8px 4px;transition:color 0.2s;position:relative;-webkit-tap-highlight-color:transparent}
.nav-item.active{color:var(--accent)}
.nav-item.active::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:32px;height:2px;background:var(--accent);border-radius:0 0 4px 4px}
.nav-icon{font-size:20px;line-height:1}
.nav-label{font-size:10px;font-weight:600;letter-spacing:0.3px}

/* ── Cards ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;margin-bottom:10px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,0.02),transparent 60%);pointer-events:none}
.card-title{font-size:11px;font-weight:600;color:var(--text-3);text-transform:uppercase;letter-spacing:1px;margin-bottom:14px}

/* ── Stats grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:10px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 10px;text-align:center;position:relative;overflow:hidden}
.stat-card::after{content:'';position:absolute;bottom:0;left:0;right:0;height:2px;opacity:0;transition:opacity 0.2s}
.stat-card.win-card::after{background:var(--win);opacity:1}
.stat-card.loss-card::after{background:var(--loss);opacity:1}
.stat-card.pend-card::after{background:var(--pend);opacity:1}
.stat-value{font-family:var(--font-num);font-size:26px;font-weight:700;line-height:1;margin-bottom:5px}
.stat-label{font-size:10px;color:var(--text-2);font-weight:600;letter-spacing:0.5px;text-transform:uppercase}

/* ── KPI ── */
.kpi-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px}
.kpi{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px}
.kpi-label{font-size:10px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:0.8px;margin-bottom:6px}
.kpi-value{font-family:var(--font-num);font-size:21px;font-weight:700;letter-spacing:-0.5px}

/* ── Colors ── */
.green{color:var(--win)}.red{color:var(--loss)}.yellow{color:var(--pend)}.accent{color:var(--accent)}.muted{color:var(--text-2)}

/* ── Progress ── */
.progress-wrap{margin-bottom:4px}
.progress-labels{display:flex;justify-content:space-between;font-size:12px;font-weight:700;margin-bottom:8px}
.progress-track{height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.progress-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--win),var(--accent));transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}

/* ── Chart ── */
.chart-wrap{position:relative;height:180px;margin-bottom:4px}
.chart-wrap-tall{position:relative;height:220px;margin-bottom:4px}

/* ── Sport items ── */
.sport-item{display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border)}
.sport-item:last-child{border-bottom:none}
.sport-name{font-size:14px;font-weight:600}
.sport-sub{font-size:11px;color:var(--text-2);margin-top:2px}
.sport-roi{font-family:var(--font-num);font-size:16px;font-weight:700}

/* ── Capital ── */
.capital-hero{text-align:center;padding:24px 0 16px}
.capital-label{font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px}
.capital-amount{font-family:var(--font-head);font-size:42px;font-weight:800;color:var(--accent);line-height:1;letter-spacing:-1px}
.capital-sub{font-size:12px;color:var(--text-2);margin-top:8px;font-weight:500}
.cap-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:16px}
.cap-stat{background:var(--card2);border-radius:var(--radius-md);padding:14px 12px;text-align:center;border:1px solid var(--border)}
.cap-stat-val{font-family:var(--font-num);font-size:18px;font-weight:700;margin-bottom:4px}
.cap-stat-lbl{font-size:10px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px}

/* ── Bet items ── */
.bet-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.bet-item:last-child{border-bottom:none}
.bet-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.bet-dot.win{background:var(--win);box-shadow:0 0 6px rgba(0,205,150,0.5)}
.bet-dot.loss{background:var(--loss);box-shadow:0 0 6px rgba(255,61,90,0.5)}
.bet-dot.pend{background:var(--pend);box-shadow:0 0 6px rgba(245,166,35,0.5)}
.bet-info{flex:1;min-width:0}
.bet-teams{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.bet-meta{font-size:11px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bet-right{text-align:right;flex-shrink:0}
.bet-monto{font-family:var(--font-num);font-size:13px;font-weight:700}
.bet-result{font-family:var(--font-num);font-size:11px;margin-top:1px}

/* ── Filters ── */
.filter-row{display:flex;gap:6px;overflow-x:auto;margin-bottom:12px;scrollbar-width:none;padding-bottom:2px}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{padding:6px 14px;border-radius:99px;font-size:12px;font-weight:700;border:1px solid var(--border);background:var(--card);color:var(--text-2);cursor:pointer;white-space:nowrap;transition:all 0.15s;letter-spacing:0.2px}
.filter-chip.active{background:var(--accent-dim);border-color:var(--border-hi);color:var(--accent)}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:10px}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;color:var(--text-2)}
.search-input{width:100%;padding:10px 14px 10px 36px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);color:var(--text);font-family:var(--font-body);font-size:14px;outline:none;transition:border-color 0.2s}
.search-input:focus{border-color:rgba(0,205,150,0.35)}
.search-input::placeholder{color:var(--text-3)}

/* ── Mes selector ── */
.mes-selector{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:10px 14px}
.mes-nav{background:var(--card2);border:1px solid var(--border);color:var(--text-2);width:32px;height:32px;border-radius:var(--radius-sm);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.15s}
.mes-nav:active{transform:scale(0.92)}
.mes-label{font-family:var(--font-head);font-size:16px;font-weight:700}

/* ── Racha badge ── */
.racha-badge{display:flex;align-items:center;gap:8px;padding:10px 14px;border-radius:var(--radius-md);font-size:13px;font-weight:700;margin-bottom:10px;letter-spacing:0.2px}
.racha-win{background:var(--win-bg);color:var(--win);border:1px solid rgba(0,205,150,0.2)}
.racha-loss{background:var(--loss-bg);color:var(--loss);border:1px solid rgba(255,61,90,0.2)}
.racha-icon{font-size:18px}

/* ── Loader ── */
.loader{display:flex;flex-direction:column;align-items:center;justify-content:center;height:70vh;gap:20px}
.loader-logo{font-family:var(--font-head);font-size:32px;font-weight:800;letter-spacing:-0.5px;animation:loader-pulse 1.5s ease-in-out infinite}
.loader-logo span{color:var(--accent)}
@keyframes loader-pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.loader-bar{width:80px;height:2px;background:var(--card2);border-radius:1px;overflow:hidden}
.loader-bar-fill{height:100%;background:var(--accent);border-radius:1px;animation:loader-slide 1.5s ease-in-out infinite}
@keyframes loader-slide{0%{width:0%;margin-left:0}50%{width:60%;margin-left:20%}100%{width:0%;margin-left:100%}}
.loader p{font-size:13px;color:var(--text-2);font-weight:500}

/* ── Error ── */
.error-box{background:var(--loss-bg);border:1px solid rgba(255,61,90,0.25);border-radius:var(--radius-lg);padding:24px 20px;text-align:center;margin:20px 0}
.error-box p{color:var(--loss);font-size:14px;font-weight:600}
.error-box small{color:var(--text-2);font-size:12px}
.retry-btn{margin-top:14px;padding:9px 22px;background:var(--accent);color:#000;border:none;border-radius:var(--radius-md);font-family:var(--font-body);font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.2px}

/* ── Empty / Explainer ── */
.empty{text-align:center;padding:30px 20px;color:var(--text-2);font-size:13px}
.divider{border:none;border-top:1px solid var(--border);margin:4px 0 12px}
.section-header{font-family:var(--font-head);font-size:20px;font-weight:800;letter-spacing:-0.3px;margin-bottom:14px;color:var(--text)}
.section-header span{color:var(--accent)}
.explainer{font-size:12px;color:var(--text-2);line-height:1.6;padding:12px 14px;background:var(--card2);border-radius:var(--radius-md);border-left:2px solid var(--accent);margin-top:8px}
.explainer strong{color:var(--text);font-weight:600}

/* ── Tipo row ── */
.tipo-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid var(--border)}
.tipo-item:last-child{border-bottom:none}
.tipo-bar-wrap{height:4px;background:rgba(255,255,255,0.06);border-radius:2px;overflow:hidden;margin-top:6px;width:100%}
.tipo-bar-fill{height:100%;border-radius:2px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}

/* ── Rolling chart ── */
.rolling-kpi{display:flex;gap:8px;margin-bottom:10px}
.rolling-kpi-item{flex:1;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px;text-align:center}
.rolling-kpi-val{font-family:var(--font-num);font-size:20px;font-weight:700}
.rolling-kpi-lbl{font-size:10px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}

/* ── Kelly meter ── */
.kelly-meter{height:12px;background:rgba(255,255,255,0.06);border-radius:6px;overflow:hidden;margin:10px 0}
.kelly-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--win),#F5A623);transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.kelly-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.kelly-card{background:var(--card2);border-radius:var(--radius-md);padding:14px;text-align:center;border:1px solid var(--border)}
.kelly-card-pct{font-family:var(--font-num);font-size:22px;font-weight:700;color:var(--accent)}
.kelly-card-lbl{font-size:10px;color:var(--text-2);font-weight:600;text-transform:uppercase;letter-spacing:0.5px;margin-top:4px}
.kelly-card-sub{font-size:11px;color:var(--text-3);margin-top:3px}

/* ── Temporal ── */
.dia-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border)}
.dia-row:last-child{border-bottom:none}
.dia-label{font-size:12px;font-weight:700;width:36px;flex-shrink:0;color:var(--text-2)}
.dia-bar-wrap{flex:1;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden}
.dia-bar-fill{height:100%;border-radius:3px;transition:width 0.8s cubic-bezier(0.4,0,0.2,1)}
.dia-roi{font-family:var(--font-num);font-size:11px;font-weight:700;width:52px;text-align:right;flex-shrink:0}
.dia-wl{font-size:10px;color:var(--text-2);width:56px;text-align:right;flex-shrink:0}

/* ── Gestión CRUD ── */
.g-toolbar{display:flex;align-items:center;gap:8px;margin-bottom:12px}
.btn-add{-webkit-appearance:none;appearance:none;display:inline-flex;align-items:center;justify-content:center;gap:6px;background-color:#00CD96;color:#000;border:none;border-radius:var(--radius-md);padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;letter-spacing:0.2px;-webkit-tap-highlight-color:transparent;flex-shrink:0;min-height:40px;box-shadow:0 0 14px rgba(0,205,150,0.35)}
.btn-add:active{opacity:.75;transform:scale(0.97)}
.g-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);padding:12px 14px;margin-bottom:8px}
.g-card-head{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.g-teams{font-size:13px;font-weight:700;line-height:1.35}
.g-meta{font-size:11px;color:var(--text-2);margin-top:3px;line-height:1.4}
.g-actions{display:flex;gap:6px;flex-shrink:0}
.btn-edit{background:rgba(255,255,255,0.07);color:var(--text-2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:6px 9px;font-size:13px;cursor:pointer}
.btn-del{background:rgba(255,61,90,0.12);color:var(--loss);border:1px solid rgba(255,61,90,0.2);border-radius:var(--radius-sm);padding:6px 9px;font-size:13px;cursor:pointer}
/* Modal */
.m-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.72);z-index:9999;display:flex;align-items:flex-end;justify-content:center;padding-bottom:var(--nav-h)}
/* Modal — estructura flexbox con footer sticky */
.m-sheet{background:var(--surface);border-radius:20px 20px 16px 16px;width:100%;max-width:520px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 -8px 40px rgba(0,0,0,0.6)}
.m-handle{width:36px;height:4px;background:rgba(255,255,255,0.18);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.m-head{padding:12px 16px;flex-shrink:0;border-bottom:1px solid var(--border)}
.m-body{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;padding:14px 16px 8px;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.m-foot{flex-shrink:0;padding:12px 16px;padding-bottom:calc(env(safe-area-inset-bottom,0px) + 14px);background:var(--surface);border-top:1px solid var(--border)}
.m-title{font-family:var(--font-head);font-size:17px;font-weight:800;display:flex;justify-content:space-between;align-items:center}
.m-close{background:var(--card2);border:1px solid var(--border);color:var(--text-2);width:32px;height:32px;border-radius:var(--radius-sm);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.m-label{display:block;font-size:10px;font-weight:700;color:var(--text-2);text-transform:uppercase;letter-spacing:.6px;margin-bottom:5px}
.m-input{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);font-family:var(--font-body);font-size:14px;padding:9px 12px;outline:none;box-sizing:border-box;transition:border-color .2s}
.m-input:focus{border-color:rgba(0,205,150,.4)}
.m-row{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.m-group{margin-bottom:11px}
.m-date-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.m-now-btn{flex-shrink:0;background:var(--accent);color:#000;border:none;border-radius:var(--radius-sm);padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
.m-submit{display:block;width:100%;background:var(--accent);color:#000;border:none;border-radius:var(--radius-md);padding:14px;font-family:var(--font-head);font-size:15px;font-weight:800;cursor:pointer;letter-spacing:.2px;transition:opacity .15s}
.m-submit:active,.m-submit:disabled{opacity:.6}
.m-submit:disabled{cursor:not-allowed}
.m-err{font-size:12px;color:var(--loss);margin-bottom:8px;display:none;padding:8px 10px;background:rgba(255,80,80,.08);border-radius:6px;border:1px solid rgba(255,80,80,.2)}
/* Upload zone */
.u-zone{border:2px dashed var(--border);border-radius:var(--radius-md);padding:22px 16px;text-align:center;cursor:pointer;margin-bottom:12px;transition:border-color .2s}
.u-zone:hover,.u-zone.drag{border-color:var(--accent)}
.u-icon{font-size:30px;margin-bottom:6px}
.u-text{font-size:13px;color:var(--text-2)}
.u-sub{font-size:11px;color:var(--text-3);margin-top:3px}
.u-analyzing{background:rgba(245,166,35,.1);border:1px solid rgba(245,166,35,.25);border-radius:var(--radius-sm);padding:9px 12px;font-size:12px;color:var(--pend);display:none;align-items:center;gap:8px;margin-bottom:12px}
/* Secret banner */

function esc(s){ return s==null?"":String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;").replace(/'/g,"&#39;")}

function mesLabel(m){if(!m)return"—";const[y,mo]=m.split("-");return["Ene","Feb","Mar","Abr","May","Jun","Jul","Ago","Sep","Oct","Nov","Dic"][parseInt(mo,10)-1]+" "+y}

/* ── Fetch ── */
let _ctrl=null;
async function cargarDatos(){
  if(_ctrl)_ctrl.abort();
  _ctrl=new AbortController();
  const timeout=setTimeout(()=>_ctrl.abort(),12000);
  try{
    const hdrs={};
    if(tg?.initData)hdrs["X-Telegram-Init-Data"]=tg.initData;
    const res=await fetch(`${API_URL}/api/stats`,{headers:hdrs,signal:_ctrl.signal});
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const json=await res.json();
    if(!json.resumen||!Array.isArray(json.apuestas))throw new Error("Datos inesperados");
    DATA=json;
    mesesDisponibles=DATA.grafica_meses.map(m=>m.mes);
    mesActual=mesesDisponibles[mesesDisponibles.length-1]||null;
    renderApp();
  }catch(e){
    if(e.name==="AbortError")return;
    document.getElementById("app").innerHTML=`<div style="padding:20px"><div class="error-box"><p>Sin conexión</p><br><small>${esc(e.message)}</small><br><button class="retry-btn" data-action="recargar">↻ Reintentar</button></div></div>`;
  }finally{clearTimeout(timeout);}
}

/* ── Analytics helpers (client-side) ── */
function normalizaTipo(raw){
  const t=(raw||"").toLowerCase().trim();
  if(!t)return"Otro";
  // Parlay — primero: puede contener "winner", "over", etc. en sus picks
  if(/parlay|combo|acumulad|multi.?bet|\bsgp\b|same.?game/.test(t))return"Parlay";
  // Futuro / Outright
  if(/\boutright\b|futures?|to win the|championship|tournament winner|season (wins?|points?|goals?)|award|mvp|heisman|ballon/.test(t))return"Futuro";
  // Moneyline / Ganador — DNB, to qualify, W1/W2, fight/race winner, MMA
  if(/moneyline|\b1x2\b|\bml\b|ganador|team wins?|\bw[12]\b|\bwinner\b|to win\b|match result|draw no bet|\bdnb\b|to qualify|fight winner|race winner|series winner|method of victory|\bko\b|\btko\b|decision win|round betting|will win/.test(t))return"Moneyline";
  // Handicap — puck line (NHL), run line (MLB), point spread, AH
  if(/handicap|hcp|\bspread\b|\basian\b|puck line|run line|point spread|european handicap|\beh\b|alt(ernate)? spread/.test(t))return"Handicap";
  // BTTS
  if(/ambos|btts|both teams to score|\bgg\b|no goal/.test(t))return"BTTS";
  // Marcador exacto
  if(/correct score|marcador exacto|resultado exacto|exact score/.test(t))return"Marcador exacto";
  // Props — va ANTES de Total O/U: "Player Points Over 25.5" debe ser Prop, no Total O/U
  if(/\bplayer\b|\bprop\b|anytime (scorer|td|goal|basket|touchd)|first (goal|scorer|td|basket|pitch|serve|touchd)|last (goal|scorer|td|touchd)|to score\b|rushing yards|receiving yards|passing yards|\bassists?\b|\rebounds?\b|strikeouts?\b|home run|top (batsman|bowler|scorer)|fall of wicket|wickets?\b|century\b/.test(t))return"Props";
  // Total O/U — \b evita "overtime", "overview", etc.
  if(/\bover\b|\bunder\b|\btotal\b|\bo\/u\b|más de|menos de|alt(ernate)? total|half total|q[1-4] total/.test(t))return"Total O/U";
  return"Otro";
}

function calcRoiPorTipo(){
  const bucket={};
  DATA.apuestas.filter(a=>a.status==="win"||a.status==="loss").forEach(a=>{
    const t=normalizaTipo(a.tipo);
    if(!bucket[t])bucket[t]={w:0,l:0,apo:0,gan:0,cuotas:[]};
    const b=bucket[t];
    b.apo+=a.monto||0;
    if(parseFloat(a.cuota)>1.01)b.cuotas.push(parseFloat(a.cuota));
    if(a.status==="win"){b.w++;b.gan+=a.ganancia||a.monto||0;}
    else b.l++;
  });
  return Object.entries(bucket)
    .filter(([,b])=>b.w+b.l>=1)
    .map(([tipo,b])=>{
      const total=b.w+b.l,neto=b.gan-b.apo;
      return{tipo,wins:b.w,losses:b.l,apo:b.apo,neto,roi:b.apo>0?neto/b.apo*100:0,wr:total>0?b.w/total*100:0,cuotaMedia:b.cuotas.length>0?b.cuotas.reduce((a,c)=>a+c,0)/b.cuotas.length:0};
    })
    .sort((a,b)=>b.roi-a.roi);
}

/* ── Helper: convierte un Date UTC a sus componentes en hora CDMX ── */
function toMXParts(dt) {
  try {
    const parts = new Intl.DateTimeFormat("en-US", {
      timeZone: "America/Mexico_City",
      weekday: "short",       // "Mon", "Tue"…
      hour:    "numeric",
      hour12:  false
    }).formatToParts(dt);
    const get = t => parts.find(p => p.type === t)?.value ?? "0";
    const WEEK_SHORT = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
    return {
      dow:  WEEK_SHORT.indexOf(get("weekday")),   // 0=Dom … 6=Sáb
      hour: parseInt(get("hour"), 10)              // 0-23
    };
  } catch(e) {
    // Fallback: UTC-6 fijo (funciona sin soporte de Intl avanzado)
    const local = new Date(dt.getTime() - 6 * 3600000);
    return { dow: local.getUTCDay(), hour: local.getUTCHours() };
  }
}

function calcTemporal(){
  const DIAS   = ["Lun","Mar","Mié","Jue","Vie","Sáb","Dom"];
  const FRANJAS = ["00-06","06-10","10-14","14-18","18-22","22-00"];
  const db={}, hb={};
  DIAS.forEach(d=>{db[d]={w:0,l:0,apo:0,gan:0}});
  FRANJAS.forEach(f=>{hb[f]={w:0,l:0,apo:0,gan:0}});

  DATA.apuestas.filter(a=>(a.status==="win"||a.status==="loss")&&(a.fecha_partido||a.fecha)).forEach(a=>{

    // ── DÍA DE SEMANA: usa fecha del EVENTO (no de registro) ──
    const fechaEvento = a.fecha_partido
      ? new Date(a.fecha_partido + "T12:00:00")   // mediodía local, sin desplazamiento UTC
      : new Date(a.fecha.replace(" ","T")+"Z");
    if(isNaN(fechaEvento)) return;

    const dowEvento = fechaEvento.getDay();         // 0=Dom … 6=Sáb
    const diaIdx    = dowEvento === 0 ? 6 : dowEvento - 1;
    const dia       = DIAS[diaIdx];

    db[dia].apo += a.monto||0;
    if(a.status==="win"){db[dia].w++;db[dia].gan+=a.ganancia||a.monto||0;}
    else db[dia].l++;

    // ── FRANJA HORARIA: usa fecha/hora de REGISTRO ──
    if(a.fecha){
      const dtReg = new Date(a.fecha.replace(" ","T")+"Z");
      if(!isNaN(dtReg)){
        const { hour } = toMXParts(dtReg);
        const franja = hour<6?"00-06":hour<10?"06-10":hour<14?"10-14":
                       hour<18?"14-18":hour<22?"18-22":"22-00";
        hb[franja].apo += a.monto||0;
        if(a.status==="win"){hb[franja].w++;hb[franja].gan+=a.ganancia||a.monto||0;}
        else hb[franja].l++;
      }
    }
  });

  const toStats=(label,b)=>{
    const total=b.w+b.l, neto=b.gan-b.apo;
    return{label,wins:b.w,losses:b.l,neto,roi:b.apo>0?neto/b.apo*100:0,
           wr:total>0?b.w/total*100:0,total};
  };
  return{
    porDia:  DIAS.map(d=>toStats(d,db[d])).filter(x=>x.total>0),
    porHora: FRANJAS.map(f=>toStats(f,hb[f])).filter(x=>x.total>0)
  };
}

function calcRolling(ventana=20){
  const res=DATA.apuestas.filter(a=>a.status==="win"||a.status==="loss");
  if(res.length<ventana)return[];
  const points=[];
  let netoAcum=0;
  for(let i=0;i<res.length;i++){
    const a=res[i];
    if(a.status==="win")netoAcum+=(a.ganancia||a.monto||0)-(a.monto||0);
    else netoAcum-=a.monto||0;
    if(i<ventana-1)continue;
    const win=res.slice(i-ventana+1,i+1);
    const w=win.filter(x=>x.status==="win").length;
    const apo=win.reduce((s,x)=>s+(x.monto||0),0);
    const gan=win.reduce((s,x)=>x.status==="win"?s+(x.ganancia||x.monto||0):s,0);
    const roi=apo>0?(gan-apo)/apo*100:0;
    points.push({i,roi,wr:w/ventana*100,netoAcum});
  }
  return points;
}

function calcKelly(){
  const res=DATA.apuestas.filter(a=>a.status==="win"||a.status==="loss");
  if(res.length<10)return null;
  const p=res.filter(a=>a.status==="win").length/res.length;
  const cuotas=res.map(a=>parseFloat(a.cuota)).filter(c=>c>1.01);  // solo bets resueltas
  if(!cuotas.length)return null;
  const b=cuotas.reduce((s,c)=>s+c,0)/cuotas.length-1;
  if(b<=0)return null;
  const f=Math.max(0,Math.min((p*(b+1)-1)/b,0.25));
  const ev=p*b-(1-p);
  return{f,fMedio:f/2,fCuarto:f/4,p:p*100,cuotaMedia:b+1,ev};
}

/* ── Tab: Resumen ── */

  const r=DATA.resumen;

  const rachaHtml=r.racha>=2?`<div class="racha-badge ${r.tipo_racha==="win"?"racha-win":"racha-loss"}"><span class="racha-icon">${r.tipo_racha==="win"?"🔥":"🧊"}</span>Racha de ${r.racha} ${r.tipo_racha==="win"?"victorias":"derrotas"} seguidas</div>`:"";
  return`<div class="section-header">General <span>·</span> Historial</div>
    <div class="stats-grid">
      <div class="stat-card win-card"><div class="stat-value green">${r.wins}</div><div class="stat-label">Ganadas</div></div>
      <div class="stat-card loss-card"><div class="stat-value red">${r.losses}</div><div class="stat-label">Perdidas</div></div>
      <div class="stat-card pend-card"><div class="stat-value yellow">${r.pending}</div><div class="stat-label">Pendientes</div></div>
    </div>
    ${(r.voids??0)>0?`<div class="kpi-row"><div class="kpi"><div class="kpi-label">Nulas (void)</div><div class="kpi-value accent">${r.voids??0}</div></div></div>`:""}
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Neto total</div><div class="kpi-value ${signColor(r.neto)}">${fmts(r.neto)}</div></div>
      <div class="kpi"><div class="kpi-label">ROI</div><div class="kpi-value ${signColor(r.roi)}">${(r.roi??0)>=0?"+":""}${fmtp(r.roi)}</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Total apostado</div><div class="kpi-value accent">${fmt(r.apostado)}</div></div>
      <div class="kpi"><div class="kpi-label">Total cobrado</div><div class="kpi-value">${fmt(r.ganado)}</div></div>
    </div>
    ${rachaHtml}
    <div class="card"><div class="card-title">Win rate — ${wr}%</div>
      <div class="progress-wrap"><div class="progress-labels"><span class="green">${r.wins}W</span><span class="muted">${wr}%</span><span class="red">${r.losses}L</span></div>
      <div class="progress-track"><div class="progress-fill" style="width:${wr}%"></div></div></div></div>
    <div class="card"><div class="card-title">Neto acumulado</div><div class="chart-wrap"><canvas id="chartNeto"></canvas></div></div>
    <div class="card"><div class="card-title">Apostado vs Ganado</div><div class="chart-wrap"><canvas id="chartMeses"></canvas></div></div>`;
}

/* ── Tab: Semana ── */

  const ap7=DATA.apuestas.filter(a=>{if(!a.fecha)return false;return new Date(a.fecha.replace(" ","T")+"Z").getTime()>=Date.now()-7*24*3600*1000;});
  return`<div class="section-header">Últimos <span>7 días</span></div>
    <div class="stats-grid">
      <div class="stat-card win-card"><div class="stat-value green">${s.wins}</div><div class="stat-label">Ganadas</div></div>
      <div class="stat-card loss-card"><div class="stat-value red">${s.losses}</div><div class="stat-label">Perdidas</div></div>
      <div class="stat-card pend-card"><div class="stat-value yellow">${s.pending}</div><div class="stat-label">Pendientes</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Neto</div><div class="kpi-value ${signColor(s.neto)}">${fmts(s.neto)}</div></div>
      <div class="kpi"><div class="kpi-label">ROI</div><div class="kpi-value ${signColor(s.roi)}">${(s.roi??0)>=0?"+":""}${fmtp(s.roi)}</div></div>

    <div class="kpi-row">

/* ── Tab: Mes ── */
function renderMes(){
  const idx=mesesDisponibles.indexOf(mesActual);
  return`<div class="mes-selector">
    <button class="mes-nav" data-mes-dir="-1" ${idx<=0?"disabled style='opacity:0.3;cursor:default'":""}>‹</button>
    <span class="mes-label" id="mesLabel">${mesLabel(mesActual)}</span>
    <button class="mes-nav" data-mes-dir="1" ${idx>=mesesDisponibles.length-1?"disabled style='opacity:0.3;cursor:default'":""}>›</button>
  </div>
  <div id="mesContent">${renderMesContent()}</div>`;
}
function renderMesContent(){
  if(!mesActual)return'<div class="empty">No hay datos este mes</div>';
  const ap=DATA.apuestas.filter(a=>a.fecha?.startsWith(mesActual));
  let w=0,l=0,p=0,apo=0,gan=0;
  ap.forEach(a=>{if(a.status==="win"){w++;apo+=a.monto;gan+=a.ganancia??a.monto;}else if(a.status==="loss"){l++;apo+=a.monto;}else p++;});
  const neto=gan-apo,roi=apo>0?neto/apo*100:0,wr=(w+l)>0?(w/(w+l)*100).toFixed(1):"N/A";
  return`<div class="stats-grid">
      <div class="stat-card win-card"><div class="stat-value green">${w}</div><div class="stat-label">Ganadas</div></div>
      <div class="stat-card loss-card"><div class="stat-value red">${l}</div><div class="stat-label">Perdidas</div></div>
      <div class="stat-card pend-card"><div class="stat-value yellow">${p}</div><div class="stat-label">Pendientes</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Neto</div><div class="kpi-value ${signColor(neto)}">${fmts(neto)}</div></div>
      <div class="kpi"><div class="kpi-label">ROI</div><div class="kpi-value ${signColor(roi)}">${roi>=0?"+":""}${fmtp(roi)}</div></div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Apostado</div><div class="kpi-value accent">${fmt(apo)}</div></div>
      <div class="kpi"><div class="kpi-label">Win rate</div><div class="kpi-value">${wr}%</div></div>
    </div>
    <div class="card"><div class="card-title">Apuestas (${ap.length})</div>${ap.length===0?'<div class="empty">Sin apuestas</div>':ap.slice(-12).reverse().map(renderBetItem).join("")}</div>`;
}
function cambiarMes(dir){
  const idx=mesesDisponibles.indexOf(mesActual),nuevo=idx+dir;
  if(nuevo<0||nuevo>=mesesDisponibles.length)return;
  mesActual=mesesDisponibles[nuevo];
  document.getElementById("mesLabel").textContent=mesLabel(mesActual);
  document.getElementById("mesContent").innerHTML=renderMesContent();
  const ni=mesesDisponibles.indexOf(mesActual);
  document.querySelectorAll("[data-mes-dir]").forEach(btn=>{const d=parseInt(btn.dataset.mesDir,10),dis=(d===-1&&ni<=0)||(d===1&&ni>=mesesDisponibles.length-1);btn.disabled=dis;btn.style.opacity=dis?"0.3":"";btn.style.cursor=dis?"default":"";});
}

/* ── Tab: Tipos ── */

      <div class="kpi"><div class="kpi-label">⚠️ Peor tipo</div><div class="kpi-value red" style="font-size:14px;margin-top:4px">${esc(tipos[tipos.length-1].tipo)}</div><div style="font-family:var(--font-num);font-size:12px;color:var(--loss);margin-top:4px">${fmtp(tipos[tipos.length-1].roi)}</div></div>

              <span style="font-size:13px;font-weight:700">${esc(t.tipo)}${muestraTxt}</span>
              <span style="font-family:var(--font-num);font-size:13px;font-weight:700;color:${barColor}">${t.roi>=0?"+":""}${t.roi.toFixed(1)}%</span>
            </div>
            <div style="font-size:11px;color:var(--text-2);margin-bottom:6px">${t.wins}W·${t.losses}L·WR ${t.wr.toFixed(0)}% ${cuotaTxt}</div>

/* ── Tab: Temporal ── */
function renderTemporal(){
  const data=calcTemporal();
  if(!data.porDia.length&&!data.porHora.length)return`<div class="section-header">Análisis <span>temporal</span></div><div class="empty">No hay suficientes datos con fechas registradas.</div>`;
  const maxAbsDia=Math.max(...data.porDia.map(d=>Math.abs(d.roi)),1);
  const maxAbsHora=Math.max(...data.porHora.map(d=>Math.abs(d.roi)),1);
  return`<div class="section-header">¿Cuándo <span>rinde más</span>?</div>
    ${data.porDia.length?`
    <div class="card">
      <div class="card-title">Por día de la semana</div>
      ${data.porDia.map(d=>{
        const barW=Math.min(100,Math.abs(d.roi)/maxAbsDia*100);
        const col=d.roi>=0?"var(--win)":"var(--loss)";
        const best=d.roi===Math.max(...data.porDia.map(x=>x.roi));
        return`<div class="dia-row">
          <span class="dia-label" style="color:${best?"var(--accent)":"var(--text-2)"}">${d.label}${best?" ⭐":""}</span>
          <div class="dia-bar-wrap"><div class="dia-bar-fill" style="width:${barW}%;background:${col}"></div></div>
          <span class="dia-roi" style="color:${col}">${d.roi>=0?"+":""}${d.roi.toFixed(1)}%</span>
          <span class="dia-wl">${d.wins}W-${d.losses}L</span>
        </div>`;}).join("")}
    </div>`:""}
    ${data.porHora.length?`
    <div class="card">
      <div class="card-title">Por franja horaria (hora de registro)</div>
      ${data.porHora.map(d=>{
        const barW=Math.min(100,Math.abs(d.roi)/maxAbsHora*100);
        const col=d.roi>=0?"var(--win)":"var(--loss)";
        const best=d.roi===Math.max(...data.porHora.map(x=>x.roi));
        return`<div class="dia-row">
          <span class="dia-label" style="color:${best?"var(--accent)":"var(--text-2)"};font-size:10px">${d.label}${best?" ⭐":""}</span>
          <div class="dia-bar-wrap"><div class="dia-bar-fill" style="width:${barW}%;background:${col}"></div></div>
          <span class="dia-roi" style="color:${col}">${d.roi>=0?"+":""}${d.roi.toFixed(1)}%</span>
          <span class="dia-wl">${d.wins}W-${d.losses}L</span>
        </div>`;}).join("")}
    </div>`:""}
    <div class="explainer"><strong>Nota:</strong> El día de semana usa la fecha del evento. La franja horaria usa cuándo registraste la apuesta (hora CDMX). Con más datos este análisis se vuelve más preciso.</div>`;
}

/* ── Tab: Rolling ROI ── */
function renderRolling(){
  const VENTANA=20;

  const ultimo=points[points.length-1];
  const tendencia=points.length>=3?(()=>{const t=points.slice(-3).map(p=>p.roi);return t[2]>t[0]+3?"📈 Mejorando":t[2]<t[0]-3?"📉 Empeorando":"➡️ Estable";})():"—";
  return`<div class="section-header">ROI <span>rodante</span></div>
    <div class="rolling-kpi">
      <div class="rolling-kpi-item">
        <div class="rolling-kpi-val ${signColor(ultimo.roi)}">${ultimo.roi>=0?"+":""}${ultimo.roi.toFixed(1)}%</div>
        <div class="rolling-kpi-lbl">ROI últimas ${VENTANA}</div>
      </div>
      <div class="rolling-kpi-item">
        <div class="rolling-kpi-val">${ultimo.wr.toFixed(0)}%</div>
        <div class="rolling-kpi-lbl">Win rate</div>
      </div>
      <div class="rolling-kpi-item">
        <div class="rolling-kpi-val ${signColor(ultimo.netoAcum)}">${fmts(ultimo.netoAcum)}</div>
        <div class="rolling-kpi-lbl">Neto total</div>
      </div>
    </div>

      <div style="font-size:13px;font-weight:700;margin-bottom:6px">Tendencia reciente</div>

}

/* ── Tab: Kelly ── */
function renderKelly(){
  const k=calcKelly();
  if(!k)return`<div class="section-header">Kelly <span>Criterion</span></div><div class="empty">Necesitas al menos 10 apuestas con cuota registrada.</div>`;
  const evColor=k.ev>0?"green":"red";
  const evEmoji=k.ev>0?"✅":"❌";
  const kellyPct=Math.min(k.f*100,25);
  return`<div class="section-header">Kelly <span>Criterion</span></div>
    <div class="card">
      <div class="card-title">Valor esperado (EV)</div>
      <div style="font-family:var(--font-num);font-size:32px;font-weight:700;color:var(--${evColor});margin-bottom:8px">${evEmoji} ${k.ev>=0?"+":""}${k.ev.toFixed(3)}</div>
      <div style="font-size:12px;color:var(--text-2)">Por unidad apostada. Positivo = ventaja estadística sobre la casa.</div>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="kpi-label">Win rate histórico</div><div class="kpi-value">${k.p.toFixed(1)}%</div></div>
      <div class="kpi"><div class="kpi-label">Cuota media</div><div class="kpi-value accent">${k.cuotaMedia.toFixed(2)}</div></div>
    </div>
    <div class="card">
      <div class="card-title">Fracción Kelly óptima: ${kellyPct.toFixed(1)}% del capital</div>
      <div class="kelly-meter"><div class="kelly-fill" style="width:${(kellyPct/25)*100}%"></div></div>
      <div class="kelly-grid">
        <div class="kelly-card">
          <div class="kelly-card-pct green">${(k.f*100).toFixed(1)}%</div>
          <div class="kelly-card-lbl">Kelly completo</div>
          <div class="kelly-card-sub">Alta volatilidad</div>
        </div>
        <div class="kelly-card" style="border-color:var(--border-hi)">
          <div class="kelly-card-pct accent">${(k.fMedio*100).toFixed(1)}%</div>
          <div class="kelly-card-lbl">Kelly medio ⭐</div>
          <div class="kelly-card-sub">Recomendado</div>
        </div>
        <div class="kelly-card">
          <div class="kelly-card-pct">${(k.fCuarto*100).toFixed(1)}%</div>
          <div class="kelly-card-lbl">Kelly/4</div>
          <div class="kelly-card-sub">Ultra-seguro</div>
        </div>
      </div>
    </div>
    <div class="explainer"><strong>Kelly Criterion</strong> calcula el tamaño óptimo de apuesta para maximizar el crecimiento del capital a largo plazo sin riesgo de ruina. <strong>Kelly medio</strong> es el balance ideal entre crecimiento y seguridad. Los porcentajes son sobre tu capital total disponible.</div>`;
}

function renderApuestas(){

function renderApuestasList(){
  const term=filtroEquipo.toLowerCase().trim();
  const filt=DATA.apuestas.filter(a=>filtroDeporte==="Todos"||a.deporte===filtroDeporte).filter(a=>!term||(a.equipo1||"").toLowerCase().includes(term)||(a.equipo2||"").toLowerCase().includes(term));
  const mostrar=[...filt].reverse().slice(0,50);
  const truncated=filt.length>50;  return`<div class="card"><div class="card-title">${filt.length} apuesta${filt.length!==1?"s":""}${truncated?" <span style='color:var(--text-2);font-weight:400;font-size:10px'>(mostrando últimas 50)</span>":""}</div>${mostrar.length===0?'<div class="empty">Sin resultados</div>':mostrar.map(renderBetItem).join("")}</div>`;

function renderBetItem(a){
  const icon=a.status==="win"?"win":a.status==="loss"?"loss":a.status==="void"?"pend":"pend";
  const res=a.status==="win"?`+${fmt(a.ganancia)}`:a.status==="loss"?`-${fmt(a.monto)}`:a.status==="void"?`🔄 Nula`:` ⏳ ${fmt(a.potencial)}`;
  const rc=a.status==="win"?"green":a.status==="loss"?"red":a.status==="void"?"accent":"yellow";
  return`<div class="bet-item"><div class="bet-dot ${icon}"></div><div class="bet-info"><div class="bet-teams">${esc(a.equipo1||"?")} vs ${esc(a.equipo2||"?")}</div><div class="bet-meta">${esc(a.deporte)} · ${esc(a.tipo)} @ ${esc(a.cuota)} · ${a.fecha?.slice(0,10)||""}</div></div><div class="bet-right"><div class="bet-monto">${fmt(a.monto)}</div><div class="bet-result ${rc}">${res}</div></div></div>`;
}

/* ── Charts ── */
function axisM(v){const a=Math.abs(v);return a>=1000?`$${(v/1000).toFixed(1)}k`:`$${v}`}
function destroyChart(k){if(charts[k]){charts[k].destroy();delete charts[k];}}

function makeChartNeto(){
  const c=document.getElementById("chartNeto");
  if(!c||!DATA.grafica_meses.length)return;
  destroyChart("neto");
  let acum=0;
  charts.neto=new Chart(c,{type:"bar",data:{labels:DATA.grafica_meses.map(m=>mesLabel(m.mes)),datasets:[{label:"Neto acumulado",data:DATA.grafica_meses.map(m=>{acum+=m.neto;return acum;}),backgroundColor:DATA.grafica_meses.map((_,i,arr)=>{let s=0;arr.slice(0,i+1).forEach(x=>s+=x.neto);return s>=0?"rgba(0,205,150,0.75)":"rgba(255,61,90,0.75)"}),borderRadius:5,borderSkipped:false}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{font:{size:10,family:"Space Mono"},color:"#4A5568"}},y:{grid:{color:"rgba(255,255,255,0.04)"},ticks:{callback:axisM,font:{size:10,family:"Space Mono"},color:"#4A5568"}}}}});

/* ── Events ── */
document.addEventListener("click",e=>{
  const chip=e.target.closest("[data-filtro-deporte]");
  if(chip){filtroDeporte=chip.dataset.filtroDeporte;document.querySelectorAll("[data-filtro-deporte]").forEach(c=>c.classList.toggle("active",c.dataset.filtroDeporte===filtroDeporte));const l=document.getElementById("apuestasLista");if(l)l.innerHTML=renderApuestasList();return;}
  const tab=e.target.closest("[data-tab]");
  if(tab){showTab(tab.dataset.tab,tab);return;}
  const mes=e.target.closest("[data-mes-dir]");
  if(mes){cambiarMes(parseInt(mes.dataset.mesDir,10));return;}
  const act=e.target.closest("[data-action]");
  if(act?.dataset.action==="recargar"){recargar();return;}
});
document.addEventListener("input",e=>{
  const el=e.target.closest("[data-search-equipo]");
  if(el){filtroEquipo=el.value;const l=document.getElementById("apuestasLista");if(l)l.innerHTML=renderApuestasList();}
});

function showTab(id,btn){
  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".nav-item").forEach(t=>t.classList.remove("active"));
  const sec=document.getElementById(id);
  if(sec)sec.classList.add("active");
  if(btn)btn.classList.add("active");
  else{const nb=document.querySelector(`.nav-item[data-tab="${id}"]`);if(nb)nb.classList.add("active");}
  tabActual=id;
  setTimeout(initCharts,80);
}

async function recargar(){
  if(cargando)return;
  cargando=true;
  document.getElementById("app").innerHTML=`<div class="loader"><div class="loader-logo">Bet<span>Stats</span></div><div class="loader-bar"><div class="loader-bar-fill"></div></div><p>Actualizando...</p></div>`;
  const nav=document.getElementById("bottomNav");
  if(nav)nav.style.display="none";
  try{await cargarDatos();}finally{cargando=false;}
}

/* ════════════════════════════════════════════════════════════════
   TAB GESTIÓN — CRUD completo + análisis de ticket con IA
   ════════════════════════════════════════════════════════════════ */

let _editRowId = null;

function renderGestion(){
  const ok = !!getSecret();
  return `
  <div class="section-header">Gestión de <span>apuestas</span></div>

  ${!ok ? `<div class="secret-banner">
    <strong>🔑 Clave de API requerida</strong><br>
    Pega tu <code>MINIAPP_SECRET</code> de Railway para habilitar el CRUD.
    <input id="sInput" class="secret-input" type="password" placeholder="MINIAPP_SECRET...">
    <button class="secret-save" onclick="saveSecret()">Guardar</button>
  </div>` : ""}

  <div class="g-toolbar">
    <button class="btn-add" onclick="openModal(null,null)">➕ Nueva apuesta</button>
    <span style="font-size:11px;color:var(--text-3)">${DATA?.apuestas?.length??0} registradas</span>
  </div>

  <div id="gLista">${renderGLista()}</div>`;
}

function renderGLista(){
  if(!DATA?.apuestas?.length) return '<div class="empty">Sin apuestas registradas</div>';
  const total = DATA.apuestas.length;
  return [...DATA.apuestas].reverse().slice(0,40).map((a,idx)=>{
    const rowId = a.row_id ?? (total - idx);
    const si = a.status==="win"?"✅":a.status==="loss"?"❌":a.status==="void"?"🔄":"⏳";
    const gStr = a.status==="win"?` → +${fmt(a.ganancia)}`:a.status==="loss"?` → -${fmt(a.monto)}`:"";
    return `<div class="g-card">
      <div class="g-card-head">
        <div>
          <div class="g-teams">${si} ${esc(a.equipo1)} vs ${esc(a.equipo2)}</div>
          <div class="g-meta">${esc(a.deporte||"")}${a.deporte?" · ":""}${esc(a.tipo||"")} @ ${esc(String(a.cuota||""))} · ${fmt(a.monto)}${gStr}${a.fecha?" · 📅 "+a.fecha.slice(0,10):""}</div>
        </div>
        <div class="g-actions">
          <button class="btn-edit" onclick="openModal(${rowId},${idx})">✏️</button>
          <button class="btn-del"  onclick="confirmDel(${rowId},'${esc(a.equipo1)} vs ${esc(a.equipo2)}')">🗑️</button>
        </div>
      </div>
    </div>`;
  }).join("");
}

function saveSecret(){
  const v=document.getElementById("sInput")?.value?.trim();
  if(!v) return;
  localStorage.setItem("miniapp_secret",v);
  location.reload();
}

/* ── Viewport helper ── */
function getVH(){
  if(tg?.viewportStableHeight&&tg.viewportStableHeight>100)return tg.viewportStableHeight;
  if(window.visualViewport)return window.visualViewport.height;
  return window.innerHeight;
}

/* ── Ajusta el sheet cuando el teclado abre/cierra ── */
function syncModalToViewport(){
  const sheet=document.getElementById("mSheet");
  if(!sheet)return;
  const vh=window.visualViewport?window.visualViewport.height:getVH();
  const navH=parseInt(getComputedStyle(document.documentElement).getPropertyValue("--nav-h"))||72;
  sheet.style.maxHeight=Math.floor((vh-navH)*0.94)+"px";
}

function openModal(rowId,idx){
  _editRowId=rowId;
  const a=(rowId!==null&&DATA?.apuestas)?[...DATA.apuestas].reverse()[idx]:{};
  const v={
    eq1:a.equipo1||"",eq2:a.equipo2||"",tipo:a.tipo||"",cuota:a.cuota||"",
    monto:a.monto||"",dep:a.deporte||"",liga:a.liga||"",
    fecha:a.fecha?(a.fecha.slice(0,10)):"",hora:a.fecha?(a.fecha.slice(11,16)||""):"",
    status:a.status||"pending",
  };
  document.getElementById("gModal").innerHTML=`
  <div class="m-overlay" id="mOverlay" onclick="if(event.target===this)closeModal()">
    <div class="m-sheet" id="mSheet" style="max-height:${Math.floor((getVH()-72)*0.94)}px">
      <div class="m-handle"></div>
      <div class="m-head">
        <div class="m-title">
          <span>${rowId===null?"➕ Nueva apuesta":"✏️ Editar apuesta"}</span>
          <button class="m-close" onclick="closeModal()">✕</button>
        </div>
      </div>
      <div class="m-body">
        ${rowId===null?`
        <div class="u-zone" id="uZone"
             onclick="document.getElementById('uInput').click()"
             ondragover="event.preventDefault();this.classList.add('drag')"
             ondragleave="this.classList.remove('drag')"
             ondrop="handleDrop(event)">
          <div class="u-icon">📸</div>
          <div class="u-text">Foto del ticket → auto-rellena el formulario</div>
          <div class="u-sub">Toca o arrastra la imagen</div>
        </div>
        <input id="uInput" type="file" accept="image/*" style="display:none" onchange="analyzeTicket(this.files[0])">
        <div class="u-analyzing" id="uAn">⏳ Analizando con IA…</div>`:""}
        <div class="m-row">
          <div class="m-group"><label class="m-label">Equipo 1</label><input id="mEq1" class="m-input" value="${esc(v.eq1)}" placeholder="Real Madrid"></div>
          <div class="m-group"><label class="m-label">Equipo 2</label><input id="mEq2" class="m-input" value="${esc(v.eq2)}" placeholder="Barcelona"></div>
        </div>
        <div class="m-group"><label class="m-label">Tipo de apuesta</label><input id="mTipo" class="m-input" value="${esc(v.tipo)}" placeholder="moneyline, handicap, total over 2.5…"></div>
        <div class="m-row">
          <div class="m-group"><label class="m-label">Cuota</label><input id="mCuota" class="m-input" type="number" step="0.01" value="${esc(String(v.cuota))}" placeholder="1.85"></div>
          <div class="m-group"><label class="m-label">Monto ($)</label><input id="mMonto" class="m-input" type="number" value="${esc(String(v.monto))}" placeholder="100"></div>
        </div>
        <div class="m-row">
          <div class="m-group"><label class="m-label">Deporte</label><input id="mDep" class="m-input" value="${esc(v.dep)}" placeholder="Football…"></div>
          <div class="m-group"><label class="m-label">Liga</label><input id="mLiga" class="m-input" value="${esc(v.liga)}" placeholder="Opcional"></div>
        </div>
        <div class="m-group">
          <label class="m-label">Fecha del partido</label>
          <div class="m-date-row">
            <button class="m-now-btn" onclick="setFechaNow()">📅 Ahora</button>
            <input id="mFecha" class="m-input" type="date" value="${esc(v.fecha)}" style="flex:1">
          </div>
          <input id="mHora" class="m-input" type="time" value="${esc(v.hora)}" style="margin-top:6px">
        </div>
        ${rowId!==null?`
        <div class="m-group"><label class="m-label">Resultado</label>
          <select id="mStatus" class="m-input">
            <option value="pending" ${v.status==="pending"?"selected":""}>⏳ Pendiente</option>
            <option value="win"     ${v.status==="win"?"selected":""}>✅ Win</option>
            <option value="loss"    ${v.status==="loss"?"selected":""}>❌ Loss</option>
            <option value="void"    ${v.status==="void"?"selected":""}>🔄 Void</option>
          </select></div>`:""}
      </div>
      <div class="m-foot">
        <div class="m-err" id="mErr"></div>
        <button class="m-submit" id="mSubmitBtn" onclick="submitBet()">${rowId===null?"✅ Registrar apuesta":"💾 Guardar cambios"}</button>
      </div>
    </div>
  </div>`;
  /* Escuchar cambios de viewport (teclado) */
  if(window.visualViewport){
    window.visualViewport.addEventListener("resize",syncModalToViewport);
    window.visualViewport.addEventListener("scroll",syncModalToViewport);
  }
  /* Ajuste inicial */
  syncModalToViewport();
}

function closeModal(){
  if(window.visualViewport){
    window.visualViewport.removeEventListener("resize",syncModalToViewport);
    window.visualViewport.removeEventListener("scroll",syncModalToViewport);
  }
  document.getElementById("gModal").innerHTML="";
  _editRowId=null;
}
function setFechaNow(){ const n=new Date(); document.getElementById("mFecha").value=n.toISOString().slice(0,10); document.getElementById("mHora").value=n.toTimeString().slice(0,5); }

function handleDrop(e){
  e.preventDefault(); document.getElementById("uZone").classList.remove("drag");
  const f=e.dataTransfer.files[0]; if(f?.type.startsWith("image/")) analyzeTicket(f);
}

async function analyzeTicket(file){
  if(!file) return;
  if(!getSecret()){ showErr("Configura la clave de API primero."); return; }
  const an=document.getElementById("uAn"); const uz=document.getElementById("uZone");
  an.style.display="flex"; uz.style.opacity="0.5";
  try{
    const b64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result.split(",")[1]);r.onerror=()=>rej(new Error("Error leyendo archivo"));r.readAsDataURL(file);});
    const resp=await fetch(`${API_URL}/api/analyze-ticket`,{method:"POST",headers:apiHeaders(),body:JSON.stringify({image_b64:b64})});
    const j=await resp.json();
    if(!j.ok) throw new Error(j.error||"No se detectó ticket");
    const d=j.datos;
    if(d.equipo1)     document.getElementById("mEq1").value=d.equipo1;
    if(d.equipo2)     document.getElementById("mEq2").value=d.equipo2;
    if(d.tipo_apuesta)document.getElementById("mTipo").value=d.tipo_apuesta;
    if(d.cuota)       document.getElementById("mCuota").value=d.cuota;
    if(d.monto)       document.getElementById("mMonto").value=d.monto;
    if(d.deporte)     document.getElementById("mDep").value=d.deporte;
    if(d.liga)        document.getElementById("mLiga").value=d.liga;
    if(d.fecha_partido) document.getElementById("mFecha").value=d.fecha_partido;
    if(d.hora_partido)  document.getElementById("mHora").value=d.hora_partido;
    uz.innerHTML=`<div class="u-icon">✅</div><div class="u-text" style="color:var(--win)">Ticket detectado — revisa los campos</div>`;
  }catch(err){ showErr("⚠️ "+err.message); uz.style.opacity="1"; }
  finally{ an.style.display="none"; }
}

async function submitBet(){
  if(!getSecret()){ showErr("🔑 Configura la clave de API primero (ajustes de Railway)."); return; }
  const eq1=document.getElementById("mEq1")?.value.trim();
  const eq2=document.getElementById("mEq2")?.value.trim();
  const tipo=document.getElementById("mTipo")?.value.trim();
  const cuota=document.getElementById("mCuota")?.value.trim();
  const monto=document.getElementById("mMonto")?.value.trim();
  const dep=document.getElementById("mDep")?.value.trim();
  const liga=document.getElementById("mLiga")?.value.trim();
  const fecha=document.getElementById("mFecha")?.value.trim();
  const hora=document.getElementById("mHora")?.value.trim();
  const st=document.getElementById("mStatus")?.value||"pending";
  if(!eq1||!eq2||!tipo||!cuota||!monto){ showErr("⚠️ Completa: equipos, tipo, cuota y monto."); return; }
  const btn=document.getElementById("mSubmitBtn");
  const originalTxt=btn?.textContent||"";
  if(btn){ btn.disabled=true; btn.textContent="⏳ Guardando…"; }
  try{
    let resp;
    if(_editRowId===null){
      resp=await fetch(`${API_URL}/api/bets`,{method:"POST",headers:apiHeaders(),body:JSON.stringify({equipo1:eq1,equipo2:eq2,tipo_apuesta:tipo,cuota,monto,deporte:dep||"Otro",liga,fecha_partido:fecha,hora_partido:hora})});
    } else {
      const body={equipo1:eq1,equipo2:eq2,tipo_apuesta:tipo,cuota,monto,deporte:dep,liga,fecha_partido:fecha,hora_partido:hora};
      if(st!=="pending"){ body.status_final=st.charAt(0).toUpperCase()+st.slice(1); if(st==="win")body.ganancia_real=String((parseFloat(cuota)*parseFloat(monto)).toFixed(2)); if(st==="loss")body.ganancia_real=String(-parseFloat(monto)); if(st==="void")body.ganancia_real="0"; }
      resp=await fetch(`${API_URL}/api/bets/${_editRowId}`,{method:"PUT",headers:apiHeaders(),body:JSON.stringify(body)});
    }
    const j=await resp.json();
    if(!j.ok) throw new Error(j.error||`Error ${resp.status} del servidor`);
    closeModal();
    await recargar();
    showTab("gestion",document.querySelector('[data-tab="gestion"]'));
  }catch(err){
    showErr("❌ "+err.message);
    if(btn){ btn.disabled=false; btn.textContent=originalTxt; }
  }
}

function confirmDel(rowId,label){
  if(!confirm(`¿Borrar?\n\n${label}\n\nAcción irreversible.`)) return;
  deleteBet(rowId);
}

async function deleteBet(rowId){
  if(!getSecret()){ alert("Configura la clave de API."); return; }
  try{
    const resp=await fetch(`${API_URL}/api/bets/${rowId}`,{method:"DELETE",headers:apiHeaders()});
    const j=await resp.json();
    if(!j.ok) throw new Error(j.error);
    await recargar();
    showTab("gestion",document.querySelector('[data-tab="gestion"]'));
  }catch(err){ alert("❌ "+err.message); }
}

function showErr(msg){ const el=document.getElementById("mErr"); if(el){el.textContent=msg;el.style.display="block";} }

cargarDatos();
</script>
