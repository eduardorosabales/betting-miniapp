<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <meta name="api-url" content="https://betting-stats-bot-production.up.railway.app">
  <meta name="tg-bot-username" content="tubettingstatsbot">
  <meta http-equiv="Content-Security-Policy"
    content="default-src 'self'; script-src 'self' https://cdnjs.cloudflare.com https://telegram.org; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; connect-src 'self' https://betting-stats-bot-production.up.railway.app; img-src 'self' data: blob: https://t.me; frame-src https://oauth.telegram.org; object-src 'none'; base-uri 'self'; form-action 'self';">
  <link rel="icon" type="image/png" sizes="32x32" href="assets/favicon-32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="assets/apple-touch-icon-180.png">
  <title>Betting Stats</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Space+Mono:wght@400;700&family=DM+Sans:wght@400;500;600&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #06080F;
      --surface: #0A0E1C;
      --card: #0D1220;
      --card2: #111826;
      --border: rgba(255, 255, 255, 0.06);
      --border-hi: rgba(0, 205, 150, 0.25);
      --accent: #00CD96;
      --accent-dim: rgba(0, 205, 150, 0.12);
      --win: #00CD96;
      --win-bg: rgba(0, 205, 150, 0.1);
      --loss: #FF3D5A;
      --loss-bg: rgba(255, 61, 90, 0.1);
      --pend: #F5A623;
      --pend-bg: rgba(245, 166, 35, 0.1);
      --text: #E2E8F4;
      --text-2: #8896A8;
      --text-3: #3D4A5C;
      --chart-grid: rgba(255, 255, 255, 0.04);
      --chart-tick: #4A5568;
      --header-bg: rgba(6, 8, 15, 0.85);
      --nav-bg: rgba(10, 14, 28, 0.92);
      --nav-bg-solid: rgba(10, 14, 28, 0.97);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --font-head: 'Syne', sans-serif;
      --font-num: 'Space Mono', monospace;
      --font-body: 'DM Sans', sans-serif;
      --nav-h: 72px;
      --safe-b: env(safe-area-inset-bottom, 0px);
      --sidebar-w: 220px;
      --content-max: 960px;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0
    }

    html {
      height: 100%
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100svh;
      min-height: 100vh;
      padding-bottom: calc(var(--nav-h) + 20px);
      overflow-x: hidden
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 0;
      opacity: 0.4
    }

    body::after {
      content: '';
      position: fixed;
      top: -200px;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(0, 205, 150, 0.07) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0
    }

    /* ── Sidebar logo: oculto en mobile, visible en desktop vía @media ── */
    .sidebar-logo {
      display: none
    }


    /* ── Performance overrides (Telegram Desktop / Linux) ── */
    .no-blur .header {
      backdrop-filter: none !important;
      background: var(--header-bg) !important
    }

    .no-blur .bottom-nav {
      backdrop-filter: none !important;
      background: var(--nav-bg-solid) !important
    }

    .no-blur body::before {
      display: none !important
    }

    .no-blur body::after {
      display: none !important
    }

    .no-blur .status-dot {
      animation: none !important
    }

    .no-blur .section.active {
      animation: none !important
    }

    .no-blur body::after {
      display: none !important
    }

    .no-blur .progress-fill,
    .no-blur .tipo-bar-fill,
    .no-blur .kelly-fill,
    .no-blur .dia-bar-fill {
      transition: none !important
    }

    .no-blur .loader-logo,
    .no-blur .loader-bar-fill {
      animation: none !important;
      opacity: 1
    }

    /* ── Header ── */
    .header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--header-bg);
      backdrop-filter: blur(20px) saturate(180%);
      border-bottom: 1px solid var(--border);
      padding: 14px 16px;
      left: 0;
      right: 0
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 10px
    }

    .logo-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(140deg, #2BE9B0 0%, var(--accent) 45%, #009E74 100%);
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      box-shadow: 0 4px 14px -3px rgba(0, 205, 150, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.25)
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      display: block
    }

    .logo-text {
      font-family: var(--font-head);
      font-size: 18px;
      font-weight: 800;
      letter-spacing: -0.4px
    }

    .logo-text span {
      background: linear-gradient(120deg, var(--accent) 0%, #5BE8C0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: var(--accent)
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 8px
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      animation: pulse-dot 2s ease-in-out infinite
    }

    @keyframes pulse-dot {

      0%,
      100% {
        opacity: 1;
        transform: scale(1)
      }

      50% {
        opacity: 0.4;
        transform: scale(0.8)
      }
    }

    .refresh-btn {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-2);
      min-width: 44px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 6px 14px;
      border-radius: var(--radius-sm);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.2px
    }

    .refresh-btn:active {
      transform: scale(0.96)
    }

    .refresh-btn:disabled {
      opacity: 0.4;
      cursor: default
    }

    /* ── Header: saludo + avatar (móvil) ── */
    .user-block {
      display: flex;
      align-items: center;
      gap: 11px;
      min-width: 0
    }

    .avatar {
      width: 42px;
      height: 42px;
      border-radius: 13px;
      background: linear-gradient(140deg, #2BE9B0, #009E74);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 18px;
      color: #04130d;
      flex-shrink: 0;
      box-shadow: 0 4px 14px -3px rgba(0, 205, 150, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.25)
    }

    .greet {
      display: flex;
      flex-direction: column;
      line-height: 1.18;
      min-width: 0
    }

    .greet .hi {
      font-size: 12px;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 62vw
    }

    .greet .nm {
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 16px;
      letter-spacing: -0.3px
    }

    .greet .nm span {
      background: linear-gradient(120deg, var(--accent) 0%, #5BE8C0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: var(--accent)
    }

    .refresh-btn.refresh-round {
      width: 44px;
      height: 44px;
      padding: 0;
      border-radius: 50%;
      font-size: 17px
    }

    /* ── Content ── */
    .content {
      padding: 16px;
      position: relative;
      z-index: 1
    }

    .section {
      display: none
    }

    .section.active {
      display: block;
      animation: fadein 0.25s ease
    }

    @keyframes fadein {
      from {
        opacity: 0;
        transform: translateY(6px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ── Bottom nav ── */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      height: var(--nav-h);
      background: var(--nav-bg);
      backdrop-filter: blur(24px) saturate(200%);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 200;
      overflow-x: auto;
      scrollbar-width: none;
      padding-bottom: env(safe-area-inset-bottom, 0px)
    }

    .bottom-nav::-webkit-scrollbar {
      display: none
    }

    .nav-item {
      min-width: 64px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      cursor: pointer;
      border: none;
      background: transparent;
      color: var(--text-3);
      padding: 8px 4px;
      transition: color 0.2s;
      position: relative;
      -webkit-tap-highlight-color: transparent
    }

    .nav-item.active {
      color: var(--accent)
    }

    .nav-item.active::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 32px;
      height: 2px;
      background: var(--accent);
      border-radius: 0 0 4px 4px
    }

    .nav-icon {
      font-size: 20px;
      line-height: 1
    }

    /* ── Sub-navegación (segmented control) por grupo ── */
    .sub-nav {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      scrollbar-width: none;
      margin: 0 0 14px;
      padding-bottom: 2px
    }

    .sub-nav::-webkit-scrollbar {
      display: none
    }

    .sub-chip {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s, background .15s, border-color .15s
    }

    .sub-chip.active {
      color: var(--accent);
      background: var(--accent-dim);
      border-color: var(--border-hi)
    }

    .sub-chip:active {
      transform: scale(0.97)
    }

    .sub-chip.sub-more,
    .sub-chip.sub-back {
      color: var(--text);
      font-weight: 700
    }

    /* ── Resumen ejecutivo (hero) ── */
    .hero-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px
    }

    .hero-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px 14px
    }

    .hero-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 0.4px;
      margin-bottom: 8px
    }

    .hero-value {
      font-family: var(--font-num);
      font-size: 26px;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
      line-height: 1.05
    }

    .nav-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3px
    }

    /* ── Cards ── */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
      margin-bottom: 10px;
      position: relative;
      overflow: hidden
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.02), transparent 60%);
      pointer-events: none
    }

    .card-title {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-3);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 14px
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 10px
    }

    .stat-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px 10px;
      text-align: center;
      position: relative;
      overflow: hidden
    }

    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 2px;
      opacity: 0;
      transition: opacity 0.2s
    }

    .stat-card.win-card::after {
      background: var(--win);
      opacity: 1
    }

    .stat-card.loss-card::after {
      background: var(--loss);
      opacity: 1
    }

    .stat-card.pend-card::after {
      background: var(--pend);
      opacity: 1
    }

    .stat-value {
      font-family: var(--font-num);
      font-size: 26px;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 5px
    }

    .stat-label {
      font-size: 10px;
      color: var(--text-2);
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase
    }

    /* ── KPI ── */
    .kpi-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 10px
    }

    .kpi {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 14px
    }

    .kpi-label {
      font-size: 10px;
      color: var(--text-2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 6px
    }

    .kpi-value {
      font-family: var(--font-num);
      font-size: 21px;
      font-weight: 700;
      letter-spacing: -0.5px
    }

    /* ── Colors ── */
    .green {
      color: var(--win)
    }

    .red {
      color: var(--loss)
    }

    .yellow {
      color: var(--pend)
    }

    .accent {
      color: var(--accent)
    }

    .muted {
      color: var(--text-2)
    }

    /* ── Progress ── */
    .progress-wrap {
      margin-bottom: 4px
    }

    .progress-labels {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px
    }

    .progress-track {
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden
    }

    .progress-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, var(--win), var(--accent));
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1)
    }

    /* ── Chart ── */
    .chart-wrap {
      position: relative;
      height: 230px;
      margin-bottom: 4px
    }

    /* ── Selector de rango de gráficas ── */
    .range-sel {
      display: flex;
      gap: 6px;
      margin-bottom: 10px
    }

    .range-chip {
      flex: 0 0 auto;
      min-height: 44px;
      padding: 0 16px;
      display: inline-flex;
      align-items: center;
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-2);
      border-radius: 999px;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: color .15s, background .15s, border-color .15s
    }

    .range-chip.active {
      color: var(--accent);
      background: var(--accent-dim);
      border-color: var(--border-hi)
    }

    .range-chip:active {
      transform: scale(0.96)
    }

    .chart-wrap-tall {
      position: relative;
      height: 220px;
      margin-bottom: 4px
    }

    /* ── Sport items ── */
    .sport-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--border)
    }

    .sport-item:last-child {
      border-bottom: none
    }

    .sport-name {
      font-size: 14px;
      font-weight: 600
    }

    .sport-sub {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 2px
    }

    .sport-roi {
      font-family: var(--font-num);
      font-size: 16px;
      font-weight: 700
    }

    /* ── Capital ── */
    .capital-hero {
      text-align: center;
      padding: 24px 0 16px
    }

    .capital-label {
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 10px
    }

    .capital-amount {
      font-family: var(--font-head);
      font-size: 42px;
      font-weight: 800;
      color: var(--accent);
      line-height: 1;
      letter-spacing: -1px
    }

    .capital-sub {
      font-size: 12px;
      color: var(--text-2);
      margin-top: 8px;
      font-weight: 500
    }

    .cap-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 16px
    }

    .cap-stat {
      background: var(--card2);
      border-radius: var(--radius-md);
      padding: 14px 12px;
      text-align: center;
      border: 1px solid var(--border)
    }

    .cap-stat-val {
      font-family: var(--font-num);
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px
    }

    .cap-stat-lbl {
      font-size: 10px;
      color: var(--text-2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px
    }

    /* ── Bet items ── */
    .bet-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border)
    }

    .bet-item:last-child {
      border-bottom: none
    }

    .bet-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0
    }

    .bet-dot.win {
      background: var(--win);
      box-shadow: 0 0 6px rgba(0, 205, 150, 0.5)
    }

    .bet-dot.loss {
      background: var(--loss);
      box-shadow: 0 0 6px rgba(255, 61, 90, 0.5)
    }

    .bet-dot.pend {
      background: var(--pend);
      box-shadow: 0 0 6px rgba(245, 166, 35, 0.5)
    }

    .bet-info {
      flex: 1;
      min-width: 0
    }

    .bet-teams {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 2px
    }

    .bet-meta {
      font-size: 11px;
      color: var(--text-2);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis
    }

    .bet-right {
      text-align: right;
      flex-shrink: 0
    }

    .bet-monto {
      font-family: var(--font-num);
      font-size: 13px;
      font-weight: 700
    }

    .bet-result {
      font-family: var(--font-num);
      font-size: 11px;
      margin-top: 1px
    }

    .bet-badge {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 999px;
      margin-bottom: 4px
    }

    .bet-badge-win {
      color: var(--win);
      background: var(--win-bg)
    }

    .bet-badge-loss {
      color: var(--loss);
      background: var(--loss-bg)
    }

    .bet-badge-pend {
      color: var(--pend);
      background: var(--pend-bg)
    }

    .bet-badge-void {
      color: var(--text-2);
      background: var(--accent-dim)
    }

    /* Cifras alineadas (tabulares) en todos los valores numéricos. */
    .stat-value,
    .kpi-value,
    .sport-roi,
    .capital-amount,
    .cap-stat-val,
    .bet-monto,
    .bet-result,
    .rolling-kpi-val,
    .kelly-card-pct,
    .hero-value {
      font-variant-numeric: tabular-nums
    }

    /* ── Skeleton loaders (carga en frío, nunca pantalla en blanco) ── */
    .skeleton {
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      background-color: var(--card2);
      background-image: linear-gradient(90deg, transparent 25%, rgba(128, 128, 128, 0.20) 50%, transparent 75%);
      background-size: 200% 100%;
      animation: sk-shimmer 1.3s ease-in-out infinite;
      margin-bottom: 12px
    }

    .hero-grid .skeleton {
      margin-bottom: 0
    }

    @keyframes sk-shimmer {
      0% {
        background-position: 200% 0
      }

      100% {
        background-position: -200% 0
      }
    }

    .no-blur .skeleton {
      animation: none
    }

    /* ── Banner de datos en caché (fetch falló pero hay datos guardados) ── */
    .stale-banner {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--pend-bg);
      color: var(--pend);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 12px;
      border-radius: var(--radius-md);
      margin-bottom: 12px
    }

    .stale-banner button {
      margin-left: auto;
      flex-shrink: 0;
      background: var(--pend);
      color: #000;
      border: none;
      border-radius: 999px;
      padding: 0 16px;
      min-height: 40px;
      font-family: var(--font-body);
      font-weight: 700;
      cursor: pointer
    }

    /* ── Filters ── */
    .filter-row {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      margin-bottom: 12px;
      scrollbar-width: none;
      padding-bottom: 2px
    }

    .filter-row::-webkit-scrollbar {
      display: none
    }

    .filter-chip {
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 6px 16px;
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
      border: 1px solid var(--border);
      background: var(--card);
      color: var(--text-2);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.15s;
      letter-spacing: 0.2px
    }

    .filter-chip.active {
      background: var(--accent-dim);
      border-color: var(--border-hi);
      color: var(--accent)
    }

    /* ── Search ── */
    .search-wrap {
      position: relative;
      margin-bottom: 10px
    }

    .search-icon {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 14px;
      pointer-events: none;
      color: var(--text-2)
    }

    .search-input {
      width: 100%;
      padding: 10px 14px 10px 36px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s
    }

    .search-input:focus {
      border-color: rgba(0, 205, 150, 0.35)
    }

    .search-input::placeholder {
      color: var(--text-3)
    }

    /* ── Mes selector ── */
    .mes-selector {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 10px 14px
    }

    .mes-nav {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-2);
      width: 44px;
      height: 44px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s
    }

    .mes-nav:active {
      transform: scale(0.92)
    }

    .mes-label {
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 700
    }

    /* ── Racha badge ── */
    .racha-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: var(--radius-md);
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 10px;
      letter-spacing: 0.2px
    }

    .racha-win {
      background: var(--win-bg);
      color: var(--win);
      border: 1px solid rgba(0, 205, 150, 0.2)
    }

    .racha-loss {
      background: var(--loss-bg);
      color: var(--loss);
      border: 1px solid rgba(255, 61, 90, 0.2)
    }

    .racha-icon {
      font-size: 18px
    }

    /* ── Loader ── */
    .loader {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 70vh;
      gap: 20px
    }

    .loader-logo {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      letter-spacing: -0.5px;
      animation: loader-pulse 1.5s ease-in-out infinite
    }

    .loader-logo span {
      background: linear-gradient(120deg, var(--accent) 0%, #5BE8C0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      color: var(--accent)
    }

    @keyframes loader-pulse {

      0%,
      100% {
        opacity: 1
      }

      50% {
        opacity: 0.4
      }
    }

    .loader-bar {
      width: 80px;
      height: 2px;
      background: var(--card2);
      border-radius: 1px;
      overflow: hidden
    }

    .loader-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      animation: loader-slide 1.5s ease-in-out infinite
    }

    @keyframes loader-slide {
      0% {
        width: 0%;
        margin-left: 0
      }

      50% {
        width: 60%;
        margin-left: 20%
      }

      100% {
        width: 0%;
        margin-left: 100%
      }
    }

    .loader p {
      font-size: 13px;
      color: var(--text-2);
      font-weight: 500
    }

    /* ── Error ── */
    .error-box {
      background: var(--loss-bg);
      border: 1px solid rgba(255, 61, 90, 0.25);
      border-radius: var(--radius-lg);
      padding: 24px 20px;
      text-align: center;
      margin: 20px 0
    }

    .error-box p {
      color: var(--loss);
      font-size: 14px;
      font-weight: 600
    }

    .error-box small {
      color: var(--text-2);
      font-size: 12px
    }

    .retry-btn {
      margin-top: 14px;
      min-height: 44px;
      display: inline-flex;
      align-items: center;
      padding: 9px 22px;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius-md);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px
    }

    /* ── Empty / Explainer ── */
    .empty {
      text-align: center;
      padding: 30px 20px;
      color: var(--text-2);
      font-size: 13px
    }

    .divider {
      border: none;
      border-top: 1px solid var(--border);
      margin: 4px 0 12px
    }

    .section-header {
      font-family: var(--font-head);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.3px;
      margin-bottom: 14px;
      color: var(--text)
    }

    .section-header span {
      color: var(--accent)
    }

    .explainer {
      font-size: 14px;
      color: var(--text-2);
      line-height: 1.6;
      padding: 12px 14px;
      background: var(--card2);
      border-radius: var(--radius-md);
      border-left: 2px solid var(--accent);
      margin-top: 8px
    }

    .explainer strong {
      color: var(--text);
      font-weight: 600
    }

    /* ── Tipo row ── */
    .tipo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 0;
      border-bottom: 1px solid var(--border)
    }

    .tipo-item:last-child {
      border-bottom: none
    }

    .tipo-bar-wrap {
      height: 4px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 6px;
      width: 100%
    }

    .tipo-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1)
    }

    /* ── Rolling chart ── */
    .rolling-kpi {
      display: flex;
      gap: 8px;
      margin-bottom: 10px
    }

    .rolling-kpi-item {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px;
      text-align: center
    }

    .rolling-kpi-val {
      font-family: var(--font-num);
      font-size: 20px;
      font-weight: 700
    }

    .rolling-kpi-lbl {
      font-size: 10px;
      color: var(--text-2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px
    }

    /* ── Kelly meter ── */
    .kelly-meter {
      height: 12px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 6px;
      overflow: hidden;
      margin: 10px 0
    }

    .kelly-fill {
      height: 100%;
      border-radius: 6px;
      background: linear-gradient(90deg, var(--win), #F5A623);
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1)
    }

    .kelly-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 12px
    }

    .kelly-card {
      background: var(--card2);
      border-radius: var(--radius-md);
      padding: 14px;
      text-align: center;
      border: 1px solid var(--border)
    }

    .kelly-card-pct {
      font-family: var(--font-num);
      font-size: 22px;
      font-weight: 700;
      color: var(--accent)
    }

    .kelly-card-lbl {
      font-size: 10px;
      color: var(--text-2);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-top: 4px
    }

    .kelly-card-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 3px
    }

    /* ── Temporal ── */
    .dia-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid var(--border)
    }

    .dia-row:last-child {
      border-bottom: none
    }

    .dia-label {
      font-size: 12px;
      font-weight: 700;
      width: 36px;
      flex-shrink: 0;
      color: var(--text-2)
    }

    .dia-bar-wrap {
      flex: 1;
      height: 6px;
      background: rgba(255, 255, 255, 0.06);
      border-radius: 3px;
      overflow: hidden
    }

    .dia-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1)
    }

    .dia-roi {
      font-family: var(--font-num);
      font-size: 11px;
      font-weight: 700;
      width: 52px;
      text-align: right;
      flex-shrink: 0
    }

    .dia-wl {
      font-size: 10px;
      color: var(--text-2);
      width: 56px;
      text-align: right;
      flex-shrink: 0
    }

    /* ── Gestión CRUD ── */
    .g-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px
    }

    .btn-add {
      -webkit-appearance: none;
      appearance: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background-color: #00CD96;
      color: #000;
      border: none;
      border-radius: var(--radius-md);
      padding: 10px 18px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.2px;
      -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
      min-height: 40px;
      box-shadow: 0 0 14px rgba(0, 205, 150, 0.35)
    }

    .btn-add:active {
      opacity: .75;
      transform: scale(0.97)
    }

    .g-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 12px 14px;
      margin-bottom: 8px
    }

    .g-card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px
    }

    .g-teams {
      font-size: 13px;
      font-weight: 700;
      line-height: 1.35
    }

    .g-meta {
      font-size: 11px;
      color: var(--text-2);
      margin-top: 3px;
      line-height: 1.4
    }

    .g-actions {
      display: flex;
      gap: 6px;
      flex-shrink: 0
    }

    .btn-edit {
      background: rgba(255, 255, 255, 0.07);
      color: var(--text-2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 9px;
      font-size: 13px;
      cursor: pointer
    }

    .btn-del {
      background: rgba(255, 61, 90, 0.12);
      color: var(--loss);
      border: 1px solid rgba(255, 61, 90, 0.2);
      border-radius: var(--radius-sm);
      padding: 6px 9px;
      font-size: 13px;
      cursor: pointer
    }

    /* Modal */
    .m-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.72);
      z-index: 9999;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      padding-bottom: var(--nav-h)
    }

    /* Modal — estructura flexbox con footer sticky */
    .m-sheet {
      background: var(--surface);
      border-radius: 20px 20px 16px 16px;
      width: 100%;
      max-width: 520px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 -8px 40px rgba(0, 0, 0, 0.6)
    }

    .m-handle {
      width: 36px;
      height: 4px;
      background: rgba(255, 255, 255, 0.18);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0
    }

    .m-head {
      padding: 12px 16px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border)
    }

    .m-body {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 14px 16px 8px;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain
    }

    .m-foot {
      flex-shrink: 0;
      padding: 12px 16px;
      padding-bottom: calc(env(safe-area-inset-bottom, 0px) + 14px);
      background: var(--surface);
      border-top: 1px solid var(--border)
    }

    .m-title {
      font-family: var(--font-head);
      font-size: 17px;
      font-weight: 800;
      display: flex;
      justify-content: space-between;
      align-items: center
    }

    .m-close {
      background: var(--card2);
      border: 1px solid var(--border);
      color: var(--text-2);
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center
    }

    .m-label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--text-2);
      text-transform: uppercase;
      letter-spacing: .6px;
      margin-bottom: 5px
    }

    .m-input {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      padding: 9px 12px;
      outline: none;
      box-sizing: border-box;
      transition: border-color .2s
    }

    .m-input:focus {
      border-color: rgba(0, 205, 150, .4)
    }

    .m-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px
    }

    .m-group {
      margin-bottom: 11px
    }

    .m-date-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-bottom: 6px
    }

    .m-now-btn {
      flex-shrink: 0;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap
    }

    .m-submit {
      display: block;
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: var(--radius-md);
      padding: 14px;
      font-family: var(--font-head);
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      letter-spacing: .2px;
      transition: opacity .15s
    }

    .m-submit:active,
    .m-submit:disabled {
      opacity: .6
    }

    .m-submit:disabled {
      cursor: not-allowed
    }

    .m-err {
      font-size: 12px;
      color: var(--loss);
      margin-bottom: 8px;
      display: none;
      padding: 8px 10px;
      background: rgba(255, 80, 80, .08);
      border-radius: 6px;
      border: 1px solid rgba(255, 80, 80, .2)
    }

    /* Upload zone */
    .u-zone {
      border: 2px dashed var(--border);
      border-radius: var(--radius-md);
      padding: 22px 16px;
      text-align: center;
      cursor: pointer;
      margin-bottom: 12px;
      transition: border-color .2s
    }

    .u-zone:hover,
    .u-zone.drag {
      border-color: var(--accent)
    }

    .u-icon {
      font-size: 30px;
      margin-bottom: 6px
    }

    .u-text {
      font-size: 13px;
      color: var(--text-2)
    }

    .u-sub {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 3px
    }

    .u-analyzing {
      background: rgba(245, 166, 35, .1);
      border: 1px solid rgba(245, 166, 35, .25);
      border-radius: var(--radius-sm);
      padding: 9px 12px;
      font-size: 12px;
      color: var(--pend);
      display: none;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px
    }

    /* Secret banner */
    .secret-banner {
      background: rgba(245, 166, 35, .08);
      border: 1px solid rgba(245, 166, 35, .2);
      border-radius: var(--radius-md);
      padding: 14px;
      margin-bottom: 12px;
      font-size: 13px;
      color: var(--text-2);
      line-height: 1.5
    }

    .secret-banner strong {
      color: var(--pend)
    }

    .secret-input {
      margin-top: 10px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 13px;
      padding: 9px 12px;
      box-sizing: border-box;
      outline: none
    }

    .secret-save {
      margin-top: 8px;
      background: var(--pend);
      color: #000;
      border: none;
      border-radius: var(--radius-sm);
      padding: 8px 16px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer
    }

    /* ── Patrones IA: render enriquecido ── */
    .pat-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .pat-hero {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font-head);
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -.2px;
      color: var(--text);
      padding: 13px 15px;
      border-radius: var(--radius-md);
      background: linear-gradient(135deg, var(--accent-dim), rgba(0, 205, 150, .02));
      border: 1px solid var(--border-hi);
    }

    .pat-hero .pat-ico {
      font-size: 21px;
      line-height: 1;
      flex-shrink: 0;
    }

    .pat-sec {
      display: flex;
      align-items: center;
      gap: 9px;
      margin-top: 6px;
      padding: 9px 13px;
      border-radius: var(--radius-md);
      font-family: var(--font-head);
      font-weight: 800;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: .7px;
      background: var(--card2);
      border-left: 3px solid var(--text-3);
    }

    .pat-sec .pat-ico {
      font-size: 17px;
      line-height: 1;
      flex-shrink: 0;
    }

    .pat-sec--good {
      border-left-color: var(--win);
      color: #d6fff2;
      background: rgba(0, 205, 150, .07);
    }

    .pat-sec--bad {
      border-left-color: var(--loss);
      color: #ffd9df;
      background: rgba(255, 61, 90, .07);
    }

    .pat-sec--info {
      border-left-color: var(--accent);
      color: var(--text);
    }

    .pat-sec--plan {
      border-left-color: var(--pend);
      color: #ffe9c2;
      background: rgba(245, 166, 35, .08);
    }

    .pat-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--text-3);
      border-radius: var(--radius-md);
      padding: 12px 14px;
    }

    .pat-card--good {
      border-left-color: var(--win);
    }

    .pat-card--bad {
      border-left-color: var(--loss);
    }

    .pat-card--info {
      border-left-color: var(--accent);
    }

    .pat-card--plan {
      border-left-color: var(--pend);
    }

    .pat-card-title {
      font-size: 13.5px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.35;
    }

    .pat-metrics {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .pat-metric {
      display: inline-flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 5px 9px;
      border-radius: var(--radius-sm);
      background: var(--card2);
      border: 1px solid var(--border);
    }

    .pat-metric-k {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .pat-metric-v {
      font-family: var(--font-num);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      line-height: 1.25;
    }

    .pat-metric--roi-pos,
    .pat-metric--money-pos {
      border-color: rgba(0, 205, 150, .3);
      background: var(--win-bg);
    }

    .pat-metric--roi-pos .pat-metric-v,
    .pat-metric--money-pos .pat-metric-v {
      color: var(--win);
    }

    .pat-metric--roi-neg,
    .pat-metric--money-neg {
      border-color: rgba(255, 61, 90, .3);
      background: var(--loss-bg);
    }

    .pat-metric--roi-neg .pat-metric-v,
    .pat-metric--money-neg .pat-metric-v {
      color: var(--loss);
    }

    .pat-metric--wr .pat-metric-v {
      color: var(--accent);
    }

    .pat-metric--sample .pat-metric-v {
      color: var(--text-2);
      font-size: 12px;
    }

    .pat-tip,
    .pat-warn,
    .pat-note {
      display: flex;
      gap: 7px;
      align-items: flex-start;
      font-size: 12px;
      line-height: 1.5;
      padding: 8px 10px;
      border-radius: var(--radius-sm);
    }

    .pat-tip {
      background: rgba(0, 205, 150, .06);
      color: var(--text-2);
      border: 1px solid rgba(0, 205, 150, .14);
    }

    .pat-warn {
      background: rgba(255, 61, 90, .07);
      color: #ffc7d0;
      border: 1px solid rgba(255, 61, 90, .18);
    }

    .pat-note {
      background: rgba(0, 205, 150, .07);
      color: #bff3e3;
      border: 1px solid rgba(0, 205, 150, .16);
    }

    .pat-tip .pat-ico,
    .pat-warn .pat-ico,
    .pat-note .pat-ico {
      font-size: 14px;
      line-height: 1.35;
      flex-shrink: 0;
    }

    .pat-conf {
      align-self: flex-start;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 11px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-2);
      background: var(--card2);
      border: 1px solid var(--border);
    }

    .pat-conf-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--text-3);
      flex-shrink: 0;
    }

    .pat-conf strong {
      font-weight: 800;
    }

    .pat-conf--alta {
      background: rgba(0, 205, 150, .1);
      color: var(--win);
      border-color: rgba(0, 205, 150, .3);
    }

    .pat-conf--alta .pat-conf-dot {
      background: var(--win);
    }

    .pat-conf--media {
      background: var(--pend-bg);
      color: var(--pend);
      border-color: rgba(245, 166, 35, .3);
    }

    .pat-conf--media .pat-conf-dot {
      background: var(--pend);
    }

    .pat-list {
      margin: 0;
      padding: 0;
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .pat-list li {
      position: relative;
      padding: 9px 12px 9px 26px;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--text-2);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .pat-list li::before {
      content: "▸";
      position: absolute;
      left: 11px;
      color: var(--accent);
      font-weight: 700;
    }

    .pat-steps {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .pat-step {
      display: flex;
      align-items: center;
      gap: 11px;
      padding: 10px 12px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
    }

    .pat-step-n {
      flex-shrink: 0;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), #00A880);
      color: #04130d;
      font-family: var(--font-num);
      font-weight: 700;
      font-size: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pat-step-t {
      font-size: 12.5px;
      line-height: 1.4;
      color: var(--text);
    }

    .pat-p {
      font-size: 12.5px;
      line-height: 1.6;
      color: var(--text-2);
    }

    .pat-li {
      position: relative;
      font-size: 12.5px;
      line-height: 1.5;
      color: var(--text-2);
      padding-left: 14px;
    }

    .pat-li::before {
      content: "•";
      position: absolute;
      left: 2px;
      color: var(--accent);
    }

    .pat-num {
      font-family: var(--font-num);
      font-weight: 700;
    }

    .pat-num.pos {
      color: var(--win);
    }

    .pat-num.neg {
      color: var(--loss);
    }

    .pat-wrap code {
      background: var(--card2);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 11px;
      font-family: var(--font-num);
    }

    .pat-wrap strong {
      color: var(--text);
      font-weight: 700;
    }

    .pat-wrap em {
      color: var(--text-2);
      font-style: italic;
    }

    /* ── Motor de Neto Mensual (ANM) ── */
    .nm-wrap {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 18px;
    }

    .nm-resumen {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .nm-stat {
      flex: 1 1 30%;
      min-width: 96px;
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 9px 11px;
      border-radius: var(--radius-md);
      background: var(--card2);
      border: 1px solid var(--border);
    }

    .nm-stat-k {
      font-size: 8.5px;
      font-weight: 700;
      letter-spacing: .6px;
      text-transform: uppercase;
      color: var(--text-3);
    }

    .nm-stat-v {
      font-size: 13px;
      font-weight: 800;
      color: var(--text);
      line-height: 1.25;
    }

    .nm-stat-v.pos {
      color: var(--win);
    }

    .nm-stat-v.neg {
      color: var(--pend);
    }

    .nm-stat small {
      font-size: 10px;
      color: var(--text-2);
      line-height: 1.3;
    }

    .nm-grid {
      display: flex;
      flex-direction: column;
      gap: 9px;
    }

    .nm-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius-md);
      padding: 11px 13px;
    }

    .nm-card-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .nm-mes {
      font-family: var(--font-num);
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      letter-spacing: .3px;
    }

    .nm-neto {
      font-family: var(--font-num);
      font-size: 14px;
      font-weight: 800;
    }

    .nm-neto.pos {
      color: var(--win);
    }

    .nm-neto.neg {
      color: var(--loss);
    }

    .nm-neto-tag {
      font-family: var(--font-base);
      font-size: 9px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
      color: var(--text-3);
      margin-left: 4px;
      vertical-align: middle;
    }

    .nm-driver {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 7px;
    }

    .nm-chip {
      display: inline-flex;
      align-items: center;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text);
      background: var(--accent-dim);
      border: 1px solid var(--border-hi);
    }

    .nm-driver small {
      font-size: 10.5px;
      color: var(--text-2);
    }

    .nm-badge.low {
      padding: 2px 7px;
      border-radius: 999px;
      font-size: 9.5px;
      font-weight: 700;
      color: var(--pend);
      background: var(--pend-bg);
      border: 1px solid rgba(245, 166, 35, .3);
    }

    .nm-bar {
      position: relative;
      height: 16px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .06);
      overflow: hidden;
    }

    .nm-bar-fill {
      position: absolute;
      inset: 0 auto 0 0;
      background: linear-gradient(90deg, var(--accent), #00A880);
      border-radius: 999px;
    }

    .nm-bar-lbl {
      position: absolute;
      right: 8px;
      top: 0;
      line-height: 16px;
      font-size: 9.5px;
      font-weight: 700;
      color: var(--text);
    }

    .nm-dims {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .nm-dim {
      font-size: 10px;
      color: var(--text-2);
      padding: 3px 7px;
      border-radius: var(--radius-sm);
      background: var(--card2);
      border: 1px solid var(--border);
    }

    .nm-dim b {
      color: var(--text);
      font-weight: 700;
    }

    /* ── Pantalla de login web (fuera de Telegram) ── */
    #web-login {
      display: none;
      min-height: 100svh;
      min-height: 100vh;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .wl-card {
      max-width: 340px;
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px 24px;
      text-align: center;
    }

    .wl-logo {
      font-family: var(--font-head);
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
    }

    .wl-logo span {
      color: var(--accent);
    }

    .wl-sub {
      color: var(--text-2);
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    .wl-widget {
      display: flex;
      justify-content: center;
      margin-bottom: 12px;
    }

    .wl-hint {
      font-size: 11px;
      color: var(--text-3);
      margin-top: 16px;
    }

    .wl-err {
      color: var(--loss);
      font-size: 13px;
      margin-top: 10px;
      min-height: 18px;
    }

    /* ── Desktop layout (≥768px) ── */
    @media(min-width:768px) {
      body {
        padding-bottom: 0;
        padding-left: var(--sidebar-w);
      }

      /* Header centrado en área de contenido */
      .header {
        left: var(--sidebar-w);
        right: 0;
      }

      .header-inner {
        max-width: var(--content-max);
        margin: 0 auto;
      }

      /* Contenido centrado */
      .content {
        max-width: var(--content-max);
        margin: 0 auto;
        padding: 24px 32px;
      }

      /* Sidebar vertical en lugar de bottom nav */
      .bottom-nav {
        position: fixed;
        top: 0;
        left: 0;
        bottom: 0;
        right: auto;
        width: var(--sidebar-w);
        height: 100%;
        flex-direction: column;
        align-items: stretch;
        justify-content: flex-start;
        border-top: none;
        border-right: 1px solid var(--border);
        padding: 0;
        padding-top: 70px;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .nav-item {
        min-width: auto;
        flex: none;
        flex-direction: row;
        justify-content: flex-start;
        gap: 12px;
        padding: 12px 20px;
        border-radius: 0;
        text-align: left;
      }

      .nav-item.active::before {
        top: 0;
        bottom: 0;
        left: 0;
        right: auto;
        width: 3px;
        height: 100%;
        border-radius: 0 4px 4px 0;
      }

      .nav-icon {
        font-size: 18px
      }

      .nav-label {
        font-size: 13px;
        font-weight: 600;
        letter-spacing: 0.2px
      }

      /* Grids más amplios */
      .hero-grid {
        grid-template-columns: repeat(4, 1fr)
      }

      .stats-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px
      }

      .kpi-row {
        grid-template-columns: repeat(2, 1fr);
        gap: 12px
      }

      .cap-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px
      }

      .kelly-grid {
        grid-template-columns: repeat(3, 1fr);
        gap: 12px
      }

      /* Cards más espaciadas */
      .card {
        padding: 20px;
        margin-bottom: 14px
      }

      .stat-card {
        padding: 18px 14px
      }

      .stat-value {
        font-size: 30px
      }

      .section-header {
        font-size: 24px;
        margin-bottom: 18px
      }

      /* Charts más altos en desktop */
      .chart-wrap {
        height: 220px
      }

      .chart-wrap-tall {
        height: 280px
      }

      /* Modal desktop: dialog centrado en lugar de bottom sheet */
      .m-overlay {
        align-items: center;
        justify-content: center;
        padding: 0;
        padding-left: var(--sidebar-w);
      }

      .m-sheet {
        width: min(600px, calc(100vw - var(--sidebar-w) - 40px));
        max-height: min(88vh, 700px);
        border-radius: var(--radius-lg);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.7);
      }

      .m-handle {
        display: none
      }

      .m-foot {
        padding: 16px 20px
      }

      .m-body {
        padding: 16px 20px
      }

      /* Sidebar logo */
      .sidebar-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 18px 20px 12px;
        border-bottom: 1px solid var(--border);
        margin-bottom: 4px;
        position: fixed;
        top: 0;
        left: 0;
        width: var(--sidebar-w);
        background: var(--nav-bg-solid);
        z-index: 201;
        text-decoration: none;
      }

      .sidebar-logo-icon {
        width: 32px;
        height: 32px;
        background: linear-gradient(140deg, #2BE9B0 0%, var(--accent) 45%, #009E74 100%);
        border-radius: 9px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        box-shadow: 0 4px 14px -3px rgba(0, 205, 150, 0.55), inset 0 1px 0 rgba(255, 255, 255, 0.25);
      }

      .sidebar-logo-icon svg {
        width: 19px;
        height: 19px;
        display: block;
      }

      .sidebar-logo-text {
        font-family: var(--font-head);
        font-size: 16px;
        font-weight: 800;
        letter-spacing: -0.3px;
        color: var(--text);
      }

      .sidebar-logo-text span {
        background: linear-gradient(120deg, var(--accent) 0%, #5BE8C0 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: var(--accent);
      }


      .header .logo,
      .header .user-block {
        display: none;
      }

      .header-inner {
        justify-content: flex-end;
      }
    }
  </style>
  <script src="assets/boot.js"></script>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>

<body>

  <div id="web-login">
    <div class="wl-card">
      <div class="wl-logo">Bet<span>Stats</span></div>
      <p class="wl-sub">Inicia sesión con tu cuenta de Telegram para continuar.</p>
      <div class="wl-widget">
        <div id="tg-widget-container">
          <script async src="https://telegram.org/js/telegram-widget.js?22"
            data-telegram-login="tubettingstatsbot"
            data-size="large"
            data-onauth="onTelegramAuth(user)"
            data-request-access="write">
          </script>
        </div>
      </div>
      <p class="wl-hint">Solo los usuarios autorizados pueden acceder.</p>
      <div id="web-login-err" class="wl-err"></div>
    </div>
  </div>

  <div id="app">
    <div class="loader">
      <div class="loader-logo">Bet<span>Stats</span></div>
      <div class="loader-bar">
        <div class="loader-bar-fill"></div>
      </div>
      <p>Cargando datos...</p>
    </div>
  </div>
  <nav class="bottom-nav" id="bottomNav" style="display:none"></nav>
  <div id="gModal"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"
    integrity="sha512-CQBWl4fJHWbryGE+Pc7UAxWMUMNMWzWxF4SQo9CgkJIN1kx6djDQZjh3Y8SZ1d+6I+1zze6Z7kHXO7q3UyZAWw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="assets/app.js"></script>
</body>

</html>
